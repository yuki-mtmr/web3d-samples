<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Retro Terrain – Synthwave Flythrough</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🌆</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Press+Start+2P&display=swap">

  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    }
  }
  </script>

  <style>
    :root {
      --bg: #12002a;
      --pink: #ff2bd6;
      --cyan: #22e5ff;
      --orange: #ff9a3d;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: linear-gradient(180deg, #000 0%, var(--bg) 100%);
      font-family: 'Orbitron', sans-serif;
      color: var(--cyan);
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
    }

    /* UI Overlay */
    .overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding-top: 3rem;
      z-index: 10;
    }

    .title {
      font-family: 'Press Start 2P', cursive;
      font-size: clamp(2rem, 5vw, 3.5rem);
      font-weight: 900;
      text-align: center;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      margin-bottom: 0.5rem;
      animation: glow-pulse 3s ease-in-out infinite, title-glitch 2s steps(4, end) 3.5s infinite;
      text-shadow:
        0 0 10px var(--pink),
        0 0 20px var(--pink),
        0 0 30px var(--cyan),
        0 0 40px var(--cyan),
        2px 2px 0 rgba(0, 0, 0, 0.8);
    }

    @keyframes glow-pulse {
      0%, 100% {
        text-shadow:
          0 0 10px var(--pink),
          0 0 20px var(--pink),
          0 0 30px var(--cyan),
          0 0 40px var(--cyan),
          2px 2px 0 rgba(0, 0, 0, 0.8);
      }
      50% {
        text-shadow:
          0 0 15px var(--pink),
          0 0 30px var(--pink),
          0 0 40px var(--cyan),
          0 0 50px var(--cyan),
          2px 2px 0 rgba(0, 0, 0, 0.8);
      }
    }

    @keyframes title-glitch {
      0%, 100% { opacity: 1; }
      10%, 20%, 30%, 40% { opacity: 0.8; }
    }

    .tagline {
      font-size: clamp(0.75rem, 1.5vw, 1rem);
      font-family: 'Orbitron', sans-serif;
      font-weight: 400;
      letter-spacing: 0.1em;
      margin-bottom: 2rem;
      text-shadow: 0 0 8px var(--cyan);
      opacity: 0.9;
    }

    .hud {
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 3rem;
      border: 2px solid var(--cyan);
      padding: 1rem 2rem;
      background: rgba(18, 0, 42, 0.7);
      backdrop-filter: blur(4px);
      font-family: 'Courier New', monospace;
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      box-shadow: 0 0 20px rgba(34, 229, 255, 0.3);
      position: relative;
    }

    .hud::before,
    .hud::after {
      content: '';
      position: absolute;
      border: 1px solid var(--cyan);
      width: 12px;
      height: 12px;
    }

    .hud::before {
      top: -1px;
      left: -1px;
      border-right: none;
      border-bottom: none;
    }

    .hud::after {
      bottom: -1px;
      right: -1px;
      border-left: none;
      border-top: none;
    }

    .hud-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      min-width: 100px;
    }

    .hud-label {
      font-size: 0.7rem;
      color: var(--cyan);
      margin-bottom: 0.3rem;
      opacity: 0.8;
    }

    .hud-value {
      font-size: 1rem;
      color: var(--pink);
      font-weight: bold;
      text-shadow: 0 0 10px var(--pink);
    }

    .signal-container {
      position: relative;
      display: inline-block;
    }

    .cursor {
      display: inline-block;
      color: var(--cyan);
      margin-left: 0.2em;
      animation: cursor-blink 0.6s steps(2, end) infinite;
    }

    @keyframes cursor-blink {
      0%, 49% { opacity: 1; }
      50%, 100% { opacity: 0; }
    }

    /* Sun glow */
    .sun-glow {
      position: fixed;
      top: 35%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 400px;
      height: 400px;
      background: radial-gradient(circle, rgba(255, 154, 61, 0.35) 0%, transparent 70%);
      pointer-events: none;
      z-index: 1;
      filter: blur(30px);
    }

    /* Meta text (top-left) */
    .meta-text {
      position: fixed;
      top: 2rem;
      left: 2rem;
      font-family: 'Courier New', monospace;
      font-size: 0.65rem;
      color: var(--cyan);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      line-height: 1.4;
      border-left: 1px solid var(--cyan);
      padding-left: 0.8rem;
      z-index: 10;
    }

    /* REC indicator (bottom-right) */
    .rec-indicator {
      position: fixed;
      bottom: 2rem;
      right: 2rem;
      font-family: 'Orbitron', sans-serif;
      font-size: 0.75rem;
      color: var(--cyan);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      display: flex;
      align-items: center;
      gap: 0.3em;
      z-index: 10;
    }

    .rec-dot {
      width: 0.5em;
      height: 0.5em;
      border-radius: 50%;
      background: #ff0000;
      animation: rec-pulse 1s ease-in-out infinite;
      box-shadow: 0 0 8px #ff0000;
    }

    @keyframes rec-pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    /* CRT Scanline Effect */
    .scanlines {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      background: repeating-linear-gradient(
        0deg,
        transparent 0px,
        transparent 2px,
        rgba(0, 0, 0, 0.25) 2px,
        rgba(0, 0, 0, 0.25) 3px
      );
      z-index: 100;
    }

    /* Reduce motion support */
    @media (prefers-reduced-motion: reduce) {
      .title {
        animation: none;
        text-shadow:
          0 0 10px var(--pink),
          0 0 20px var(--pink),
          0 0 30px var(--cyan),
          0 0 40px var(--cyan),
          2px 2px 0 rgba(0, 0, 0, 0.8);
      }
      .cursor {
        animation: none;
        opacity: 1;
      }
      .rec-dot {
        animation: none;
        opacity: 1;
      }
    }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>

  <div class="sun-glow"></div>

  <div class="overlay">
    <div class="title">RETRO TERRAIN</div>
    <div class="tagline">シンセウェーブフライスルー</div>
  </div>

  <div class="hud">
    <div class="hud-item">
      <div class="hud-label">SPEED</div>
      <div class="hud-value" id="speed-val">42.7</div>
    </div>
    <div class="hud-item">
      <div class="hud-label">GRID</div>
      <div class="hud-value" id="grid-val">ON</div>
    </div>
    <div class="hud-item">
      <div class="hud-label">SIGNAL</div>
      <div class="hud-value" id="signal-val">█████<span class="cursor">▮</span></div>
    </div>
    <div class="hud-item">
      <div class="hud-label">ALT</div>
      <div class="hud-value" id="alt-val">2400</div>
    </div>
  </div>

  <div class="meta-text" id="meta-text">SECTOR 7 — GRID RUN<br><span id="meta-coords">X:0000 Y:2400 Z:1000</span></div>

  <div class="rec-indicator">REC <span class="rec-dot"></span></div>

  <div class="scanlines"></div>

  <script type="module">
    import * as THREE from 'three';

    const canvas = document.getElementById('canvas');
    const renderer = new THREE.WebGLRenderer({ canvas, alpha: true, antialias: false });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setClearColor(0x000000, 0);

    const scene = new THREE.Scene();
    scene.fog = new THREE.Fog(0x12002a, 12, 48);

    const camera = new THREE.PerspectiveCamera(
      75,
      window.innerWidth / window.innerHeight,
      0.1,
      1000
    );
    camera.position.set(0, 2.4, 10);
    camera.lookAt(0, 0.6, -14);

    // Resize handler
    function onWindowResize() {
      const w = window.innerWidth;
      const h = window.innerHeight;
      camera.aspect = w / h;
      camera.updateProjectionMatrix();
      renderer.setSize(w, h);
    }
    onWindowResize();
    window.addEventListener('resize', onWindowResize);

    // Sun (circle behind terrain)
    // Circle faces +Z by default, which is exactly toward the camera — no rotation,
    // and fog:false so it isn't swallowed by the scene fog at that distance
    const sunGeo = new THREE.CircleGeometry(9, 48);
    const sunMat = new THREE.MeshBasicMaterial({ color: 0xff9a3d, fog: false });
    const sun = new THREE.Mesh(sunGeo, sunMat);
    sun.position.set(0, 3.5, -40);
    scene.add(sun);

    // Sun stripes (synthwave look)
    const stripeCount = 4;
    const sunRadius = 9;
    const stripeThickness = 0.4;
    for (let i = 0; i < stripeCount; i++) {
      const stripeMat = new THREE.MeshBasicMaterial({ color: 0x12002a, fog: false });
      const stripeGeo = new THREE.PlaneGeometry(sunRadius * 2.2, stripeThickness);
      const stripe = new THREE.Mesh(stripeGeo, stripeMat);
      // Position stripes across lower half of sun
      const yPos = 0.5 - (i / (stripeCount - 1)) * 1.8;
      stripe.position.set(sun.position.x, sun.position.y + yPos, sun.position.z + 0.1);
      scene.add(stripe);
    }

    // Stars (upper hemisphere)
    const starCount = 400;
    const starsGeo = new THREE.BufferGeometry();
    const starPositions = new Float32Array(starCount * 3);
    for (let i = 0; i < starCount; i++) {
      starPositions[i * 3] = (Math.random() - 0.5) * 80; // x: ±40
      starPositions[i * 3 + 1] = 3 + Math.random() * 22; // y: 3-25
      starPositions[i * 3 + 2] = -45 + Math.random() * 30; // z: -45 to -15
    }
    starsGeo.setAttribute('position', new THREE.BufferAttribute(starPositions, 3));
    const starsMat = new THREE.PointsMaterial({
      color: 0xefffff,
      size: 0.08,
      sizeAttenuation: true,
      fog: false
    });
    const stars = new THREE.Points(starsGeo, starsMat);
    scene.add(stars);

    // Terrain
    const terrainGeo = new THREE.PlaneGeometry(30, 60, 60, 120);
    terrainGeo.rotateX(-Math.PI / 2);

    const terrainMat = new THREE.MeshBasicMaterial({
      color: 0xff2bd6,
      wireframe: true,
      fog: true
    });

    const terrain = new THREE.Mesh(terrainGeo, terrainMat);
    scene.add(terrain);

    // Vertex position array (original)
    const positions = terrainGeo.attributes.position;
    const posArray = positions.array;
    const originalPositions = new Float32Array(posArray);

    // Noise function for terrain height
    function getTerrainHeight(x, z, t) {
      const h =
        (Math.sin(x * 0.5) * Math.cos((z + t) * 0.35) +
          Math.sin(x * 0.17 + (z + t) * 0.4) * 0.5) *
        (0.6 + Math.min(Math.abs(x) * 0.25, 2.5));
      return h;
    }

    // Animation state
    let t = 0;
    const reducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

    const speedElem = document.getElementById('speed-val');
    const gridElem = document.getElementById('grid-val');
    const signalElem = document.getElementById('signal-val');

    let frameCount = 0;
    const targetFrameRate = 60;
    let lastUpdateTime = Date.now();

    const altElem = document.getElementById('alt-val');
    const metaCoordsElem = document.getElementById('meta-coords');

    // Base terrain color
    const baseTerrainColor = new THREE.Color(0xff2bd6);
    const pulseTargetColor = new THREE.Color(0x22e5ff);

    // Mouse parallax — banking the camera with the pointer keeps the flythrough
    // feeling responsive instead of purely passive
    const CAM_BASE = { x: 0, y: 2.4 };
    let camTargetX = CAM_BASE.x;
    let camTargetY = CAM_BASE.y;
    window.addEventListener('pointermove', (e) => {
      if (reducedMotion) return;
      const nx = (e.clientX / window.innerWidth) * 2 - 1;
      const ny = (e.clientY / window.innerHeight) * 2 - 1;
      camTargetX = CAM_BASE.x + nx * 1.4;
      camTargetY = CAM_BASE.y - ny * 0.5;
    });

    renderer.setAnimationLoop((time) => {
      frameCount++;

      // Update terrain heights
      if (!reducedMotion) {
        t += 0.016; // ~60fps step

        for (let i = 0; i < posArray.length; i += 3) {
          const x = originalPositions[i];
          const y = originalPositions[i + 1];
          const z = originalPositions[i + 2];

          posArray[i] = x;
          posArray[i + 1] = getTerrainHeight(x, z, t);
          posArray[i + 2] = z;
        }
        positions.needsUpdate = true;

        // Stars twinkle
        const starOpacity = 0.6 + Math.sin(time * 0.001) * 0.4;
        starsMat.opacity = starOpacity;

        // Horizon grid pulse (every ~4s, subtle cyan boost)
        const pulseCycle = (time % 4000) / 4000;
        const pulseStrength = Math.sin(pulseCycle * Math.PI) * 0.3;
        terrainMat.color.copy(baseTerrainColor).lerp(pulseTargetColor, pulseStrength);
      }

      // Apply mouse parallax (0.12 = tight, stress-free tracking)
      camera.position.x += (camTargetX - camera.position.x) * 0.12;
      camera.position.y += (camTargetY - camera.position.y) * 0.12;
      camera.lookAt(0, 0.6, -14);

      // Update HUD
      const speed = (42.7 + Math.sin(Date.now() * 0.0003) * 5).toFixed(1);
      speedElem.textContent = speed;

      const signalBars = 5 - Math.floor(Math.sin(Date.now() * 0.0005) * 2);
      signalElem.firstChild.textContent = '█'.repeat(signalBars);

      // ALT value (camera height-ish)
      const altValue = Math.round(2400 + Math.sin(time * 0.0008) * 300);
      altElem.textContent = altValue.toString().padStart(4, '0');

      // Meta coordinates (based on camera position)
      const metaX = Math.abs(Math.round(camera.position.x * 1000)).toString().padStart(4, '0');
      const metaY = Math.round(camera.position.y * 1000).toString().padStart(4, '0');
      const metaZ = Math.abs(Math.round(camera.position.z * 1000)).toString().padStart(4, '0');
      metaCoordsElem.textContent = `X:${metaX} Y:${metaY} Z:${metaZ}`;

      renderer.render(scene, camera);

      // Console log on first frame
      if (frameCount === 1) {
        console.log('[site] ready');
      }
    });
  </script>
</body>
</html>
