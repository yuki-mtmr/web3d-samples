<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Web3D Kit — Bento Lab</title>
  <script type="importmap">
  {"imports":{"three":"https://unpkg.com/three@0.160.0/build/three.module.js","three/addons/":"https://unpkg.com/three@0.160.0/examples/jsm/"}}
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Space+Grotesk:wght@500&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      overflow-x: hidden;
    }

    body {
      background: #f5f0e6;
      color: #000;
      font-family: 'Space Grotesk', system-ui, sans-serif;
      font-size: 16px;
      line-height: 1.5;
    }

    .container {
      max-width: 100%;
      padding: 2rem;
    }

    .bento-grid {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 1.5rem;
      margin: 0 auto;
    }

    /* Intro cell - large, takes 3 cols x 2 rows */
    .cell-intro {
      grid-column: span 3;
      grid-row: span 2;
      border: 3px solid #000;
      padding: 2.5rem;
      background: #fff;
      box-shadow: 6px 6px 0 #000;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .cell-intro h1 {
      font-family: 'Archivo Black', system-ui, sans-serif;
      font-size: 3rem;
      line-height: 1;
      margin-bottom: 1rem;
      text-transform: uppercase;
      letter-spacing: -0.02em;
    }

    .cell-intro .subtext {
      font-size: 0.95rem;
      color: #333;
      margin-bottom: 1.5rem;
      line-height: 1.6;
    }

    .cell-intro .arrow {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      font-weight: 600;
      text-decoration: none;
      color: #ff5c00;
      font-size: 0.9rem;
    }

    .cell-intro .arrow:hover {
      text-decoration: underline;
    }

    /* Canvas cells */
    .cell-canvas {
      border: 3px solid #000;
      background: #fff;
      box-shadow: 6px 6px 0 #000;
      overflow: hidden;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .cell-canvas:hover {
      transform: translate(-2px, -2px);
      box-shadow: 8px 8px 0 #000;
    }

    .canvas-1 {
      grid-column: span 2;
      grid-row: span 2;
      aspect-ratio: 1;
    }

    .canvas-2 {
      grid-column: span 2;
      grid-row: span 1;
      aspect-ratio: 2 / 1;
    }

    .canvas-3 {
      grid-column: span 2;
      grid-row: span 2;
      aspect-ratio: 1;
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
    }

    /* Stat cell */
    .cell-stat {
      grid-column: span 2;
      grid-row: span 1;
      border: 3px solid #000;
      padding: 1.5rem;
      background: #ff5c00;
      color: #fff;
      box-shadow: 6px 6px 0 #000;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }

    .cell-stat .number {
      font-family: 'Archivo Black', system-ui, sans-serif;
      font-size: 4rem;
      line-height: 1;
      font-weight: 900;
    }

    .cell-stat .label {
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-top: 0.5rem;
    }

    /* Marquee cell */
    .cell-marquee {
      grid-column: span 6;
      border: 3px solid #000;
      background: #2b5bff;
      color: #fff;
      box-shadow: 6px 6px 0 #000;
      overflow: hidden;
      height: 80px;
      display: flex;
      align-items: center;
    }

    .marquee-content {
      display: flex;
      animation: scroll-left 20s linear infinite;
      white-space: nowrap;
      font-family: 'Archivo Black', system-ui, sans-serif;
      font-size: 1.2rem;
      font-weight: 900;
      letter-spacing: 0.05em;
    }

    .marquee-item {
      padding: 0 2rem;
    }

    @keyframes scroll-left {
      0% {
        transform: translateX(100%);
      }
      100% {
        transform: translateX(-100%);
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .marquee-content {
        animation: none;
        transform: translateX(0);
      }
    }

    /* Responsive */
    @media (max-width: 768px) {
      .bento-grid {
        grid-template-columns: repeat(2, 1fr);
        gap: 1rem;
      }

      .cell-intro {
        grid-column: span 2;
        grid-row: span 1;
        padding: 1.5rem;
      }

      .cell-intro h1 {
        font-size: 2rem;
      }

      .canvas-1, .canvas-2, .canvas-3 {
        grid-column: span 2;
        grid-row: span 1;
        aspect-ratio: 2 / 1;
      }

      .cell-stat {
        grid-column: span 2;
      }

      .cell-marquee {
        grid-column: span 2;
      }
    }

    @media (max-width: 480px) {
      .bento-grid {
        grid-template-columns: 1fr;
      }

      .cell-intro, .canvas-1, .canvas-2, .canvas-3, .cell-stat, .cell-marquee {
        grid-column: span 1;
      }

      .cell-intro h1 {
        font-size: 1.5rem;
      }

      .cell-stat .number {
        font-size: 2.5rem;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="bento-grid">
      <!-- Intro Cell -->
      <div class="cell-intro">
        <div>
          <h1>Web3D Kit</h1>
          <p class="subtext">
            ブルータリストな精神で、デジタル彫刻を展示します。<br>
            3つの異なるジオメトリが、リアルタイムで回転・変形します。<br>
            <span style="color: #ff5c00; font-weight: 600;">光と物質の対話。</span>
          </p>
        </div>
        <a href="#explore" class="arrow">
          Explore →
        </a>
      </div>

      <!-- Canvas 1: Wireframe Icosahedron -->
      <div class="cell-canvas canvas-1">
        <canvas id="canvas-1"></canvas>
      </div>

      <!-- Canvas 2: Torus -->
      <div class="cell-canvas canvas-2">
        <canvas id="canvas-2"></canvas>
      </div>

      <!-- Stat Cell -->
      <div class="cell-stat">
        <div class="number">∞</div>
        <div class="label">Polygons</div>
      </div>

      <!-- Canvas 3: Cube Grid -->
      <div class="cell-canvas canvas-3">
        <canvas id="canvas-3"></canvas>
      </div>

      <!-- Marquee Cell -->
      <div class="cell-marquee">
        <div class="marquee-content">
          <div class="marquee-item">● BRUTALISM ●</div>
          <div class="marquee-item">● THREE.JS ●</div>
          <div class="marquee-item">● GENERATIVE ●</div>
          <div class="marquee-item">● WEB3D ●</div>
          <div class="marquee-item">● FORM OVER FUNCTION ●</div>
          <div class="marquee-item">● BRUTALISM ●</div>
          <div class="marquee-item">● THREE.JS ●</div>
          <div class="marquee-item">● GENERATIVE ●</div>
          <div class="marquee-item">● WEB3D ●</div>
          <div class="marquee-item">● FORM OVER FUNCTION ●</div>
        </div>
      </div>
    </div>
  </div>

  <script type="module">
    import * as THREE from 'three';

    // Helper function to create a scene with renderer and animation loop
    function makeScene(canvasEl, buildFn, animateFn) {
      const renderer = new THREE.WebGLRenderer({
        canvas: canvasEl,
        antialias: true,
        alpha: true
      });

      const scene = new THREE.Scene();
      const camera = new THREE.PerspectiveCamera(45, 1, 0.1, 1000);
      camera.position.z = 4;

      // Lights
      const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
      directionalLight.position.set(5, 5, 5);
      scene.add(directionalLight);

      const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
      scene.add(ambientLight);

      // Build mesh
      const mesh = buildFn(scene);

      const clock = new THREE.Clock();
      const prefersReducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

      // Resize observer
      const resizeObserver = new ResizeObserver(() => {
        const width = canvasEl.clientWidth;
        const height = canvasEl.clientHeight;

        if (width > 0 && height > 0) {
          camera.aspect = width / height;
          camera.updateProjectionMatrix();
          renderer.setSize(width, height, false);
        }
      });
      resizeObserver.observe(canvasEl);

      // Initial size
      const initialWidth = canvasEl.clientWidth;
      const initialHeight = canvasEl.clientHeight;
      if (initialWidth > 0 && initialHeight > 0) {
        camera.aspect = initialWidth / initialHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(initialWidth, initialHeight, false);
      }

      // Animation loop
      renderer.setAnimationLoop(() => {
        if (!prefersReducedMotion) {
          animateFn(mesh, clock.getElapsedTime());
        }
        renderer.render(scene, camera);
      });

      return { renderer, scene, camera, mesh, resizeObserver };
    }

    // Canvas 1: Wireframe Icosahedron
    makeScene(document.getElementById('canvas-1'), (scene) => {
      const geometry = new THREE.IcosahedronGeometry(1.5, 4);
      const material = new THREE.MeshBasicMaterial({ wireframe: true, color: 0x000 });
      const mesh = new THREE.Mesh(geometry, material);
      scene.add(mesh);
      return mesh;
    }, (mesh, t) => {
      mesh.rotation.y = t * 0.3;
    });

    // Canvas 2: Torus
    makeScene(document.getElementById('canvas-2'), (scene) => {
      const geometry = new THREE.TorusGeometry(1.2, 0.4, 16, 32);
      const material = new THREE.MeshNormalMaterial();
      const mesh = new THREE.Mesh(geometry, material);
      scene.add(mesh);
      return mesh;
    }, (mesh, t) => {
      mesh.rotation.x = t * 0.5;
      mesh.rotation.y = t * 0.3;
    });

    // Canvas 3: Cube Grid (3x3x3 with pulsing scales)
    makeScene(document.getElementById('canvas-3'), (scene) => {
      const group = new THREE.Group();

      // InstancedMesh for efficient rendering
      const geometry = new THREE.BoxGeometry(0.3, 0.3, 0.3);
      const material = new THREE.MeshStandardMaterial({ color: 0x2b5bff, roughness: 0.5, metalness: 0.5 });

      const count = 27; // 3x3x3
      const instancedMesh = new THREE.InstancedMesh(geometry, material, count);

      const dummy = new THREE.Object3D();
      let index = 0;

      for (let x = -1; x <= 1; x++) {
        for (let y = -1; y <= 1; y++) {
          for (let z = -1; z <= 1; z++) {
            dummy.position.set(x * 0.6, y * 0.6, z * 0.6);
            dummy.updateMatrix();
            instancedMesh.setMatrixAt(index, dummy.matrix);
            index++;
          }
        }
      }

      instancedMesh.instanceMatrix.needsUpdate = true;
      group.add(instancedMesh);
      scene.add(group);

      // Store metadata for animation
      group.userData = { instancedMesh, count };

      return group;
    }, (mesh, t) => {
      mesh.rotation.x = t * 0.2;
      mesh.rotation.y = t * 0.35;

      const { instancedMesh, count } = mesh.userData;
      const dummy = new THREE.Object3D();

      let index = 0;
      for (let x = -1; x <= 1; x++) {
        for (let y = -1; y <= 1; y++) {
          for (let z = -1; z <= 1; z++) {
            const scale = 1 + 0.3 * Math.sin(t + index * 0.3);
            dummy.position.set(x * 0.6, y * 0.6, z * 0.6);
            dummy.scale.set(scale, scale, scale);
            dummy.updateMatrix();
            instancedMesh.setMatrixAt(index, dummy.matrix);
            index++;
          }
        }
      }
      instancedMesh.instanceMatrix.needsUpdate = true;
    });

    console.log('[site] ready');
  </script>
</body>
</html>
