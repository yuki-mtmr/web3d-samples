<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>縁日 — 夏祭りの夜</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🏮</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho+B1:wght@400;600;800&family=Yuji+Syuku&display=swap" rel="stylesheet">
<script type="importmap">
{"imports":{"three":"https://unpkg.com/three@0.160.0/build/three.module.js","three/addons/":"https://unpkg.com/three@0.160.0/examples/jsm/"}}
</script>
<style>
  :root {
    --ink: #f3ead8;
    --aka: #e0432d;
    --kin: #e8b04b;
    --yoru: #0a0716;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: var(--yoru);
    font-family: 'Shippori Mincho B1', serif;
    color: var(--ink);
  }
  canvas#stage { display: block; position: fixed; inset: 0; width: 100%; height: 100%; }

  /* ── 縦書きタイトル ── */
  .title-block {
    position: fixed;
    top: 50%; right: clamp(1.5rem, 6vw, 5rem);
    transform: translateY(-50%);
    writing-mode: vertical-rl;
    pointer-events: none;
    z-index: 10;
    animation: title-in 2.2s cubic-bezier(0.16, 1, 0.3, 1) 0.4s both;
  }
  .title-block h1 {
    font-family: 'Yuji Syuku', serif;
    font-size: clamp(3.5rem, 9vh, 6.5rem);
    letter-spacing: 0.35em;
    color: var(--ink);
    text-shadow: 0 0 24px rgba(224, 67, 45, 0.55), 0 0 60px rgba(232, 176, 75, 0.3);
  }
  /* 落款（はんこ） */
  .seal {
    display: inline-block;
    writing-mode: horizontal-tb;
    font-family: 'Yuji Syuku', serif;
    background: var(--aka);
    color: var(--ink);
    font-size: 0.9rem;
    padding: 0.35em 0.4em;
    border-radius: 3px;
    margin-top: 1.4em;
    letter-spacing: 0;
    box-shadow: 0 0 14px rgba(224, 67, 45, 0.5);
  }
  .title-block .sub {
    font-size: clamp(0.8rem, 1.8vh, 1rem);
    letter-spacing: 0.5em;
    margin-right: 1.2em;
    color: rgba(243, 234, 216, 0.75);
  }
  @keyframes title-in {
    from { opacity: 0; transform: translateY(calc(-50% + 20px)); }
    to   { opacity: 1; transform: translateY(-50%); }
  }

  /* ── 左下の口上 ── */
  .caption {
    position: fixed;
    left: clamp(1.5rem, 5vw, 4rem);
    bottom: clamp(1.5rem, 5vh, 3rem);
    z-index: 10;
    pointer-events: none;
    animation: title-in 2s cubic-bezier(0.16, 1, 0.3, 1) 1s both;
  }
  .caption .line { display: block; font-size: clamp(0.8rem, 1.6vw, 0.95rem); line-height: 2.1; color: rgba(243, 234, 216, 0.82); letter-spacing: 0.12em; }
  .caption .stalls { font-size: clamp(0.65rem, 1.3vw, 0.78rem); letter-spacing: 0.24em; color: rgba(232, 176, 75, 0.8); margin-top: 0.6rem; display: block; }

  /* ── 操作ヒント / 音ボタン ── */
  .hud {
    position: fixed;
    top: clamp(1.25rem, 4vh, 2rem); left: clamp(1.5rem, 5vw, 4rem);
    z-index: 10;
    display: flex; align-items: center; gap: 1.25rem;
    animation: title-in 2s ease 1.4s both;
  }
  .sound-btn {
    font-family: inherit;
    background: rgba(10, 7, 22, 0.55);
    color: var(--ink);
    border: 1px solid rgba(243, 234, 216, 0.35);
    border-radius: 999px;
    padding: 0.5rem 1.1rem;
    font-size: 0.8rem;
    letter-spacing: 0.2em;
    cursor: pointer;
    backdrop-filter: blur(6px);
    transition: background 0.15s ease-out, border-color 0.15s ease-out, transform 0.15s cubic-bezier(0.16, 1, 0.3, 1);
  }
  .sound-btn:hover { background: rgba(224, 67, 45, 0.35); border-color: rgba(243, 234, 216, 0.7); transform: scale(1.04); }
  .sound-btn:focus-visible { outline: 2px solid var(--kin); outline-offset: 2px; }
  .sound-btn[aria-pressed="true"] { background: rgba(224, 67, 45, 0.5); border-color: var(--kin); }
  .hint { font-size: 0.72rem; letter-spacing: 0.25em; color: rgba(243, 234, 216, 0.55); }

  /* ── 周回リセット用の暗転 ── */
  .fader {
    position: fixed; inset: 0;
    background: #050310;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.7s ease;
    z-index: 20;
  }
  .fader.on { opacity: 1; }

  /* 端のケラレ（夜の空気感） */
  .vignette {
    position: fixed; inset: 0;
    pointer-events: none;
    background: radial-gradient(ellipse at 50% 46%, transparent 52%, rgba(3, 2, 10, 0.65) 100%);
    z-index: 5;
  }

  @media (prefers-reduced-motion: reduce) {
    .title-block, .caption, .hud { animation: none; }
  }
  @media (max-width: 640px) {
    .caption .line { font-size: 0.72rem; }
    .hint { display: none; }
  }
</style>
</head>
<body>
<canvas id="stage"></canvas>
<div class="vignette"></div>
<div class="fader" id="fader"></div>

<div class="title-block">
  <h1>縁日</h1>
  <span class="sub">— 夏祭りの夜、参道にて —</span>
  <span class="seal">祭</span>
</div>

<div class="caption">
  <span class="line">提灯の灯りに誘われて、宵の参道をゆく。</span>
  <span class="line">祭囃子、綿菓子の甘い匂い、遠くに上がる花火。</span>
  <span class="stalls">金魚すくい ・ 射的 ・ ヨーヨー釣り ・ たこ焼き ・ かき氷 ・ りんご飴</span>
</div>

<div class="hud">
  <button class="sound-btn" id="soundBtn" aria-pressed="false">♪ 祭囃子を聴く</button>
  <span class="hint">マウスで見回す — 参道は自動でゆっくり進みます</span>
</div>

<script type="module">
import * as THREE from 'three';

/* ────────────────────────────────
   基本セットアップ
──────────────────────────────── */
const canvas = document.getElementById('stage');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.1;

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0a0716);
scene.fog = new THREE.Fog(0x0d0820, 14, 58);

const camera = new THREE.PerspectiveCamera(58, innerWidth / innerHeight, 0.1, 200);

const reducedMotion = matchMedia('(prefers-reduced-motion: reduce)').matches;

/* ────────────────────────────────
   Canvas テクスチャ工房
   （外部アセットなしで和の質感を作る）
──────────────────────────────── */
function canvasTexture(w, h, draw) {
  const c = document.createElement('canvas');
  c.width = w; c.height = h;
  draw(c.getContext('2d'), w, h);
  const tex = new THREE.CanvasTexture(c);
  tex.colorSpace = THREE.SRGBColorSpace;
  return tex;
}

/* 提灯の胴 — 赤地・骨の線・「祭」の文字 */
const lanternTex = canvasTexture(512, 256, (g, w, h) => {
  const grad = g.createLinearGradient(0, 0, 0, h);
  grad.addColorStop(0, '#7a1610');
  grad.addColorStop(0.18, '#e8452a');
  grad.addColorStop(0.5, '#ff6a3c');
  grad.addColorStop(0.82, '#e8452a');
  grad.addColorStop(1, '#7a1610');
  g.fillStyle = grad;
  g.fillRect(0, 0, w, h);
  // 骨（ひご）の横線
  g.strokeStyle = 'rgba(90, 12, 8, 0.55)';
  g.lineWidth = 2;
  for (let i = 1; i < 12; i++) {
    g.beginPath();
    g.moveTo(0, (h / 12) * i);
    g.lineTo(w, (h / 12) * i);
    g.stroke();
  }
  // 「祭」— 球面に一周巻かれるので 2 面に分けて描き、引き伸ばしを抑える
  g.fillStyle = '#1c0b06';
  g.font = '900 96px "Yuji Syuku", "Hiragino Mincho ProN", serif';
  g.textAlign = 'center';
  g.textBaseline = 'middle';
  g.save();
  g.translate(w * 0.25, h / 2 + 4);
  g.scale(0.62, 1);   // 横方向を予め縮めて UV の引き伸ばしを相殺
  g.fillText('祭', 0, 0);
  g.restore();
  g.save();
  g.translate(w * 0.75, h / 2 + 4);
  g.scale(0.62, 1);
  g.fillText('祭', 0, 0);
  g.restore();
});

/* 屋台の縦書き看板 */
function signTexture(chars, bg = '#f3ead8', fg = '#1c0b06', accent = '#c22a18') {
  return canvasTexture(128, 512, (g, w, h) => {
    g.fillStyle = bg;
    g.fillRect(0, 0, w, h);
    g.strokeStyle = accent;
    g.lineWidth = 10;
    g.strokeRect(5, 5, w - 10, h - 10);
    g.fillStyle = fg;
    const size = Math.min(84, (h - 90) / chars.length - 8);
    g.font = `800 ${size}px "Shippori Mincho B1", "Hiragino Mincho ProN", serif`;
    g.textAlign = 'center';
    g.textBaseline = 'middle';
    const totalH = chars.length * (size + 8);
    let y = (h - totalH) / 2 + size / 2;
    for (const ch of chars) {
      g.fillText(ch, w / 2, y);
      y += size + 8;
    }
  });
}

/* 紅白幕 */
const kouhakuTex = canvasTexture(512, 128, (g, w, h) => {
  const stripe = w / 8;
  for (let i = 0; i < 8; i++) {
    g.fillStyle = i % 2 === 0 ? '#c22a18' : '#f3ead8';
    g.fillRect(i * stripe, 0, stripe, h);
  }
  g.fillStyle = 'rgba(0,0,0,0.18)';
  g.fillRect(0, h - 14, w, 14);
});
kouhakuTex.wrapS = THREE.RepeatWrapping;

/* 柔らかい光のグロー（スプライト用） */
function glowTexture(inner, outer) {
  return canvasTexture(128, 128, (g, w, h) => {
    const grad = g.createRadialGradient(w/2, h/2, 2, w/2, h/2, w/2);
    grad.addColorStop(0, inner);
    grad.addColorStop(0.4, outer);
    grad.addColorStop(1, 'rgba(0,0,0,0)');
    g.fillStyle = grad;
    g.fillRect(0, 0, w, h);
  });
}
const warmGlowTex = glowTexture('rgba(255, 190, 110, 0.95)', 'rgba(255, 100, 40, 0.35)');
const sparkTex = glowTexture('rgba(255,255,255,1)', 'rgba(255,200,120,0.5)');

/* ────────────────────────────────
   ライティング — 提灯の暖色が主役
──────────────────────────────── */
scene.add(new THREE.AmbientLight(0x2a2140, 1.1));
const moonLight = new THREE.DirectionalLight(0x8899cc, 0.35);
moonLight.position.set(-6, 20, -10);
scene.add(moonLight);

// 実ライトは参道沿いに間引いて配置（残りは emissive + グローで擬似発光）
for (let z = 8; z >= -28; z -= 9) {
  const warm = new THREE.PointLight(0xff9a4d, 26, 26, 1.6);
  warm.position.set(0, 3.2, z);
  scene.add(warm);
}

/* ────────────────────────────────
   地面 — 踏み固められた参道
──────────────────────────────── */
const groundTex = canvasTexture(256, 256, (g, w, h) => {
  g.fillStyle = '#191320';
  g.fillRect(0, 0, w, h);
  for (let i = 0; i < 900; i++) {
    g.fillStyle = `rgba(${40 + Math.random()*35|0}, ${30 + Math.random()*25|0}, ${45 + Math.random()*30|0}, 0.5)`;
    g.fillRect(Math.random() * w, Math.random() * h, 2, 2);
  }
});
groundTex.wrapS = groundTex.wrapT = THREE.RepeatWrapping;
groundTex.repeat.set(8, 24);
const ground = new THREE.Mesh(
  new THREE.PlaneGeometry(40, 120),
  new THREE.MeshStandardMaterial({ map: groundTex, roughness: 0.92, metalness: 0 })
);
ground.rotation.x = -Math.PI / 2;
ground.position.z = -20;
scene.add(ground);

/* ────────────────────────────────
   提灯 — 参道を渡す連提灯
──────────────────────────────── */
const lanternGeo = new THREE.SphereGeometry(0.34, 20, 16);
lanternGeo.scale(1, 0.82, 1); // 少し潰して提灯らしく
const lanternMat = new THREE.MeshStandardMaterial({
  map: lanternTex,
  emissive: 0xff5a20,
  emissiveMap: lanternTex,
  emissiveIntensity: 1.35,
  roughness: 0.6,
});
const capGeo = new THREE.CylinderGeometry(0.16, 0.2, 0.07, 12);
const capMat = new THREE.MeshStandardMaterial({ color: 0x14100c, roughness: 0.8 });

const swayGroups = [];     // { group, phase }
const lanternPoints = [];  // 蛾の誘引先（提灯のワールド座標）

function lanternString(z, count = 7, height = 3.6) {
  const group = new THREE.Group();
  const span = 11;
  const pts = [];
  for (let i = 0; i < count; i++) {
    const t = i / (count - 1);
    const x = -span / 2 + span * t;
    // 緩いカテナリー
    const y = height - Math.sin(t * Math.PI) * 0.55;
    pts.push(new THREE.Vector3(x, y, 0));

    const lantern = new THREE.Mesh(lanternGeo, lanternMat);
    lantern.position.set(x, y - 0.42, 0);
    group.add(lantern);
    lanternPoints.push(new THREE.Vector3(x, y - 0.42, z));

    const capTop = new THREE.Mesh(capGeo, capMat);
    capTop.position.set(x, y - 0.12, 0);
    group.add(capTop);
    const capBot = new THREE.Mesh(capGeo, capMat);
    capBot.position.set(x, y - 0.72, 0);
    group.add(capBot);

    const glow = new THREE.Sprite(new THREE.SpriteMaterial({
      map: warmGlowTex, transparent: true, opacity: 0.55,
      blending: THREE.AdditiveBlending, depthWrite: false,
    }));
    glow.scale.setScalar(1.9);
    glow.position.set(x, y - 0.42, 0);
    group.add(glow);
  }
  // 電線
  const wire = new THREE.Line(
    new THREE.BufferGeometry().setFromPoints(pts),
    new THREE.LineBasicMaterial({ color: 0x241a14 })
  );
  group.add(wire);
  group.position.z = z;
  scene.add(group);
  swayGroups.push({ group, phase: z * 0.7 });
}
for (let z = 10; z >= -34; z -= 4.5) lanternString(z);

/* ────────────────────────────────
   屋台 — 定番の店を左右に並べる
──────────────────────────────── */
const stallNames = [
  ['金', '魚', 'す', 'く', 'い'],
  ['射', '的'],
  ['た', 'こ', '焼', 'き'],
  ['か', 'き', '氷'],
  ['り', 'ん', 'ご', '飴'],
  ['ヨ', 'ー', 'ヨ', 'ー'],
  ['焼', 'そ', 'ば'],
  ['わ', 'た', 'あ', 'め'],
];

const stallBodyMat = new THREE.MeshStandardMaterial({ color: 0x2a1d16, roughness: 0.85 });
const stallRoofMat = new THREE.MeshStandardMaterial({ color: 0x3d1410, roughness: 0.7 });
const stallInnerMat = new THREE.MeshStandardMaterial({
  color: 0xffd9a0, emissive: 0xff9a40, emissiveIntensity: 0.85, roughness: 1,
});
const kouhakuMat = new THREE.MeshStandardMaterial({ map: kouhakuTex, roughness: 0.9, side: THREE.DoubleSide });

/* 屋台はローカル +z を正面に組み、グループ回転で参道側へ向ける */
function stall(x, z, nameChars, side) {
  const s = new THREE.Group();

  // 本体（奥に光る営業中の腹）
  const body = new THREE.Mesh(new THREE.BoxGeometry(3.2, 2.1, 2.2), stallBodyMat);
  body.position.y = 1.05;
  s.add(body);
  const innerGlow = new THREE.Mesh(new THREE.PlaneGeometry(2.9, 1.5), stallInnerMat);
  innerGlow.position.set(0, 1.15, 1.12);
  s.add(innerGlow);

  // 屋根（前傾）
  const roof = new THREE.Mesh(new THREE.BoxGeometry(3.7, 0.12, 2.9), stallRoofMat);
  roof.position.set(0, 2.35, 0.25);
  roof.rotation.x = -0.16;
  s.add(roof);

  // 紅白幕（屋根の縁）
  const maku = new THREE.Mesh(new THREE.PlaneGeometry(3.7, 0.5), kouhakuMat);
  maku.position.set(0, 2.12, 1.55);
  s.add(maku);

  // 縦看板
  const signTex = signTexture(nameChars);
  const sign = new THREE.Mesh(
    new THREE.PlaneGeometry(0.55, 2.1),
    new THREE.MeshStandardMaterial({
      map: signTex,
      emissive: 0xffffff, emissiveMap: signTex, emissiveIntensity: 0.28,
      roughness: 0.9,
    })
  );
  sign.position.set(-1.45, 1.5, 1.16);
  s.add(sign);

  // 店先の裸電球
  const bulbGlow = new THREE.Sprite(new THREE.SpriteMaterial({
    map: warmGlowTex, transparent: true, opacity: 0.8,
    blending: THREE.AdditiveBlending, depthWrite: false,
  }));
  bulbGlow.scale.setScalar(1.4);
  bulbGlow.position.set(0.5, 2.0, 1.5);
  s.add(bulbGlow);

  s.position.set(x, 0, z);
  // 左列(side=-1)は +x（参道中央）、右列(side=1)は -x を向く
  s.rotation.y = -side * Math.PI / 2;
  scene.add(s);
}

stallNames.forEach((name, i) => {
  const side = i % 2 === 0 ? -1 : 1;              // 左右交互
  const z = 6 - Math.floor(i / 2) * 9.5 - (i % 2) * 4.5;
  stall(side * 5.4, z, name, side);
});

/* 屋台の位置を再導出（商品・人影の配置に使う）
   正面は参道中央向きなので、店先はモール内側の x 方向 */
function stallSpot(i) {
  const side = i % 2 === 0 ? -1 : 1;
  const z = 6 - Math.floor(i / 2) * 9.5 - (i % 2) * 4.5;
  return { x: side * 5.4, z, side, frontX: side * 5.4 - side * 1.6 };
}

/* ────────────────────────────────
   細部 1 — 屋台の商品
──────────────────────────────── */
const counterMat = new THREE.MeshStandardMaterial({ color: 0x4a3423, roughness: 0.85 });
function counter(x, z) {
  // 店先は参道向きなので、台の長辺は通りに沿わせる（z 方向）
  const table = new THREE.Mesh(new THREE.BoxGeometry(0.85, 0.1, 2.0), counterMat);
  table.position.set(x, 0.78, z);
  scene.add(table);
  return table;
}

/* 金魚すくい — 水槽と泳ぐ金魚 */
const goldfish = [];  // { mesh, cx, cz, r, speed, ph }
{
  const s = stallSpot(0);
  counter(s.frontX, s.z);
  const tank = new THREE.Mesh(
    new THREE.BoxGeometry(0.7, 0.36, 1.7),
    new THREE.MeshStandardMaterial({ color: 0x8fd8ff, transparent: true, opacity: 0.28, roughness: 0.15 })
  );
  tank.position.set(s.frontX, 1.02, s.z);
  scene.add(tank);
  const water = new THREE.Mesh(
    new THREE.PlaneGeometry(0.62, 1.62),
    new THREE.MeshStandardMaterial({ color: 0x5ab8e8, transparent: true, opacity: 0.5, roughness: 0.1 })
  );
  water.rotation.x = -Math.PI / 2;
  water.position.set(s.frontX, 1.16, s.z);
  scene.add(water);
  const fishGeo = new THREE.SphereGeometry(0.05, 8, 6);
  fishGeo.scale(1.6, 0.8, 0.8);
  const fishMat = new THREE.MeshStandardMaterial({ color: 0xff5a2a, emissive: 0x992200, emissiveIntensity: 0.4, roughness: 0.5 });
  for (let i = 0; i < 7; i++) {
    const f = new THREE.Mesh(fishGeo, fishMat);
    scene.add(f);
    goldfish.push({
      mesh: f, cx: s.frontX, cz: s.z,
      r: 0.18 + Math.random() * 0.5,
      speed: 0.5 + Math.random() * 0.8,
      ph: Math.random() * Math.PI * 2,
    });
  }
}

/* りんご飴 — 台に刺さった飴の列 */
{
  const s = stallSpot(4);
  counter(s.frontX, s.z);
  const stickMat = new THREE.MeshStandardMaterial({ color: 0xd8c8a8, roughness: 0.9 });
  const candyMat = new THREE.MeshStandardMaterial({
    color: 0xc41a1a, emissive: 0x550505, emissiveIntensity: 0.5, roughness: 0.12,
  });
  for (let row = 0; row < 2; row++) {
    for (let col = 0; col < 6; col++) {
      const x = s.frontX - 0.18 + row * 0.36;
      const z = s.z - 0.75 + col * 0.3;
      const stick = new THREE.Mesh(new THREE.CylinderGeometry(0.012, 0.012, 0.3, 6), stickMat);
      stick.position.set(x, 0.97, z);
      scene.add(stick);
      const candy = new THREE.Mesh(new THREE.SphereGeometry(0.085, 12, 10), candyMat);
      candy.position.set(x, 1.14, z);
      scene.add(candy);
    }
  }
}

/* ヨーヨー釣り — 桶に浮かぶ色とりどりのヨーヨー */
{
  const s = stallSpot(5);
  const tub = new THREE.Mesh(
    new THREE.CylinderGeometry(0.85, 0.7, 0.4, 20),
    new THREE.MeshStandardMaterial({ color: 0x3a6ea8, roughness: 0.6 })
  );
  tub.position.set(s.frontX, 0.2, s.z);
  scene.add(tub);
  const tubWater = new THREE.Mesh(
    new THREE.CircleGeometry(0.8, 20),
    new THREE.MeshStandardMaterial({ color: 0x6ac0e8, transparent: true, opacity: 0.6, roughness: 0.1 })
  );
  tubWater.rotation.x = -Math.PI / 2;
  tubWater.position.set(s.frontX, 0.38, s.z);
  scene.add(tubWater);
  const yoyoColors = [0xff4a6a, 0x4aa8ff, 0xffd24a, 0x7aff8a, 0xda6aff, 0xff8a3a];

const FIREWORK_COLORS = [0xffd27a, 0xff7a9e, 0x7ad7ff, 0xc4ff8a, 0xffb3f2];
const fireworks = [];

function burstFirework() {
  const n = 160;
  const origin = new THREE.Vector3(
    (Math.random() - 0.5) * 50,
    22 + Math.random() * 10,
    -60 - Math.random() * 25
  );
  const pos = new Float32Array(n * 3);
  const vel = [];
  for (let i = 0; i < n; i++) {
    pos[i*3] = origin.x; pos[i*3+1] = origin.y; pos[i*3+2] = origin.z;
    // 球状に均等散開
    const u = Math.random(), v = Math.random();
    const theta = 2 * Math.PI * u, phi = Math.acos(2 * v - 1);
    const speed = 4.5 + Math.random() * 2.5;
    vel.push(new THREE.Vector3(
      Math.sin(phi) * Math.cos(theta) * speed,
      Math.sin(phi) * Math.sin(theta) * speed,
      Math.cos(phi) * speed * 0.4
    ));
  }
  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
  const mat = new THREE.PointsMaterial({
    size: 0.55,
    map: sparkTex,
    color: FIREWORK_COLORS[Math.random() * FIREWORK_COLORS.length | 0],
    transparent: true, opacity: 1,
    blending: THREE.AdditiveBlending, depthWrite: false,
    fog: false,   // 花火は霧の far(58) より遠くで開く — 霧に飲ませない
  });
  const points = new THREE.Points(geo, mat);
  scene.add(points);
  fireworks.push({ points, vel, age: 0, life: 2.4 });
}

function updateFireworks(dt) {
  for (let i = fireworks.length - 1; i >= 0; i--) {
    const fw = fireworks[i];
    fw.age += dt;
    const p = fw.points.geometry.attributes.position;
    for (let j = 0; j < fw.vel.length; j++) {
      fw.vel[j].y -= 2.2 * dt;               // 重力
      fw.vel[j].multiplyScalar(0.985);       // 空気抵抗
      p.array[j*3]   += fw.vel[j].x * dt;
      p.array[j*3+1] += fw.vel[j].y * dt;
      p.array[j*3+2] += fw.vel[j].z * dt;
    }
    p.needsUpdate = true;
    fw.points.material.opacity = Math.max(0, 1 - (fw.age / fw.life) ** 1.4);
    if (fw.age >= fw.life) {
      scene.remove(fw.points);
      fw.points.geometry.dispose();
      fw.points.material.dispose();
      fireworks.splice(i, 1);
    }
  }
}

/* ────────────────────────────────
   祭囃子 — WebAudio で合成（外部音源なし）
──────────────────────────────── */
let audioCtx = null, audioOn = false, schedulerId = null, crowdNodes = null;

function makeAudio() {
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  const master = audioCtx.createGain();
  master.gain.value = 0.5;
  master.connect(audioCtx.destination);

  // 雑踏 — ブラウンノイズをローパスで
  const bufLen = audioCtx.sampleRate * 2;
  const noiseBuf = audioCtx.createBuffer(1, bufLen, audioCtx.sampleRate);
  const data = noiseBuf.getChannelData(0);
  let last = 0;
  for (let i = 0; i < bufLen; i++) {
    const white = Math.random() * 2 - 1;
    last = (last + 0.02 * white) / 1.02;
    data[i] = last * 3.2;
  }
  const crowd = audioCtx.createBufferSource();
  crowd.buffer = noiseBuf; crowd.loop = true;
  const crowdFilter = audioCtx.createBiquadFilter();
  crowdFilter.type = 'lowpass'; crowdFilter.frequency.value = 480;
  const crowdGain = audioCtx.createGain();
  crowdGain.gain.value = 0.14;
  crowd.connect(crowdFilter).connect(crowdGain).connect(master);
  crowd.start();
  crowdNodes = { crowd, crowdGain };

  // 太鼓
  function taiko(time, freq = 74, vol = 0.9) {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(freq * 2.2, time);
    osc.frequency.exponentialRampToValueAtTime(freq, time + 0.06);
    gain.gain.setValueAtTime(vol, time);
    gain.gain.exponentialRampToValueAtTime(0.001, time + 0.34);
    osc.connect(gain).connect(master);
    osc.start(time); osc.stop(time + 0.4);
  }
  // 締太鼓（カッ）
  function ka(time, vol = 0.32) {
    const src = audioCtx.createBufferSource();
    src.buffer = noiseBuf;
    const bp = audioCtx.createBiquadFilter();
    bp.type = 'bandpass'; bp.frequency.value = 2600; bp.Q.value = 3;
    const gain = audioCtx.createGain();
    gain.gain.setValueAtTime(vol, time);
    gain.gain.exponentialRampToValueAtTime(0.001, time + 0.09);
    src.connect(bp).connect(gain).connect(master);
    src.start(time); src.stop(time + 0.12);
  }
  // 当たり鉦（チン）
  function kane(time, vol = 0.1) {
    const osc = audioCtx.createOscillator();
    osc.type = 'triangle';
    osc.frequency.value = 2093;
    const gain = audioCtx.createGain();
    gain.gain.setValueAtTime(vol, time);
    gain.gain.exponentialRampToValueAtTime(0.001, time + 0.5);
    osc.connect(gain).connect(master);
    osc.start(time); osc.stop(time + 0.55);
  }

  // 風鈴 — 高い倍音のチリンを時折
  function furin(time) {
    for (const [ratio, vol] of [[1, 0.045], [2.76, 0.02], [5.4, 0.008]]) {
      const osc = audioCtx.createOscillator();
      osc.type = 'sine';
      osc.frequency.value = 3140 * ratio * (0.98 + Math.random() * 0.04);
      const gain = audioCtx.createGain();
      gain.gain.setValueAtTime(vol, time);
      gain.gain.exponentialRampToValueAtTime(0.0005, time + 1.8);
      osc.connect(gain).connect(master);
      osc.start(time); osc.stop(time + 1.9);
    }
  }
  setInterval(() => {
    if (audioOn && Math.random() < 0.65) furin(audioCtx.currentTime + Math.random() * 2);
  }, 7000);

  // 篠笛 — 律音階の短い旋律をときどき
  const FUE_SCALE = [587.33, 659.25, 783.99, 880.0, 987.77, 1174.66];
  function fuePhrase(time) {
    let tCur = time;
    const len = 5 + (Math.random() * 3 | 0);
    let idx = 2 + (Math.random() * 2 | 0);
    for (let i = 0; i < len; i++) {
      idx = Math.max(0, Math.min(FUE_SCALE.length - 1, idx + (Math.random() * 3 | 0) - 1));
      const dur = i === len - 1 ? 0.9 : [0.22, 0.32, 0.45][Math.random() * 3 | 0];
      const osc = audioCtx.createOscillator();
      osc.type = 'triangle';
      osc.frequency.value = FUE_SCALE[idx];
      const vib = audioCtx.createOscillator();
      vib.frequency.value = 5.5;
      const vibGain = audioCtx.createGain();
      vibGain.gain.value = 5;
      vib.connect(vibGain).connect(osc.frequency);
      const lp = audioCtx.createBiquadFilter();
      lp.type = 'lowpass'; lp.frequency.value = 2600;
      const gain = audioCtx.createGain();
      gain.gain.setValueAtTime(0.0001, tCur);
      gain.gain.exponentialRampToValueAtTime(0.055, tCur + 0.05);
      gain.gain.setValueAtTime(0.055, tCur + dur - 0.06);
      gain.gain.exponentialRampToValueAtTime(0.0005, tCur + dur);
      osc.connect(lp).connect(gain).connect(master);
      vib.start(tCur); vib.stop(tCur + dur);
      osc.start(tCur); osc.stop(tCur + dur);
      tCur += dur + 0.02;
    }
  }
  setInterval(() => {
    if (audioOn && Math.random() < 0.7) fuePhrase(audioCtx.currentTime + 0.2);
  }, 12000);

  // 「ドン・ドン・カッ・ドン | ドン・カッ・カッ・チン」を先読みスケジュール
  const BEAT = 0.42;
  let bar = 0, nextBarTime = audioCtx.currentTime + 0.1;
  function schedule() {
    while (nextBarTime < audioCtx.currentTime + 1.2) {
      const t = nextBarTime;
      if (bar % 2 === 0) {
        taiko(t); taiko(t + BEAT); ka(t + BEAT * 2); taiko(t + BEAT * 3);
      } else {
        taiko(t); ka(t + BEAT * 1.5); ka(t + BEAT * 2); kane(t + BEAT * 3);
      }
      bar++;
      nextBarTime += BEAT * 4;
    }
  }
  schedulerId = setInterval(schedule, 250);
  schedule();
}

/* ────────────────────────────────
   メインループ
──────────────────────────────── */
const clock = new THREE.Clock();
let readyLogged = false;

renderer.setAnimationLoop(() => {
  const dt = Math.min(clock.getDelta(), 0.05);
  const t = clock.elapsedTime;

  // 提灯の揺れ（夜風）
  if (!reducedMotion) {
    for (const { group, phase } of swayGroups) {
      group.rotation.z = Math.sin(t * 0.7 + phase) * 0.022;
    }

    // 金魚 — 水槽（長辺 z 方向）の中をゆっくり回遊
    for (const f of goldfish) {
      const a = t * f.speed + f.ph;
      f.mesh.position.set(
        f.cx + Math.cos(a) * f.r * 0.32,
        1.05 + Math.sin(t * 1.7 + f.ph) * 0.02,
        f.cz + Math.sin(a) * f.r
      );
      f.mesh.rotation.y = Math.atan2(Math.cos(a) * f.r, -Math.sin(a) * f.r * 0.32);
    }

    // のぼり旗 — 風のはためき（上端固定・裾ほど大きく揺れる）
    for (const { mesh, base } of noboris) {
      const p = mesh.geometry.attributes.position;
      for (let i = 0; i < p.count; i++) {
        const bx = base[i*3], by = base[i*3+1];
        const droop = (1.15 - by) / 2.3;       // 上端 0 → 裾 1
        p.array[i*3+2] = Math.sin(by * 3.2 + t * 3.4) * 0.12 * droop
                       + Math.sin(bx * 5.0 + t * 5.2) * 0.05 * droop;
      }
      p.needsUpdate = true;
      mesh.geometry.computeVertexNormals();
    }

    // 蛾 — 提灯のまわりを不規則に舞う
    for (const m of moths) {
      m.sprite.position.set(
        m.c.x + Math.sin(t * m.s1 + m.ph) * m.r,
        m.c.y + Math.sin(t * m.s2 + m.ph * 2) * 0.2,
        m.c.z + Math.cos(t * m.s1 + m.ph) * m.r * 0.5
      );
    }

    // 火の粉 — ゆらゆら上昇して消える
    {
      const p = emberPoints.geometry.attributes.position;
      for (let i = 0; i < emberVel.length; i++) {
        p.array[i*3+1] += emberVel[i] * dt;
        p.array[i*3]   += Math.sin(t * 0.8 + i) * 0.12 * dt;
        if (p.array[i*3+1] > 5.5) p.array[i*3+1] = 0.1;
      }
      p.needsUpdate = true;
    }

    // 人影 — かすかな佇まいの揺れ
    for (const f of figures) {
      f.group.position.y = Math.sin(t * 1.3 + f.ph) * 0.012;
    }

    // 雲 — 月の前をゆっくり流れる
    for (const c of clouds) {
      c.mesh.position.x += c.speed * dt;
      if (c.mesh.position.x > 40) c.mesh.position.x = -40;
    }
  }

  // 花火（2.8秒に1発ほど）
  if (!reducedMotion && Math.random() < dt / 2.8) burstFirework();
  updateFireworks(dt);

  // 散策
  if (!reducedMotion && !fading) {
    walkZ -= WALK_SPEED * dt;
    if (walkZ < WALK_END) {
      fading = true;
      fader.classList.add('on');
      setTimeout(() => {
        walkZ = WALK_START;
        camera.position.z = WALK_START;
        setTimeout(() => { fader.classList.remove('on'); fading = false; }, 150);
      }, 750);
    }
  }

  // 見回し（0.12 = 機敏な追従）
  lookX += (lookTargetX - lookX) * 0.12;
  lookY += (lookTargetY - lookY) * 0.12;

  const bob = reducedMotion ? 0 : Math.sin(t * 1.9) * 0.035; // 歩行の上下動
  camera.position.z = walkZ;
  camera.position.y = 1.55 + bob;
  camera.position.x = lookX * 0.6;
  camera.lookAt(lookX * 4.5, 1.7 - lookY * 2.4, walkZ - 10);

  renderer.render(scene, camera);

  if (!readyLogged) { console.log('[site] ready'); readyLogged = true; }
});

addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});
</script>
</body>
</html>
