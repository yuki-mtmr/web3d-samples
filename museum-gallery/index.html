<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>白の回廊 | Museum Gallery</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🖼️</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho+B1:wght@400;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      min-height: 100%;
      width: 100%;
      background: #ffffff;
      font-family: 'Shippori Mincho B1', serif;
      color: #000;
      overflow-x: hidden;
    }
    canvas {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      display: block;
    }
    .scroll-space {
      position: relative;
      height: 600vh;
      z-index: 1;
    }
    .progress-bar {
      position: fixed;
      top: 0;
      left: 0;
      height: 2px;
      background: #000;
      transform-origin: left;
      z-index: 100;
    }
    .wordmark {
      position: fixed;
      top: 20px;
      left: 20px;
      font-size: 18px;
      font-weight: 700;
      z-index: 99;
      letter-spacing: 2px;
    }
    .hint {
      position: fixed;
      bottom: 20px;
      right: 20px;
      font-size: 12px;
      z-index: 99;
      opacity: 0.6;
    }
    .caption-bar {
      position: fixed;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 100%;
      max-width: 600px;
      padding: 20px;
      text-align: center;
      background: rgba(255, 255, 255, 0.8);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-top: 1px solid rgba(0, 0, 0, 0.1);
      z-index: 99;
    }
    .caption-title {
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 4px;
    }
    .caption-subtitle {
      font-size: 12px;
      opacity: 0.7;
    }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>
  <div class="scroll-space"></div>
  <div class="progress-bar"></div>
  <div class="wordmark">白の回廊</div>
  <div class="hint">「スクロールで進む」</div>
  <div class="caption-bar">
    <div class="caption-title"></div>
    <div class="caption-subtitle"></div>
  </div>

  <script type="importmap">
  {"imports":{"three":"https://unpkg.com/three@0.160.0/build/three.module.js","three/addons/":"https://unpkg.com/three@0.160.0/examples/jsm/"}}
  </script>

  <script type="module">
    import * as THREE from 'three';

    // Artwork metadata
    const artworks = [
      { title: '作品 I', subtitle: 'Whispers of Dawn' },
      { title: '作品 II', subtitle: 'Echo of Silence' },
      { title: '作品 III', subtitle: 'Light Between' },
      { title: '作品 IV', subtitle: 'Void Eternal' },
      { title: '作品 V', subtitle: 'Stillness Flows' },
      { title: '作品 VI', subtitle: 'Fragments Fade' },
      { title: '作品 VII', subtitle: 'Colors Dream' },
      { title: '作品 VIII', subtitle: 'Shadows Dance' },
      { title: '作品 IX', subtitle: 'Depths Unknown' },
      { title: '作品 X', subtitle: 'End Begins' }
    ];

    // Color palettes
    const palettes = [
      ['#c8b6db', '#d4a5d4', '#e8d5e8', '#f0e6f0'],
      ['#d4a574', '#e8b87a', '#f0d9b5', '#f5ead6'],
      ['#a8d8db', '#b8e0e3', '#d0e8eb', '#e8f4f7']
    ];

    // Generate unique procedural texture for each artwork
    function generateArtworkTexture(index) {
      const canvas = document.createElement('canvas');
      canvas.width = 256;
      canvas.height = 180;
      const ctx = canvas.getContext('2d');

      // Seeded random using index
      const seed = index * 12345;
      function seededRandom(offset) {
        return Math.sin(seed + offset) * 0.5 + 0.5;
      }

      // Select palette
      const palette = palettes[index % palettes.length];
      ctx.fillStyle = palette[0];
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      // Draw layered translucent elements
      for (let i = 0; i < 5; i++) {
        ctx.globalAlpha = 0.3 + seededRandom(i) * 0.4;
        ctx.fillStyle = palette[1 + (i % (palette.length - 1))];

        if (i % 3 === 0) {
          // Circles
          const x = seededRandom(i * 100) * canvas.width;
          const y = seededRandom(i * 200) * canvas.height;
          const r = seededRandom(i * 300) * 60 + 20;
          ctx.beginPath();
          ctx.arc(x, y, r, 0, Math.PI * 2);
          ctx.fill();
        } else if (i % 3 === 1) {
          // Arcs
          const x = seededRandom(i * 100) * canvas.width;
          const y = seededRandom(i * 200) * canvas.height;
          const r = seededRandom(i * 300) * 60 + 20;
          const start = seededRandom(i * 400) * Math.PI * 2;
          const end = start + Math.PI + seededRandom(i * 500) * Math.PI;
          ctx.lineWidth = 3 + seededRandom(i * 600) * 4;
          ctx.beginPath();
          ctx.arc(x, y, r, start, end);
          ctx.stroke();
        } else {
          // Stripes
          const angle = seededRandom(i * 100) * Math.PI;
          ctx.save();
          ctx.translate(canvas.width / 2, canvas.height / 2);
          ctx.rotate(angle);
          for (let j = -300; j < 300; j += 15) {
            ctx.fillRect(j, -2, 8, 4);
          }
          ctx.restore();
        }
      }

      ctx.globalAlpha = 1;
      const texture = new THREE.CanvasTexture(canvas);
      texture.magFilter = THREE.LinearFilter;
      texture.minFilter = THREE.LinearFilter;
      return texture;
    }

    // Scene setup
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0xffffff);
    scene.fog = new THREE.Fog(0xffffff, 80, 120);

    const canvas = document.getElementById('canvas');
    let width = window.innerWidth;
    let height = window.innerHeight;
    const pixelRatio = Math.min(window.devicePixelRatio, 2);

    const camera = new THREE.PerspectiveCamera(75, width / height, 0.1, 1000);
    camera.position.set(0, 2, 10);
    camera.lookAt(0, 2, 2);

    const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
    renderer.setPixelRatio(pixelRatio);
    renderer.setSize(width, height);
    renderer.shadowMap.enabled = true;

    // Floor: warm wood, z from 12 to -48 (centered at -18)
    const floorGeom = new THREE.PlaneGeometry(8, 70);
    const floorMat = new THREE.MeshStandardMaterial({
      color: 0x9a7a55,
      roughness: 0.9
    });
    const floor = new THREE.Mesh(floorGeom, floorMat);
    floor.rotation.x = -Math.PI / 2;
    floor.position.z = -18;
    floor.castShadow = true;
    floor.receiveShadow = true;
    scene.add(floor);

    // Walls: off-white, height 6
    const wallHeight = 6;
    const wallGeom = new THREE.PlaneGeometry(60, wallHeight);
    const wallMat = new THREE.MeshStandardMaterial({
      color: 0xf0ebe2,
      roughness: 0.8
    });

    const leftWall = new THREE.Mesh(wallGeom, wallMat);
    leftWall.position.set(-4, wallHeight / 2, -18);
    leftWall.rotation.y = Math.PI / 2;
    leftWall.receiveShadow = true;
    scene.add(leftWall);

    const rightWall = new THREE.Mesh(wallGeom, wallMat);
    rightWall.position.set(4, wallHeight / 2, -18);
    rightWall.rotation.y = -Math.PI / 2;
    rightWall.receiveShadow = true;
    scene.add(rightWall);

    // Ceiling
    const ceilingGeom = new THREE.PlaneGeometry(8, 60);
    const ceilingMat = new THREE.MeshStandardMaterial({
      color: 0xf5f3f0,
      roughness: 0.9
    });
    const ceiling = new THREE.Mesh(ceilingGeom, ceilingMat);
    ceiling.rotation.x = Math.PI / 2;
    ceiling.position.set(0, wallHeight, -18);
    ceiling.receiveShadow = true;
    scene.add(ceiling);

    // 突き当たりの壁（背景の白抜けを防ぐ）
    const endWall = new THREE.Mesh(
      new THREE.PlaneGeometry(8.4, wallHeight + 0.4),
      new THREE.MeshStandardMaterial({ color: 0xf0ebe2, roughness: 0.95 })
    );
    endWall.position.set(0, wallHeight / 2, -48);
    scene.add(endWall);

    // Lighting: 6 warm PointLights along corridor
    const lightPositions = [6, 0, -6, -12, -18, -24];
    const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
    scene.add(ambientLight);

    lightPositions.forEach((z) => {
      const light = new THREE.PointLight(0xf5e6d3, 8, 12);
      light.position.set(0, 3, z);
      light.castShadow = true;
      scene.add(light);
    });

    // Artworks: 10 paintings alternating left/right every 5.5 units
    const artworkGroup = new THREE.Group();
    scene.add(artworkGroup);

    for (let i = 0; i < 10; i++) {
      const z = 12 - i * 5.5;
      const x = i % 2 === 0 ? -3 : 3;

      // Dark frame
      const frameGeom = new THREE.BoxGeometry(2.3, 1.7, 0.08);
      const frameMat = new THREE.MeshStandardMaterial({
        color: 0x1a1a1a,
        roughness: 0.4
      });
      const frame = new THREE.Mesh(frameGeom, frameMat);
      frame.position.set(x, 3.2, z);
      frame.castShadow = true;
      artworkGroup.add(frame);

      // Canvas with generative texture
      const canvasTexture = generateArtworkTexture(i);
      const canvasMat = new THREE.MeshStandardMaterial({
        map: canvasTexture,
        roughness: 0.8
      });
      const canvasGeom = new THREE.PlaneGeometry(2, 1.4);
      const canvasMesh = new THREE.Mesh(canvasGeom, canvasMat);
      canvasMesh.position.set(x, 3.2, z + 0.06);
      canvasMesh.castShadow = true;
      artworkGroup.add(canvasMesh);

      // Caption plaque
      const plaqueGeom = new THREE.PlaneGeometry(0.7, 0.18);
      const plaqueMat = new THREE.MeshStandardMaterial({
        color: 0xf0ebe2,
        roughness: 0.6
      });
      const plaque = new THREE.Mesh(plaqueGeom, plaqueMat);
      plaque.position.set(x, 2.2, z + 0.05);
      plaque.castShadow = true;
      artworkGroup.add(plaque);
    }

    // Caption bar UI
    const captionTitle = document.querySelector('.caption-title');
    const captionSubtitle = document.querySelector('.caption-subtitle');
    let lastArtworkIndex = -1;

    function updateCaption() {
      const targetZ = camera.position.z - 6;
      let nearestIndex = 0;
      let nearestDist = Infinity;

      for (let i = 0; i < 10; i++) {
        const z = 12 - i * 5.5;
        const dist = Math.abs(targetZ - z);
        if (dist < nearestDist) {
          nearestDist = dist;
          nearestIndex = i;
        }
      }

      if (nearestIndex !== lastArtworkIndex) {
        lastArtworkIndex = nearestIndex;
        captionTitle.textContent = artworks[nearestIndex].title;
        captionSubtitle.textContent = artworks[nearestIndex].subtitle;
      }
    }

    // Check for reduced motion preference
    const prefersReducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

    // Animation loop: scroll-driven camera
    function animate() {
      requestAnimationFrame(animate);

      const scrollY = window.scrollY;
      const scrollHeight = Math.max(document.documentElement.scrollHeight - innerHeight, 1);
      const p = scrollY / scrollHeight;

      // Scroll-driven camera movement
      camera.position.z = 10 - p * 44;
      camera.position.y = 2;
      // Remove sway if prefers-reduced-motion
      if (!prefersReducedMotion) {
        camera.position.x = Math.sin(p * 12) * 0.4;
      } else {
        camera.position.x = 0;
      }
      camera.lookAt(0, 2, camera.position.z - 8);

      // Update progress bar
      const progressBar = document.querySelector('.progress-bar');
      progressBar.style.transform = `scaleX(${p})`;

      updateCaption();
      renderer.render(scene, camera);
    }

    animate();

    // Resize handler
    window.addEventListener('resize', () => {
      width = window.innerWidth;
      height = window.innerHeight;
      camera.aspect = width / height;
      camera.updateProjectionMatrix();
      renderer.setSize(width, height);
    });

    console.log('[site] ready');
  </script>
</body>
</html>
