<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="An interactive dark luxury landing page with 3D particle waves">
  <title>Particle Field – Digital Elegance</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&display=swap" rel="stylesheet">
  <script type="importmap">
  {"imports":{"three":"https://unpkg.com/three@0.160.0/build/three.module.js","three/addons/":"https://unpkg.com/three@0.160.0/examples/jsm/"}}
  </script>
  <style>
    :root {
      --bg-dark: #0c0b09;
      --particle-gold: #d4af6a;
      --accent-light: #e8dcc8;
      --text-dark: #1a1815;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      background: var(--bg-dark);
      color: var(--text-dark);
      font-family: 'Cormorant Garamond', serif;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    canvas {
      display: block;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
    }

    .content {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 3rem 4rem;
      z-index: 10;
    }

    .wordmark {
      align-self: center;
      font-size: 0.85rem;
      font-weight: 400;
      font-variant: small-caps;
      letter-spacing: 0.15em;
      color: var(--particle-gold);
      opacity: 0.75;
      text-transform: uppercase;
    }

    .hero {
      flex: 1;
      display: flex;
      align-items: center;
    }

    .hero-content {
      max-width: 60%;
    }

    .headline {
      font-size: clamp(3.5rem, 8vw, 6rem);
      font-weight: 300;
      line-height: 1.15;
      color: var(--accent-light);
      margin-bottom: 1.5rem;
      letter-spacing: -0.02em;
    }

    .subcopy {
      font-size: 1.15rem;
      color: var(--particle-gold);
      margin-bottom: 2.5rem;
      opacity: 0.7;
      font-weight: 300;
    }

    .cta {
      font-size: 0.95rem;
      color: var(--particle-gold);
      text-decoration: none;
      position: relative;
      display: inline-block;
      pointer-events: all;
      font-variant: small-caps;
      letter-spacing: 0.1em;
      font-weight: 400;
      text-transform: uppercase;
      transition: color 0.3s ease;
    }

    .cta::after {
      content: '';
      position: absolute;
      bottom: -6px;
      left: 0;
      width: 0%;
      height: 1px;
      background: var(--particle-gold);
      transition: width 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .cta:hover {
      color: var(--accent-light);
    }

    .cta:hover::after {
      width: 100%;
    }

    .footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.75rem;
      font-weight: 400;
      font-variant: small-caps;
      letter-spacing: 0.12em;
      color: var(--particle-gold);
      opacity: 0.55;
      text-transform: uppercase;
    }

    .footer-item {
      pointer-events: all;
      flex: 1;
    }

    .footer-item:nth-child(2) {
      text-align: center;
    }

    .footer-item:nth-child(3) {
      text-align: right;
    }

    @media (prefers-reduced-motion: reduce) {
      .cta::after {
        width: 100%;
      }
    }

    @media (max-width: 768px) {
      .content {
        padding: 2rem;
      }

      .hero-content {
        max-width: 90%;
      }

      .headline {
        font-size: clamp(2.5rem, 6vw, 4rem);
      }

      .footer {
        flex-direction: column;
        gap: 0.8rem;
        text-align: center;
      }

      .footer-item:nth-child(2) {
        text-align: center;
      }

      .footer-item:nth-child(3) {
        text-align: center;
      }
    }

    @media (max-width: 480px) {
      .content {
        padding: 1.5rem;
      }

      .wordmark {
        font-size: 0.75rem;
      }

      .headline {
        font-size: clamp(2rem, 5vw, 3rem);
        margin-bottom: 1rem;
      }

      .subcopy {
        font-size: 1rem;
        margin-bottom: 1.5rem;
      }

      .cta {
        font-size: 0.85rem;
      }

      .footer {
        font-size: 0.65rem;
      }
    }
  </style>
</head>
<body>
  <div class="content">
    <div class="wordmark">Particle Field</div>
    <div class="hero">
      <div class="hero-content">
        <h1 class="headline">Digital Elegance in Motion</h1>
        <p class="subcopy">光と粒子が織りなす空間</p>
        <a href="#" class="cta">Explore the Experience</a>
      </div>
    </div>
    <div class="footer">
      <div class="footer-item">Est. 2026</div>
      <div class="footer-item">Tokyo Digital</div>
      <div class="footer-item">© All Rights Reserved</div>
    </div>
  </div>

  <script type="module">
    import * as THREE from 'three';

    // Scene setup
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(
      55,
      window.innerWidth / window.innerHeight,
      0.1,
      100
    );
    const renderer = new THREE.WebGLRenderer({
      antialias: true,
      alpha: false,
      powerPreference: 'high-performance'
    });

    camera.position.set(0, 2.2, 6);

    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setClearColor(0x0c0b09, 1);
    renderer.toneMappingExposure = 1.0;
    document.body.appendChild(renderer.domElement);

    // Add fog
    scene.fog = new THREE.Fog(0x0c0b09, 6, 14);

    // Particle field geometry
    const gridWidth = 120;
    const gridHeight = 100;
    const spacing = 0.18;
    const positions = new Float32Array(gridWidth * gridHeight * 3);
    const initialPositions = new Float32Array(gridWidth * gridHeight * 3);

    let index = 0;
    for (let z = 0; z < gridHeight; z++) {
      for (let x = 0; x < gridWidth; x++) {
        const posX = (x - gridWidth / 2) * spacing;
        const posZ = (z - gridHeight / 2) * spacing;
        const posY = 0;

        positions[index * 3] = posX;
        positions[index * 3 + 1] = posY;
        positions[index * 3 + 2] = posZ;

        initialPositions[index * 3] = posX;
        initialPositions[index * 3 + 1] = posY;
        initialPositions[index * 3 + 2] = posZ;

        index++;
      }
    }

    const geometry = new THREE.BufferGeometry();
    geometry.setAttribute(
      'position',
      new THREE.BufferAttribute(positions, 3)
    );

    const material = new THREE.PointsMaterial({
      size: 0.02,
      color: 0xd4af6a,
      transparent: true,
      opacity: 0.85,
      depthWrite: false,
      sizeAttenuation: true
    });

    const particleField = new THREE.Points(geometry, material);
    scene.add(particleField);

    // Clock for animation
    const clock = new THREE.Clock();

    // Check for reduced motion preference
    const prefersReducedMotion = window.matchMedia(
      '(prefers-reduced-motion: reduce)'
    ).matches;

    // Mouse tracking for parallax
    let mouseX = 0;
    let mouseY = 0;
    let targetCameraX = 0;
    let targetCameraY = 0;

    window.addEventListener('pointermove', (event) => {
      if (!prefersReducedMotion) {
        mouseX = (event.clientX / window.innerWidth) * 2 - 1;
        mouseY = -(event.clientY / window.innerHeight) * 2 + 1;
        targetCameraX = mouseX * 0.5;
        targetCameraY = mouseY * 0.3;
      }
    });

    // Handle window resize
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    });

    let readyLogged = false;

    // Animation loop
    renderer.setAnimationLoop(() => {
      const elapsed = clock.getElapsedTime();
      const t = prefersReducedMotion ? 0 : elapsed;

      // Update particle positions with wave animation
      const posAttr = geometry.getAttribute('position');
      const pos = posAttr.array;

      for (let i = 0; i < gridWidth * gridHeight; i++) {
        const x = initialPositions[i * 3];
        const z = initialPositions[i * 3 + 2];

        const y = Math.sin(x * 0.6 + t) * Math.cos(z * 0.4 + t * 0.7) * 0.35;

        pos[i * 3 + 1] = y;
      }
      posAttr.needsUpdate = true;

      // Mouse parallax with easing
      camera.position.x += (targetCameraX - camera.position.x) * 0.03;
      camera.position.y += (targetCameraY - camera.position.y) * 0.03;
      camera.lookAt(0, 0, 0);

      renderer.render(scene, camera);

      if (!readyLogged) {
        console.log('[site] ready');
        readyLogged = true;
      }
    });
  </script>
</body>
</html>
