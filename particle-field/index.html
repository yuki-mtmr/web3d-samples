<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="An interactive dark luxury landing page with 3D particle waves">
  <title>Particle Field – Digital Elegance</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>✨</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&display=swap" rel="stylesheet">
  <script type="importmap">
  {"imports":{"three":"https://unpkg.com/three@0.160.0/build/three.module.js","three/addons/":"https://unpkg.com/three@0.160.0/examples/jsm/"}}
  </script>
  <style>
    :root {
      --bg-dark: #0c0b09;
      --particle-gold: #d4af6a;
      --accent-light: #e8dcc8;
      --text-dark: #1a1815;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      background: var(--bg-dark);
      color: var(--text-dark);
      font-family: 'Cormorant Garamond', serif;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    canvas {
      display: block;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
    }

    .content {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 3rem 4rem;
      z-index: 10;
    }

    .wordmark {
      align-self: center;
      font-size: 0.85rem;
      font-weight: 400;
      font-variant: small-caps;
      letter-spacing: 0.15em;
      color: var(--particle-gold);
      opacity: 0.75;
      text-transform: uppercase;
    }

    .hero {
      flex: 1;
      display: flex;
      align-items: center;
    }

    .hero-content {
      max-width: 60%;
    }

    .headline {
      font-size: clamp(3.5rem, 8vw, 6rem);
      font-weight: 300;
      line-height: 1.15;
      background: linear-gradient(105deg, #f0e0c0, #d4af6a 55%, #9a7b45);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 1.5rem;
      letter-spacing: -0.02em;
      clip-path: inset(0 0 100% 0);
      animation: revealHeadline 900ms cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    @keyframes revealHeadline {
      from {
        clip-path: inset(0 0 100% 0);
      }
      to {
        clip-path: inset(0 0 0% 0);
      }
    }

    .subcopy {
      font-size: 1.15rem;
      color: var(--particle-gold);
      margin-bottom: 2.5rem;
      opacity: 0.7;
      font-weight: 300;
      clip-path: inset(0 0 100% 0);
      animation: revealHeadline 900ms cubic-bezier(0.16, 1, 0.3, 1) forwards 150ms;
      animation-fill-mode: both;
    }

    .cta {
      font-size: 0.95rem;
      color: var(--particle-gold);
      text-decoration: none;
      position: relative;
      display: inline-block;
      pointer-events: all;
      font-variant: small-caps;
      letter-spacing: 0.1em;
      font-weight: 400;
      text-transform: uppercase;
      transition: color 0.3s ease, letter-spacing 0.4s ease;
      clip-path: inset(0 0 100% 0);
      animation: revealHeadline 900ms cubic-bezier(0.16, 1, 0.3, 1) forwards 300ms;
      animation-fill-mode: both;
    }

    .cta::after {
      content: '';
      position: absolute;
      bottom: -6px;
      left: 0;
      height: 1px;
      background: var(--particle-gold);
      transform: scaleX(0);
      transform-origin: left;
      transition: transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .cta:hover {
      color: var(--accent-light);
      letter-spacing: 0.2em;
    }

    .cta:hover::after {
      transform: scaleX(1);
    }

    .footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.75rem;
      font-weight: 400;
      font-variant: small-caps;
      letter-spacing: 0.12em;
      color: var(--particle-gold);
      opacity: 0.55;
      text-transform: uppercase;
      gap: 2rem;
    }

    .footer-item {
      pointer-events: all;
      flex: 1;
      position: relative;
      padding-left: 1.2rem;
    }

    .footer-item::before {
      content: '';
      position: absolute;
      left: 0;
      top: 50%;
      transform: translateY(-50%);
      width: 1px;
      height: 0.8em;
      background: var(--particle-gold);
      opacity: 0.4;
    }

    .footer-item:nth-child(1)::before {
      display: none;
    }

    .footer-item:nth-child(2) {
      text-align: center;
      flex: 0 1 auto;
      padding-left: 0;
    }

    .footer-item:nth-child(2)::before {
      content: '◆';
      position: static;
      transform: none;
      width: auto;
      height: auto;
      background: none;
      font-size: 0.5rem;
      margin: 0 0.6rem;
      opacity: 0.4;
      display: inline;
    }

    .footer-item:nth-child(3) {
      text-align: right;
    }

    .vignette {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      background: radial-gradient(transparent 55%, rgba(0, 0, 0, 0.55));
      z-index: 5;
    }

    .frame {
      position: fixed;
      top: 20px;
      left: 20px;
      right: 20px;
      bottom: 20px;
      border: 1px solid rgba(212, 175, 106, 0.25);
      pointer-events: none;
      z-index: 4;
    }

    @media (max-width: 640px) {
      .frame {
        display: none;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .headline {
        clip-path: none;
        animation: none;
      }

      .subcopy {
        clip-path: none;
        animation: none;
      }

      .cta {
        clip-path: none;
        animation: none;
      }

      .cta::after {
        transform: scaleX(1);
      }

      @keyframes revealHeadline {
        from {
          clip-path: inset(0 0 0% 0);
        }
        to {
          clip-path: inset(0 0 0% 0);
        }
      }
    }

    @media (max-width: 768px) {
      .content {
        padding: 2rem;
      }

      .hero-content {
        max-width: 90%;
      }

      .headline {
        font-size: clamp(2.5rem, 6vw, 4rem);
      }

      .footer {
        flex-direction: column;
        gap: 0.8rem;
        text-align: center;
      }

      .footer-item:nth-child(2) {
        text-align: center;
      }

      .footer-item:nth-child(3) {
        text-align: center;
      }
    }

    @media (max-width: 480px) {
      .content {
        padding: 1.5rem;
      }

      .wordmark {
        font-size: 0.75rem;
      }

      .headline {
        font-size: clamp(2rem, 5vw, 3rem);
        margin-bottom: 1rem;
      }

      .subcopy {
        font-size: 1rem;
        margin-bottom: 1.5rem;
      }

      .cta {
        font-size: 0.85rem;
      }

      .footer {
        font-size: 0.65rem;
      }
    }
  </style>
</head>
<body>
  <div class="vignette"></div>
  <div class="frame"></div>
  <div class="content">
    <div class="wordmark">Particle Field</div>
    <div class="hero">
      <div class="hero-content">
        <h1 class="headline">Digital Elegance in Motion</h1>
        <p class="subcopy">光と粒子が織りなす空間</p>
        <a href="#" class="cta">Explore the Experience</a>
      </div>
    </div>
    <div class="footer">
      <div class="footer-item">Est. 2026</div>
      <div class="footer-item">Tokyo Digital</div>
      <div class="footer-item">© All Rights Reserved</div>
    </div>
  </div>

  <script type="module">
    import * as THREE from 'three';

    // Scene setup
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(
      55,
      window.innerWidth / window.innerHeight,
      0.1,
      100
    );
    const renderer = new THREE.WebGLRenderer({
      antialias: true,
      alpha: false,
      powerPreference: 'high-performance'
    });

    camera.position.set(0, 2.2, 6);

    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setClearColor(0x0c0b09, 1);
    renderer.toneMappingExposure = 1.0;
    document.body.appendChild(renderer.domElement);

    // Add fog
    scene.fog = new THREE.Fog(0x0c0b09, 6, 14);

    // Particle field geometry
    const gridWidth = 120;
    const gridHeight = 100;
    const spacing = 0.18;
    const positions = new Float32Array(gridWidth * gridHeight * 3);
    const initialPositions = new Float32Array(gridWidth * gridHeight * 3);

    let index = 0;
    for (let z = 0; z < gridHeight; z++) {
      for (let x = 0; x < gridWidth; x++) {
        const posX = (x - gridWidth / 2) * spacing;
        const posZ = (z - gridHeight / 2) * spacing;
        const posY = 0;

        positions[index * 3] = posX;
        positions[index * 3 + 1] = posY;
        positions[index * 3 + 2] = posZ;

        initialPositions[index * 3] = posX;
        initialPositions[index * 3 + 1] = posY;
        initialPositions[index * 3 + 2] = posZ;

        index++;
      }
    }

    const geometry = new THREE.BufferGeometry();
    geometry.setAttribute(
      'position',
      new THREE.BufferAttribute(positions, 3)
    );

    const material = new THREE.PointsMaterial({
      size: 0.02,
      color: 0xd4af6a,
      transparent: true,
      opacity: 0.85,
      depthWrite: false,
      sizeAttenuation: true
    });

    const particleField = new THREE.Points(geometry, material);
    // push the whole grid away from the lens — grid points reaching the camera
    // plane (z≈6) render as huge squares under sizeAttenuation
    particleField.position.z = -6.5;
    scene.add(particleField);

    // Dust particles (accent layer)
    const dustCount = 200;
    const dustPositions = new Float32Array(dustCount * 3);
    const dustInitialY = new Float32Array(dustCount);

    for (let i = 0; i < dustCount; i++) {
      // keep dust well in front of the camera (z<=0) — points too close to the
      // lens blow up into huge squares under sizeAttenuation
      dustPositions[i * 3] = (Math.random() - 0.5) * 20;
      dustPositions[i * 3 + 1] = Math.random() * 6 - 0.5;
      dustPositions[i * 3 + 2] = -2 - Math.random() * 10;
      dustInitialY[i] = dustPositions[i * 3 + 1];
    }

    const dustGeometry = new THREE.BufferGeometry();
    dustGeometry.setAttribute(
      'position',
      new THREE.BufferAttribute(dustPositions, 3)
    );

    const dustMaterial = new THREE.PointsMaterial({
      size: 0.04,
      color: 0xd4af6a,
      transparent: true,
      opacity: 0.5,
      depthWrite: false,
      sizeAttenuation: true
    });

    const dustParticles = new THREE.Points(dustGeometry, dustMaterial);
    scene.add(dustParticles);

    // Clock for animation
    const clock = new THREE.Clock();

    // Check for reduced motion preference
    const prefersReducedMotion = window.matchMedia(
      '(prefers-reduced-motion: reduce)'
    ).matches;

    // Mouse tracking for parallax
    // parallax targets must include the camera's BASE position — lerping toward
    // bare mouse offsets drags the camera down from y=2.2 into the wave plane
    const CAM_BASE_X = 0;
    const CAM_BASE_Y = 2.2;
    let mouseX = 0;
    let mouseY = 0;
    let targetCameraX = CAM_BASE_X;
    let targetCameraY = CAM_BASE_Y;

    window.addEventListener('pointermove', (event) => {
      if (!prefersReducedMotion) {
        mouseX = (event.clientX / window.innerWidth) * 2 - 1;
        mouseY = -(event.clientY / window.innerHeight) * 2 + 1;
        targetCameraX = CAM_BASE_X + mouseX * 0.6;
        targetCameraY = CAM_BASE_Y + mouseY * 0.35;
      }
    });

    // Handle window resize
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    });

    let readyLogged = false;

    // Animation loop
    renderer.setAnimationLoop(() => {
      const elapsed = clock.getElapsedTime();
      const t = prefersReducedMotion ? 0 : elapsed;

      // Update particle positions with wave animation
      const posAttr = geometry.getAttribute('position');
      const pos = posAttr.array;

      for (let i = 0; i < gridWidth * gridHeight; i++) {
        const x = initialPositions[i * 3];
        const z = initialPositions[i * 3 + 2];

        const y = Math.sin(x * 0.6 + t) * Math.cos(z * 0.4 + t * 0.7) * 0.35;

        pos[i * 3 + 1] = y;
      }
      posAttr.needsUpdate = true;

      // Update dust particles drift
      if (!prefersReducedMotion) {
        const dustPosAttr = dustGeometry.getAttribute('position');
        const dustPos = dustPosAttr.array;

        for (let i = 0; i < dustCount; i++) {
          dustPos[i * 3 + 1] += 0.003;

          if (dustPos[i * 3 + 1] > 8) {
            dustPos[i * 3 + 1] = -1;
          }
        }
        dustPosAttr.needsUpdate = true;
      }

      // Mouse parallax with easing — 0.12 keeps it responsive without jitter
      camera.position.x += (targetCameraX - camera.position.x) * 0.12;
      camera.position.y += (targetCameraY - camera.position.y) * 0.12;

      // Camera slow drift animation
      if (!prefersReducedMotion) {
        camera.position.x += Math.sin(t * 0.05) * 0.0008;
      }

      camera.lookAt(0, 0, 0);

      renderer.render(scene, camera);

      if (!readyLogged) {
        console.log('[site] ready');
        readyLogged = true;
      }
    });
  </script>
</body>
</html>
