<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Memory Cubes</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🧊</text></svg>">
<script type="importmap">
{"imports":{"three":"https://unpkg.com/three@0.185.0/build/three.module.js","three/addons/":"https://unpkg.com/three@0.185.0/examples/jsm/"}}
</script>
<style>
  :root {
    /* [THEME-TOKEN] brief.json palette 転記(検証: scripts/verify/theme-tokens.mjs) */
    --tk-primary: #7ab8ff;
    --tk-accent: #ffd24a;
    --tk-background: #0e1220;
    --tk-danger: #ff5a7a;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; font-family: 'Avenir Next', 'Hiragino Sans', sans-serif; }
  body { background: var(--tk-background); touch-action: none; }
  canvas { display: block; }
  .hud {
    position: fixed; top: 3vh; left: 0; right: 0; text-align: center;
    color: #e8ecfa; pointer-events: none; z-index: 10;
  }
  .round { font-size: clamp(2rem, 6vw, 3rem); font-weight: 800; }
  .state { font-size: 0.85rem; letter-spacing: 0.3em; opacity: 0.7; min-height: 1.4em; }
  .best { font-size: 0.75rem; letter-spacing: 0.25em; opacity: 0.55; }
  .overlay {
    position: fixed; inset: 0; display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 1.1rem;
    color: #e8ecfa; z-index: 20; background: rgba(10, 12, 24, 0.66);
    -webkit-backdrop-filter: blur(6px); backdrop-filter: blur(6px);
    transition: opacity 0.3s ease, visibility 0.3s; text-align: center;
  }
  .overlay.hidden { opacity: 0; pointer-events: none; visibility: hidden; }
  .overlay h1 { font-size: clamp(2rem, 7vw, 3.2rem); font-weight: 800; letter-spacing: 0.18em; color: var(--tk-primary); text-shadow: 0 0 24px rgba(122,184,255,0.5); }
  .overlay p { opacity: 0.85; font-size: 0.9rem; letter-spacing: 0.1em; line-height: 2; padding: 0 1.5rem; }
  .overlay .result { font-size: clamp(3rem, 11vw, 5rem); font-weight: 800; line-height: 1; color: var(--tk-primary); }
  .btn {
    pointer-events: auto; cursor: pointer; font-family: inherit;
    background: var(--tk-primary); color: var(--tk-background); border: none; border-radius: 999px;
    padding: 0.9rem 2.8rem; font-size: 1rem; font-weight: 800; letter-spacing: 0.2em;
    transition: transform 0.15s cubic-bezier(0.16,1,0.3,1), box-shadow 0.15s ease-out;
  }
  .btn:hover { transform: scale(1.05); box-shadow: 0 12px 32px rgba(122,184,255,0.35); }
  .btn:focus-visible { outline: 2px solid #e8ecfa; outline-offset: 3px; }
</style>
</head>
<body>
<div class="hud">
  <div class="round" id="round">—</div>
  <div class="state" id="state"></div>
  <div class="best" id="best"></div>
</div>

<div class="overlay" id="titleOverlay">
  <h1>MEMORY CUBES</h1>
  <p>光る順番を覚えて、同じ順にキューブをタップ。<br>1 ラウンドごとに 1 手ずつ長くなる。どこまで覚えられるか。</p>
  <button class="btn" id="startBtn">START</button>
</div>

<div class="overlay hidden" id="overOverlay">
  <p>REACHED ROUND</p>
  <div class="result" id="result">0</div>
  <p id="newBest" style="color:#ffd24a"></p>
  <button class="btn" id="retryBtn">RETRY</button>
</div>

<script type="module">
import * as THREE from 'three';
import { initRenderPreset } from './lib/render-preset.mjs';
import { createFSM } from './lib/fsm.mjs';
import { createGameHook } from './lib/game-hook.mjs';
import { createRendererInfo } from './lib/render-info.mjs';
import { createScoreStore } from './lib/score.mjs';
import { bindKeyboard } from './lib/input-bindings.mjs';
import { createInputBuffer } from './lib/input.mjs';
import { createBloomComposer } from './lib/postfx.mjs';

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
// bloom(EffectComposer)使用時は info を手動リセットに切り替え、フレーム全パスの
// draw call / 三角形を累積して A8/A9 が実測できるようにする
renderer.info.autoReset = false;
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0e1220);

// T0: tone mapping / IBL / 影は lib/render-preset.mjs に委譲。brief.json の renderPreset が値の SoT。
const renderPreset = await initRenderPreset(renderer, scene);

const camera = new THREE.PerspectiveCamera(40, innerWidth / innerHeight, 0.1, 100);
camera.position.set(0, 8.5, 8.5);
camera.lookAt(0, 0, 0);

scene.add(new THREE.AmbientLight(0xaabbee, 0.8));
const key = new THREE.DirectionalLight(0xffffff, 1.0);
key.position.set(4, 9, 5);
scene.add(key);

// キューブの emissive 明滅を活かす bloom(threshold 高め、通常発光では焚かず正解演出のみ焚く)
const bloom = createBloomComposer(renderer, scene, camera, { strength: 0.9, threshold: 0.8 });

/* ---------- 9 つのキューブ ---------- */
const CUBE_COLORS = [
  0xff5a7a, 0xff9a4d, 0xffd24a,
  0x4ade80, 0x4aa8ff, 0xc79aff,
  0xff7ab8, 0x8affda, 0xf0f0f0,
];
const NOTE_FREQS = [261.6, 293.7, 329.6, 349.2, 392.0, 440.0, 493.9, 523.3, 587.3];
const cubes = [];   // { mesh, baseEmissive, flash }
{
  const geo = new THREE.BoxGeometry(1.6, 0.7, 1.6);
  for (let i = 0; i < 9; i++) {
    const r = Math.floor(i / 3), c = i % 3;
    const mat = new THREE.MeshStandardMaterial({
      color: CUBE_COLORS[i],
      emissive: CUBE_COLORS[i],
      emissiveIntensity: 0.12,
      roughness: 0.45,
    });
    const mesh = new THREE.Mesh(geo, mat);
    mesh.position.set((c - 1) * 2.1, 0.35, (r - 1) * 2.1);
    mesh.userData.idx = i;
    scene.add(mesh);
    cubes.push({ mesh, flash: 0 });
  }
  const base = new THREE.Mesh(
    new THREE.BoxGeometry(7.4, 0.3, 7.4),
    new THREE.MeshStandardMaterial({ color: 0x1a2136, roughness: 0.9 })
  );
  base.position.y = -0.2;
  scene.add(base);
}

/* ---------- 音 ---------- */
let actx = null;
function tone(idx, dur = 0.35, vol = 0.16) {
  if (!actx) return;
  const o = actx.createOscillator(), g = actx.createGain();
  o.type = 'triangle';
  o.frequency.value = NOTE_FREQS[idx];
  g.gain.setValueAtTime(vol, actx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, actx.currentTime + dur);
  o.connect(g).connect(actx.destination);
  o.start(); o.stop(actx.currentTime + dur + 0.02);
}
function buzz() {
  if (!actx) return;
  const o = actx.createOscillator(), g = actx.createGain();
  o.type = 'sawtooth'; o.frequency.value = 110;
  g.gain.setValueAtTime(0.2, actx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, actx.currentTime + 0.5);
  o.connect(g).connect(actx.destination);
  o.start(); o.stop(actx.currentTime + 0.52);
}

/* ---------- ゲーム状態 ---------- */
// 検証フック契約 v2(docs/contracts/game-hook.d.ts): round は progressFields で公開する
// 進行フィールドのため state オブジェクトに保持する。
// phase: 'idle' | 'showing' | 'input' (playing 中のみ意味を持つ内部サブ状態)
const state = { round: 0 };
let phase = 'idle';
let sequence = [];
let inputPos = 0;
let showTimer = 0, showIdx = 0;

const roundEl = document.getElementById('round');
const stateEl = document.getElementById('state');
const bestEl = document.getElementById('best');
const scoreStore = createScoreStore('memory-cubes');
bestEl.textContent = scoreStore.best() ? `BEST ROUND ${scoreStore.best()}` : '';

function flashCube(idx, withTone = true) {
  cubes[idx].flash = 1;
  if (withTone) tone(idx);
}

function nextRound() {
  state.round++;
  roundEl.textContent = `ROUND ${state.round}`;
  sequence.push(Math.random() * 9 | 0);
  inputPos = 0;
  phase = 'showing';
  stateEl.textContent = 'よく見て…';
  showIdx = 0;
  showTimer = 0.8;   // 最初の点灯までの間
}

function resetRun() {
  sequence = [];
  state.round = 0;
  phase = 'idle';
  renderPreset.onPlaying(key);
  nextRound();
}

/* ---------- 入力（レイキャスト） ---------- */
const raycaster = new THREE.Raycaster();
const ndc = new THREE.Vector2();
addEventListener('pointerdown', (e) => {
  if (e.target && e.target.closest && e.target.closest('button')) return;
  if (!fsm.is('playing') || phase !== 'input') return;
  ndc.set((e.clientX / innerWidth) * 2 - 1, -(e.clientY / innerHeight) * 2 + 1);
  raycaster.setFromCamera(ndc, camera);
  const hits = raycaster.intersectObjects(cubes.map(c => c.mesh));
  if (!hits.length) return;
  const idx = hits[0].object.userData.idx;
  flashCube(idx);
  if (idx === sequence[inputPos]) {
    inputPos++;
    if (inputPos >= sequence.length) {
      phase = 'idle';
      stateEl.textContent = '正解！';
      setTimeout(() => { if (phase === 'idle' && fsm.is('playing')) nextRound(); }, 900);
    }
  } else {
    fsm.transition('gameover');
  }
});

// ---------- FSM (docs/contracts/game-hook.d.ts 準拠) ----------
const fsm = createFSM({
  title: {
    exit: () => {
      document.getElementById('titleOverlay').classList.add('hidden');
      if (!actx) actx = new (window.AudioContext || window.webkitAudioContext)();
    },
  },
  playing: {
    enter: () => resetRun(),
  },
  paused: {},
  gameover: {
    enter: () => {
      buzz();
      stateEl.textContent = '';
      document.getElementById('result').textContent = state.round;
      const nb = document.getElementById('newBest');
      if (scoreStore.submit(state.round)) {
        nb.textContent = '✦ NEW BEST ✦';
      } else nb.textContent = '';
      bestEl.textContent = `BEST ROUND ${scoreStore.best()}`;
      setTimeout(() => document.getElementById('overOverlay').classList.remove('hidden'), 700);
    },
    exit: () => document.getElementById('overOverlay').classList.add('hidden'),
  },
}, 'title');

document.getElementById('startBtn').addEventListener('click', () => fsm.transition('playing'));
document.getElementById('retryBtn').addEventListener('click', () => fsm.transition('playing'));

// 実導線: キーボードでも開始/リスタートできること(verify N1)。lib/input-bindings.mjs(bindKeyboard)
// で Space/Enter を 'action' に結線し、title/gameover からの遷移トリガーとして毎フレーム消費する。
const input = createInputBuffer();
bindKeyboard(input, { ' ': 'action', Enter: 'action' });

/* ---------- メインループ ---------- */
const clock = new THREE.Clock();
let ready = false;
renderer.setAnimationLoop(() => {
  const dt = Math.min(clock.getDelta(), 0.05);

  if (input.consumePressed().has('action') && (fsm.is('title') || fsm.is('gameover'))) {
    fsm.transition('playing');
  }

  // シーケンス再生
  if (fsm.is('playing') && phase === 'showing') {
    showTimer -= dt;
    if (showTimer <= 0) {
      if (showIdx < sequence.length) {
        flashCube(sequence[showIdx]);
        showIdx++;
        // ラウンドが進むほど提示テンポが速くなる
        showTimer = Math.max(0.34, 0.62 - state.round * 0.02);
      } else {
        phase = 'input';
        stateEl.textContent = 'あなたの番';
      }
    }
  }

  // フラッシュ減衰 + 浮き上がり + 微細な待機アイドルモーション(N4 凍結誤判定対策:
  // 入力待ち中も画面が完全静止しないよう、ゲームプレイに影響しない振幅で常時揺らす)
  const t = clock.elapsedTime;
  for (let ci = 0; ci < cubes.length; ci++) {
    const c = cubes[ci];
    c.flash = Math.max(0, c.flash - dt * 2.6);
    c.mesh.material.emissiveIntensity = 0.12 + c.flash * 1.5 + Math.sin(t * 1.4 + ci) * 0.02;
    c.mesh.position.y = 0.35 + c.flash * 0.3 + Math.sin(t * 1.1 + ci * 0.7) * 0.02;
  }

  renderer.info.reset();
  bloom.render();
  if (!ready) { console.log('[site] ready'); ready = true; }
});

addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
  bloom.resize(innerWidth, innerHeight); // N9: bloom パスの解像度追随
});

// 検証パイプライン用フック v2(docs/contracts/game-hook.d.ts)
window.__GAME__ = createGameHook({
  fsm,
  state,
  rendererInfo: createRendererInfo(renderer),
  progressFields: ['round'],
});
</script>
</body>
</html>
