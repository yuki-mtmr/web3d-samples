<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>もぐらポップ</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🔨</text></svg>">
<script type="importmap">
{"imports":{"three":"https://unpkg.com/three@0.160.0/build/three.module.js","three/addons/":"https://unpkg.com/three@0.160.0/examples/jsm/"}}
</script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; font-family: 'Hiragino Sans', 'Avenir Next', sans-serif; }
  body { background: #241a10; touch-action: none; }
  canvas { display: block; }
  .hud {
    position: fixed; top: 3vh; left: 0; right: 0; text-align: center;
    color: #f5ecd8; pointer-events: none; z-index: 10;
  }
  .score { font-size: clamp(2rem, 6vw, 3rem); font-weight: 800; font-variant-numeric: tabular-nums; }
  .timer { font-size: 1.15rem; font-weight: 700; color: #ffd24a; font-variant-numeric: tabular-nums; }
  .combo { font-size: 0.85rem; letter-spacing: 0.25em; color: #8affda; min-height: 1.3em; }
  .overlay {
    position: fixed; inset: 0; display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 1.1rem;
    color: #f5ecd8; z-index: 20; background: rgba(20, 14, 8, 0.66);
    -webkit-backdrop-filter: blur(6px); backdrop-filter: blur(6px);
    transition: opacity 0.3s ease, visibility 0.3s; text-align: center;
  }
  .overlay.hidden { opacity: 0; pointer-events: none; visibility: hidden; }
  .overlay h1 { font-size: clamp(2rem, 7vw, 3.2rem); font-weight: 800; letter-spacing: 0.15em; color: #ffd24a; }
  .overlay p { opacity: 0.85; font-size: 0.9rem; letter-spacing: 0.08em; line-height: 2; padding: 0 1.5rem; }
  .overlay .result { font-size: clamp(3rem, 11vw, 5rem); font-weight: 800; line-height: 1; color: #ffd24a; }
  .btn {
    pointer-events: auto; cursor: pointer; font-family: inherit;
    background: #ffd24a; color: #241a10; border: none; border-radius: 999px;
    padding: 0.9rem 2.8rem; font-size: 1rem; font-weight: 800; letter-spacing: 0.2em;
    transition: transform 0.15s cubic-bezier(0.16,1,0.3,1), box-shadow 0.15s ease-out;
  }
  .btn:hover { transform: scale(1.05); box-shadow: 0 12px 32px rgba(255,210,74,0.35); }
  .btn:focus-visible { outline: 2px solid #f5ecd8; outline-offset: 3px; }
</style>
</head>
<body>
<div class="hud">
  <div class="score" id="score">0</div>
  <div class="timer" id="timer">45.0</div>
  <div class="combo" id="combo"></div>
</div>

<div class="overlay" id="titleOverlay">
  <h1>もぐらポップ</h1>
  <p>穴から顔を出すモグラをタップ！ 金のモグラは 3 倍、<br>爆弾を叩くと減点。45 秒で何点取れるか。</p>
  <button class="btn" id="startBtn">はじめる</button>
</div>

<div class="overlay hidden" id="overOverlay">
  <p>TIME UP — SCORE</p>
  <div class="result" id="result">0</div>
  <p id="newBest" style="color:#8affda"></p>
  <button class="btn" id="retryBtn">もう一回</button>
</div>

<script type="module">
import * as THREE from 'three';

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x241a10);

const camera = new THREE.PerspectiveCamera(44, innerWidth / innerHeight, 0.1, 100);
camera.position.set(0, 8.2, 7.2);
camera.lookAt(0, 0, -0.3);

scene.add(new THREE.AmbientLight(0xffe8c8, 0.75));
const key = new THREE.DirectionalLight(0xfff2d8, 1.3);
key.position.set(4, 10, 5);
scene.add(key);

/* ---------- 土台と穴 ---------- */
const GRID = 3, SPACING = 2.4;
const holePos = (i) => {
  const r = Math.floor(i / GRID), c = i % GRID;
  return { x: (c - 1) * SPACING, z: (r - 1) * SPACING };
};
{
  const groundTex = (() => {
    const cv = document.createElement('canvas');
    cv.width = cv.height = 256;
    const g = cv.getContext('2d');
    g.fillStyle = '#6a8c4a';
    g.fillRect(0, 0, 256, 256);
    for (let i = 0; i < 700; i++) {
      g.fillStyle = `rgba(${70 + Math.random()*40|0}, ${120 + Math.random()*40|0}, ${50 + Math.random()*30|0}, 0.6)`;
      g.fillRect(Math.random()*256, Math.random()*256, 3, 3);
    }
    const tex = new THREE.CanvasTexture(cv);
    tex.colorSpace = THREE.SRGBColorSpace;
    return tex;
  })();
  const ground = new THREE.Mesh(
    new THREE.BoxGeometry(10.5, 0.6, 10.5),
    new THREE.MeshStandardMaterial({ map: groundTex, roughness: 0.95 })
  );
  ground.position.y = -0.3;
  scene.add(ground);
  // 穴（黒い円 + 土の縁）
  for (let i = 0; i < 9; i++) {
    const { x, z } = holePos(i);
    const rim = new THREE.Mesh(
      new THREE.TorusGeometry(0.72, 0.14, 10, 24),
      new THREE.MeshStandardMaterial({ color: 0x5a4028, roughness: 0.9 })
    );
    rim.rotation.x = Math.PI / 2;
    rim.position.set(x, 0.05, z);
    scene.add(rim);
    const hole = new THREE.Mesh(
      new THREE.CircleGeometry(0.72, 24),
      new THREE.MeshBasicMaterial({ color: 0x140c06 })
    );
    hole.rotation.x = -Math.PI / 2;
    hole.position.set(x, 0.011, z);
    scene.add(hole);
  }
}

/* ---------- モグラ ---------- */
// type: 'normal'(+100) | 'gold'(+300) | 'bomb'(-200)
function makeMole(type) {
  const g = new THREE.Group();
  const bodyColor = type === 'gold' ? 0xffd24a : type === 'bomb' ? 0x2a2a30 : 0x8a6242;
  const mat = new THREE.MeshStandardMaterial({
    color: bodyColor, roughness: 0.7,
    emissive: type === 'gold' ? 0xaa7700 : 0x000000, emissiveIntensity: type === 'gold' ? 0.5 : 0,
  });
  const body = new THREE.Mesh(new THREE.CapsuleGeometry(0.5, 0.5, 6, 14), mat);
  body.position.y = 0.45;
  g.add(body);
  if (type === 'bomb') {
    const fuse = new THREE.Mesh(
      new THREE.CylinderGeometry(0.035, 0.035, 0.3, 6),
      new THREE.MeshStandardMaterial({ color: 0xc0b090 })
    );
    fuse.position.y = 1.15;
    fuse.rotation.z = 0.3;
    g.add(fuse);
    const spark = new THREE.Mesh(
      new THREE.SphereGeometry(0.07, 8, 6),
      new THREE.MeshStandardMaterial({ color: 0xff9a3a, emissive: 0xff6a20, emissiveIntensity: 2 })
    );
    spark.position.set(0.09, 1.3, 0);
    g.add(spark);
  } else {
    // 鼻と目
    const nose = new THREE.Mesh(
      new THREE.SphereGeometry(0.1, 8, 6),
      new THREE.MeshStandardMaterial({ color: 0xff8a9a, roughness: 0.5 })
    );
    nose.position.set(0, 0.62, 0.46);
    g.add(nose);
    const eyeMat = new THREE.MeshBasicMaterial({ color: 0x18100a });
    for (const s of [-1, 1]) {
      const eye = new THREE.Mesh(new THREE.SphereGeometry(0.055, 8, 6), eyeMat);
      eye.position.set(s * 0.18, 0.8, 0.42);
      g.add(eye);
    }
  }
  return g;
}

/* 9 穴それぞれのスロット */
const slots = [];  // { group, type, state: 'down'|'rising'|'up'|'sinking'|'hit', t, upTime }
for (let i = 0; i < 9; i++) {
  const { x, z } = holePos(i);
  const holder = new THREE.Group();
  holder.position.set(x, 0, z);
  scene.add(holder);
  slots.push({ holder, mole: null, type: null, state: 'down', t: 0, upTime: 1.1, idx: i });
}

const DOWN_Y = -1.5, UP_Y = 0.15;

function popMole(slot, type) {
  if (slot.mole) slot.holder.remove(slot.mole);
  slot.mole = makeMole(type);
  slot.mole.position.y = DOWN_Y;
  slot.holder.add(slot.mole);
  slot.type = type;
  slot.state = 'rising';
  slot.t = 0;
}

/* ---------- 効果音 ---------- */
let actx = null;
function bonk() {
  if (!actx) return;
  const o = actx.createOscillator(), g = actx.createGain();
  o.type = 'square';
  o.frequency.setValueAtTime(320, actx.currentTime);
  o.frequency.exponentialRampToValueAtTime(140, actx.currentTime + 0.08);
  g.gain.setValueAtTime(0.2, actx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, actx.currentTime + 0.12);
  o.connect(g).connect(actx.destination);
  o.start(); o.stop(actx.currentTime + 0.13);
}
function coin() {
  if (!actx) return;
  [988, 1319].forEach((f, i) => {
    const o = actx.createOscillator(), g = actx.createGain();
    o.type = 'square'; o.frequency.value = f;
    const t0 = actx.currentTime + i * 0.07;
    g.gain.setValueAtTime(0.09, t0);
    g.gain.exponentialRampToValueAtTime(0.001, t0 + 0.25);
    o.connect(g).connect(actx.destination);
    o.start(t0); o.stop(t0 + 0.3);
  });
}
function bomb() {
  if (!actx) return;
  const len = actx.sampleRate * 0.4;
  const buf = actx.createBuffer(1, len, actx.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < len; i++) d[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / len, 2);
  const src = actx.createBufferSource();
  src.buffer = buf;
  const lp = actx.createBiquadFilter();
  lp.type = 'lowpass'; lp.frequency.value = 500;
  const g = actx.createGain(); g.gain.value = 0.3;
  src.connect(lp).connect(g).connect(actx.destination);
  src.start();
}

/* ---------- ゲーム状態 ---------- */
const DURATION = 45;
let playing = false;
let score = 0, combo = 0, timeLeft = DURATION, spawnT = 0;

const scoreEl = document.getElementById('score');
const timerEl = document.getElementById('timer');
const comboEl = document.getElementById('combo');
const BEST_KEY = 'mogura-pop-best';
let best = +(localStorage.getItem(BEST_KEY) || 0);

function reset() {
  score = 0; combo = 0; timeLeft = DURATION; spawnT = 0.5;
  for (const s of slots) {
    if (s.mole) { s.holder.remove(s.mole); s.mole = null; }
    s.state = 'down';
  }
  scoreEl.textContent = '0';
  timerEl.textContent = DURATION.toFixed(1);
  comboEl.textContent = '';
}

function gameOver() {
  playing = false;
  document.getElementById('result').textContent = score;
  const nb = document.getElementById('newBest');
  if (score > best) {
    best = score;
    localStorage.setItem(BEST_KEY, best);
    nb.textContent = '✦ 縁日の達人 ✦';
  } else nb.textContent = '';
  setTimeout(() => document.getElementById('overOverlay').classList.remove('hidden'), 500);
}

/* ---------- 入力（レイキャスト） ---------- */
const raycaster = new THREE.Raycaster();
const ndc = new THREE.Vector2();
addEventListener('pointerdown', (e) => {
  if (e.target && e.target.closest && e.target.closest('button')) return;
  if (!playing) return;
  ndc.set((e.clientX / innerWidth) * 2 - 1, -(e.clientY / innerHeight) * 2 + 1);
  raycaster.setFromCamera(ndc, camera);
  const targets = slots.filter(s => s.mole && (s.state === 'up' || s.state === 'rising')).map(s => s.mole);
  const hits = raycaster.intersectObjects(targets, true);
  if (!hits.length) return;
  // 当たったモグラのスロットを特定
  let obj = hits[0].object;
  while (obj.parent && !slots.some(s => s.mole === obj)) obj = obj.parent;
  const slot = slots.find(s => s.mole === obj);
  if (!slot) return;

  slot.state = 'hit';
  slot.t = 0;
  if (slot.type === 'bomb') {
    score = Math.max(0, score - 200);
    combo = 0;
    comboEl.textContent = '💥 爆弾！ -200';
    bomb();
  } else {
    const base = slot.type === 'gold' ? 300 : 100;
    combo++;
    const bonus = Math.min(5, combo) * 10;
    score += base + bonus;
    comboEl.textContent = combo >= 2 ? `${combo} COMBO` : '';
    if (slot.type === 'gold') coin(); else bonk();
  }
  scoreEl.textContent = score;
});

document.getElementById('startBtn').addEventListener('click', () => {
  if (!actx) actx = new (window.AudioContext || window.webkitAudioContext)();
  document.getElementById('titleOverlay').classList.add('hidden');
  document.getElementById('overOverlay').classList.add('hidden');
  reset();
  playing = true;
});
document.getElementById('retryBtn').addEventListener('click', () => {
  document.getElementById('overOverlay').classList.add('hidden');
  reset();
  playing = true;
});

/* ---------- メインループ ---------- */
const clock = new THREE.Clock();
let ready = false;
renderer.setAnimationLoop(() => {
  const dt = Math.min(clock.getDelta(), 0.05);

  if (playing) {
    timeLeft -= dt;
    timerEl.textContent = Math.max(0, timeLeft).toFixed(1);
    if (timeLeft <= 0) gameOver();

    // スポーン（残り時間が減るほど頻度アップ）
    spawnT -= dt;
    if (spawnT <= 0) {
      const progress = 1 - timeLeft / DURATION;
      spawnT = Math.max(0.35, 0.95 - progress * 0.55) * (0.75 + Math.random() * 0.5);
      const free = slots.filter(s => s.state === 'down');
      if (free.length) {
        const slot = free[Math.random() * free.length | 0];
        const roll = Math.random();
        const type = roll < 0.12 ? 'gold' : roll < 0.3 ? 'bomb' : 'normal';
        popMole(slot, type);
        slot.upTime = Math.max(0.55, 1.15 - progress * 0.5);
      }
    }
  }

  // スロットの状態遷移
  for (const s of slots) {
    if (!s.mole) continue;
    s.t += dt;
    if (s.state === 'rising') {
      const k = Math.min(1, s.t / 0.16);
      s.mole.position.y = DOWN_Y + (UP_Y - DOWN_Y) * (1 - Math.pow(1 - k, 3));
      if (k >= 1) { s.state = 'up'; s.t = 0; }
    } else if (s.state === 'up') {
      s.mole.position.y = UP_Y + Math.sin(s.t * 6) * 0.03;
      if (s.t > s.upTime) { s.state = 'sinking'; s.t = 0; }
    } else if (s.state === 'sinking') {
      const k = Math.min(1, s.t / 0.2);
      s.mole.position.y = UP_Y + (DOWN_Y - UP_Y) * k;
      if (k >= 1) { s.holder.remove(s.mole); s.mole = null; s.state = 'down'; }
    } else if (s.state === 'hit') {
      // 叩かれたら潰れて沈む
      const k = Math.min(1, s.t / 0.22);
      s.mole.scale.y = Math.max(0.2, 1 - k * 0.8);
      s.mole.scale.x = s.mole.scale.z = 1 + k * 0.25;
      s.mole.position.y = UP_Y - k * 1.6;
      if (k >= 1) {
        s.mole.scale.set(1, 1, 1);
        s.holder.remove(s.mole);
        s.mole = null;
        s.state = 'down';
      }
    }
  }

  renderer.render(scene, camera);
  if (!ready) { console.log('[site] ready'); ready = true; }
});

addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});
</script>
</body>
</html>
