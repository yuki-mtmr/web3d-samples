<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Neon Breakout</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🧱</text></svg>">
<script type="importmap">
{"imports":{"three":"https://unpkg.com/three@0.160.0/build/three.module.js","three/addons/":"https://unpkg.com/three@0.160.0/examples/jsm/"}}
</script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; font-family: 'Avenir Next', 'Hiragino Sans', sans-serif; }
  body { background: #120a1c; touch-action: none; }
  canvas { display: block; }
  .hud {
    position: fixed; top: 3vh; left: 0; right: 0; text-align: center;
    color: #f4ecff; pointer-events: none; z-index: 10;
  }
  .score { font-size: clamp(2rem, 6vw, 3rem); font-weight: 800; font-variant-numeric: tabular-nums; text-shadow: 0 0 18px rgba(199,154,255,0.55); }
  .lives { font-size: 1rem; letter-spacing: 0.4em; color: #ff7ab8; min-height: 1.3em; }
  .level { font-size: 0.78rem; letter-spacing: 0.3em; opacity: 0.6; }
  .overlay {
    position: fixed; inset: 0; display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 1.1rem;
    color: #f4ecff; z-index: 20; background: rgba(14, 8, 24, 0.66);
    -webkit-backdrop-filter: blur(6px); backdrop-filter: blur(6px);
    transition: opacity 0.3s ease, visibility 0.3s; text-align: center;
  }
  .overlay.hidden { opacity: 0; pointer-events: none; visibility: hidden; }
  .overlay h1 { font-size: clamp(2rem, 7vw, 3.2rem); font-weight: 800; letter-spacing: 0.18em; color: #c79aff; text-shadow: 0 0 24px rgba(199,154,255,0.6); }
  .overlay p { opacity: 0.85; font-size: 0.9rem; letter-spacing: 0.1em; line-height: 2; padding: 0 1.5rem; }
  .overlay .result { font-size: clamp(3rem, 11vw, 5rem); font-weight: 800; line-height: 1; color: #c79aff; }
  .btn {
    pointer-events: auto; cursor: pointer; font-family: inherit;
    background: #c79aff; color: #120a1c; border: none; border-radius: 999px;
    padding: 0.9rem 2.8rem; font-size: 1rem; font-weight: 800; letter-spacing: 0.2em;
    transition: transform 0.15s cubic-bezier(0.16,1,0.3,1), box-shadow 0.15s ease-out;
  }
  .btn:hover { transform: scale(1.05); box-shadow: 0 12px 32px rgba(199,154,255,0.35); }
  .btn:focus-visible { outline: 2px solid #f4ecff; outline-offset: 3px; }
</style>
</head>
<body>
<div class="hud">
  <div class="score" id="score">0</div>
  <div class="lives" id="lives"></div>
  <div class="level" id="level"></div>
</div>

<div class="overlay" id="titleOverlay">
  <h1>NEON BREAKOUT</h1>
  <p>ポインタでパドルを左右に。ボールを跳ね返してブロックを全て砕く。<br>パドルの端に当てるほど鋭角に飛ぶ。残機 3。</p>
  <button class="btn" id="startBtn">LAUNCH</button>
</div>

<div class="overlay hidden" id="overOverlay">
  <p id="overLabel">GAME OVER — SCORE</p>
  <div class="result" id="result">0</div>
  <p id="newBest" style="color:#ffd24a"></p>
  <button class="btn" id="retryBtn">RETRY</button>
</div>

<script type="module">
import * as THREE from 'three';

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x120a1c);

// 正面やや上からの視点（フィールドは xz 平面）
const camera = new THREE.PerspectiveCamera(50, innerWidth / innerHeight, 0.1, 100);
camera.position.set(0, 13.5, 9);
camera.lookAt(0, 0, -1);

scene.add(new THREE.AmbientLight(0x8877cc, 1.2));
const key = new THREE.DirectionalLight(0xffffff, 0.9);
key.position.set(3, 10, 5);
scene.add(key);

/* ---------- フィールド ---------- */
const FIELD_W = 12, FIELD_D = 16;   // x: ±6, z: -10(奥) 〜 +6(手前)
const Z_TOP = -10, Z_BOTTOM = 6;
{
  const floor = new THREE.Mesh(
    new THREE.PlaneGeometry(FIELD_W, FIELD_D),
    new THREE.MeshStandardMaterial({ color: 0x1a1028, roughness: 0.95 })
  );
  floor.rotation.x = -Math.PI / 2;
  floor.position.z = (Z_TOP + Z_BOTTOM) / 2;
  scene.add(floor);
  const wallMat = new THREE.MeshStandardMaterial({ color: 0xc79aff, emissive: 0x8a5aff, emissiveIntensity: 0.9 });
  const mkWall = (w, d, x, z) => {
    const m = new THREE.Mesh(new THREE.BoxGeometry(w, 0.5, d), wallMat);
    m.position.set(x, 0.25, z);
    scene.add(m);
  };
  mkWall(FIELD_W + 0.6, 0.3, 0, Z_TOP - 0.15);
  mkWall(0.3, FIELD_D + 0.3, -FIELD_W/2 - 0.15, (Z_TOP + Z_BOTTOM) / 2);
  mkWall(0.3, FIELD_D + 0.3, FIELD_W/2 + 0.15, (Z_TOP + Z_BOTTOM) / 2);
}

/* ---------- パドルとボール ---------- */
const PADDLE_W = 2.6;
const paddle = new THREE.Mesh(
  new THREE.BoxGeometry(PADDLE_W, 0.4, 0.5),
  new THREE.MeshStandardMaterial({ color: 0x8affda, emissive: 0x22c58a, emissiveIntensity: 1.0 })
);
paddle.position.set(0, 0.2, 5);
scene.add(paddle);

const BALL_R = 0.24;
const ball = new THREE.Mesh(
  new THREE.SphereGeometry(BALL_R, 18, 14),
  new THREE.MeshStandardMaterial({ color: 0xffffff, emissive: 0xffffff, emissiveIntensity: 0.9 })
);
scene.add(ball);
let bvx = 0, bvz = 0, ballStuck = true;

/* ---------- ブロック ---------- */
const BRICK_COLS = 8, BRICK_W = 1.35, BRICK_D = 0.7;
const bricks = [];   // { mesh, alive, row }
const ROW_COLORS = [0xff5a7a, 0xff9a4d, 0xffd24a, 0x4ade80, 0x4aa8ff, 0xc79aff];

function buildBricks(level) {
  for (const b of bricks) {
    scene.remove(b.mesh);
    b.mesh.geometry.dispose();
    b.mesh.material.dispose();
  }
  bricks.length = 0;
  const rows = Math.min(6, 3 + level);
  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < BRICK_COLS; c++) {
      // レベルごとの欠けパターンで単調さを避ける
      if (level >= 2 && (r + c) % 5 === level % 5) continue;
      const mesh = new THREE.Mesh(
        new THREE.BoxGeometry(BRICK_W - 0.14, 0.5, BRICK_D - 0.1),
        new THREE.MeshStandardMaterial({
          color: ROW_COLORS[r % ROW_COLORS.length],
          emissive: ROW_COLORS[r % ROW_COLORS.length],
          emissiveIntensity: 0.35,
          roughness: 0.5,
        })
      );
      const x = (c - (BRICK_COLS - 1) / 2) * BRICK_W;
      const z = Z_TOP + 1.2 + r * BRICK_D;
      mesh.position.set(x, 0.25, z);
      scene.add(mesh);
      bricks.push({ mesh, alive: true, row: r });
    }
  }
}

/* ---------- パーティクル ---------- */
const bursts = [];
function burst(pos, color) {
  const n = 14;
  const geo = new THREE.BufferGeometry();
  const p = new Float32Array(n * 3);
  const vel = [];
  for (let i = 0; i < n; i++) {
    p[i*3] = pos.x; p[i*3+1] = pos.y; p[i*3+2] = pos.z;
    const a = Math.random() * Math.PI * 2;
    vel.push(new THREE.Vector3(Math.cos(a) * (1 + Math.random()*2), 1 + Math.random()*2, Math.sin(a) * (1 + Math.random()*2)));
  }
  geo.setAttribute('position', new THREE.BufferAttribute(p, 3));
  const mat = new THREE.PointsMaterial({ color, size: 0.14, transparent: true, opacity: 1 });
  const pts = new THREE.Points(geo, mat);
  scene.add(pts);
  bursts.push({ pts, vel, age: 0 });
}

/* ---------- 効果音 ---------- */
let actx = null;
function ping(freq, vol = 0.1) {
  if (!actx) return;
  const o = actx.createOscillator(), g = actx.createGain();
  o.type = 'square'; o.frequency.value = freq;
  g.gain.setValueAtTime(vol, actx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, actx.currentTime + 0.07);
  o.connect(g).connect(actx.destination);
  o.start(); o.stop(actx.currentTime + 0.08);
}

/* ---------- ゲーム状態 ---------- */
let playing = false;
let score = 0, lives = 3, level = 1;
let ballSpeed = 9;

const scoreEl = document.getElementById('score');
const livesEl = document.getElementById('lives');
const levelEl = document.getElementById('level');
const BEST_KEY = 'breakout-neon-best';
let best = +(localStorage.getItem(BEST_KEY) || 0);

function drawHud() {
  scoreEl.textContent = score;
  livesEl.textContent = '♥'.repeat(lives);
  levelEl.textContent = `LEVEL ${level}`;
}

function resetBall() {
  ballStuck = true;
  ball.position.set(paddle.position.x, 0.24, paddle.position.z - 0.6);
}

function reset() {
  score = 0; lives = 3; level = 1; ballSpeed = 9;
  buildBricks(level);
  resetBall();
  drawHud();
}

function launch() {
  if (!ballStuck) return;
  ballStuck = false;
  const a = (Math.random() - 0.5) * 0.6;
  bvx = Math.sin(a) * ballSpeed;
  bvz = -Math.cos(a) * ballSpeed;
  ping(880, 0.12);
}

function gameOver(cleared) {
  playing = false;
  document.getElementById('overLabel').textContent = cleared ? 'ALL LEVELS CLEAR — SCORE' : 'GAME OVER — SCORE';
  document.getElementById('result').textContent = score;
  const nb = document.getElementById('newBest');
  if (score > best) {
    best = score;
    localStorage.setItem(BEST_KEY, best);
    nb.textContent = '✦ NEW BEST ✦';
  } else nb.textContent = '';
  setTimeout(() => document.getElementById('overOverlay').classList.remove('hidden'), 600);
}

/* ---------- 入力 ---------- */
let paddleTX = 0;
addEventListener('pointermove', (e) => {
  paddleTX = ((e.clientX / innerWidth) * 2 - 1) * (FIELD_W / 2 - PADDLE_W / 2);
});
addEventListener('pointerdown', (e) => {
  if (e.target && e.target.closest && e.target.closest('button')) return;
  if (playing) launch();
});
addEventListener('keydown', (e) => { if (e.code === 'Space' && playing) launch(); });

document.getElementById('startBtn').addEventListener('click', () => {
  if (!actx) actx = new (window.AudioContext || window.webkitAudioContext)();
  document.getElementById('titleOverlay').classList.add('hidden');
  document.getElementById('overOverlay').classList.add('hidden');
  reset();
  playing = true;
});
document.getElementById('retryBtn').addEventListener('click', () => {
  document.getElementById('overOverlay').classList.add('hidden');
  reset();
  playing = true;
});

/* ---------- メインループ ---------- */
const clock = new THREE.Clock();
let ready = false;
renderer.setAnimationLoop(() => {
  const dt = Math.min(clock.getDelta(), 0.04);

  // パドル追従（0.25 = 機敏）
  paddle.position.x += (paddleTX - paddle.position.x) * 0.25;

  if (playing) {
    if (ballStuck) {
      ball.position.x = paddle.position.x;
      ball.position.z = paddle.position.z - 0.6;
    } else {
      // サブステップで移動（すり抜け防止）
      const steps = Math.max(1, Math.ceil((Math.hypot(bvx, bvz) * dt) / (BALL_R * 0.9)));
      const sdt = dt / steps;
      for (let s = 0; s < steps && !ballStuck; s++) {
        ball.position.x += bvx * sdt;
        ball.position.z += bvz * sdt;

        // 壁
        if (ball.position.x < -FIELD_W/2 + BALL_R) { ball.position.x = -FIELD_W/2 + BALL_R; bvx = Math.abs(bvx); ping(440); }
        if (ball.position.x > FIELD_W/2 - BALL_R) { ball.position.x = FIELD_W/2 - BALL_R; bvx = -Math.abs(bvx); ping(440); }
        if (ball.position.z < Z_TOP + BALL_R) { ball.position.z = Z_TOP + BALL_R; bvz = Math.abs(bvz); ping(440); }

        // パドル
        if (bvz > 0 &&
            ball.position.z > paddle.position.z - 0.45 && ball.position.z < paddle.position.z + 0.3 &&
            Math.abs(ball.position.x - paddle.position.x) < PADDLE_W / 2 + BALL_R) {
          const hit = (ball.position.x - paddle.position.x) / (PADDLE_W / 2);   // -1..1
          const angle = hit * 1.05;   // 端ほど鋭角
          const sp = Math.hypot(bvx, bvz);
          bvx = Math.sin(angle) * sp;
          bvz = -Math.cos(angle) * sp;
          ball.position.z = paddle.position.z - 0.45;
          ping(660, 0.12);
        }

        // ブロック（AABB 近似・当たった軸で反射）
        for (const b of bricks) {
          if (!b.alive) continue;
          const dx = ball.position.x - b.mesh.position.x;
          const dz = ball.position.z - b.mesh.position.z;
          if (Math.abs(dx) < (BRICK_W - 0.14)/2 + BALL_R && Math.abs(dz) < (BRICK_D - 0.1)/2 + BALL_R) {
            b.alive = false;
            b.mesh.visible = false;
            score += 10 * level;
            burst(b.mesh.position, b.mesh.material.color.getHex());
            ping(990 - b.row * 60, 0.12);
            // 反射軸: 侵入の浅い方
            const ox = (BRICK_W - 0.14)/2 + BALL_R - Math.abs(dx);
            const oz = (BRICK_D - 0.1)/2 + BALL_R - Math.abs(dz);
            if (ox < oz) bvx = Math.sign(dx) * Math.abs(bvx);
            else bvz = Math.sign(dz) * Math.abs(bvz);
            drawHud();
            break;
          }
        }

        // 落下
        if (ball.position.z > Z_BOTTOM + 1) {
          lives--;
          drawHud();
          ping(180, 0.18);
          if (lives <= 0) { gameOver(false); }
          else resetBall();
        }
      }

      // レベルクリア
      if (playing && bricks.every(b => !b.alive)) {
        if (level >= 3) gameOver(true);
        else {
          level++;
          ballSpeed += 1.5;
          buildBricks(level);
          resetBall();
          drawHud();
        }
      }
    }
  }

  // パーティクル更新
  for (let i = bursts.length - 1; i >= 0; i--) {
    const bu = bursts[i];
    bu.age += dt;
    const p = bu.pts.geometry.attributes.position;
    for (let j = 0; j < bu.vel.length; j++) {
      bu.vel[j].y -= 6 * dt;
      p.array[j*3] += bu.vel[j].x * dt;
      p.array[j*3+1] += bu.vel[j].y * dt;
      p.array[j*3+2] += bu.vel[j].z * dt;
    }
    p.needsUpdate = true;
    bu.pts.material.opacity = Math.max(0, 1 - bu.age / 0.7);
    if (bu.age > 0.7) {
      scene.remove(bu.pts);
      bu.pts.geometry.dispose();
      bu.pts.material.dispose();
      bursts.splice(i, 1);
    }
  }

  renderer.render(scene, camera);
  if (!ready) { console.log('[site] ready'); ready = true; }
});

addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});
</script>
</body>
</html>
