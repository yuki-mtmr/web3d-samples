<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<title>Gravity Flip</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🔃</text></svg>">
<style>
  :root { --bg: #05070f; --fg: #d8f4ff; --accent: #35d0ff; --danger: #ff3d81; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; overflow: hidden; background: var(--bg); color: var(--fg);
    font-family: "SF Mono", ui-monospace, monospace; touch-action: none; }
  canvas { display: block; }
  .hud { position: fixed; top: 12px; left: 0; right: 0; display: flex;
    justify-content: space-between; padding: 0 16px; font-size: clamp(0.9rem, 2.5vw, 1.1rem);
    pointer-events: none; text-shadow: 0 0 8px rgba(53, 208, 255, 0.6); }
  .overlay { position: fixed; inset: 0; display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 16px; text-align: center;
    background: rgba(5, 7, 15, 0.85); backdrop-filter: blur(4px); transition: opacity 0.25s; }
  .overlay.hidden { opacity: 0; pointer-events: none; }
  .overlay h1 { font-size: clamp(2rem, 6vw, 3rem); letter-spacing: 0.14em;
    text-shadow: 0 0 24px var(--accent); }
  .overlay p { opacity: 0.85; max-width: 34ch; line-height: 1.7; }
  .btn { pointer-events: auto; cursor: pointer; border: 1px solid var(--accent);
    background: transparent; color: var(--accent); padding: 12px 36px; font-size: 1.05rem;
    border-radius: 4px; letter-spacing: 0.15em; transition: background 0.15s, color 0.15s; }
  .btn:hover { background: var(--accent); color: var(--bg); }
  .mute { position: fixed; bottom: 12px; right: 12px; font-size: 1.3rem; opacity: 0.6;
    cursor: pointer; background: none; border: none; color: var(--fg); }
</style>
<script type="importmap">
  { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
</script>
</head>
<body>
<div class="hud">
  <span id="score">SCORE 0</span>
  <span id="best">BEST 0</span>
</div>
<div class="overlay" id="titleOverlay">
  <h1>GRAVITY FLIP</h1>
  <p>タップ / SPACE で天地反転。<br>柱に当たらず走り続けろ。</p>
  <button class="btn" id="startBtn">START</button>
</div>
<div class="overlay hidden" id="overOverlay">
  <h1 id="overTitle">GAME OVER</h1>
  <p id="overScore"></p>
  <button class="btn" id="retryBtn">RETRY</button>
</div>
<button class="mute" id="muteBtn" aria-label="mute">🔊</button>

<script type="module">
import * as THREE from 'three';
import { createLoop } from './lib/loop.mjs';
import { createFSM } from './lib/fsm.mjs';
import { createInputBuffer } from './lib/input.mjs';
import { bindKeyboard, bindPointer } from './lib/input-bindings.mjs';
import { createScoreStore } from './lib/score.mjs';
import { createRamp, createEventSchedule } from './lib/difficulty.mjs';
import { createSfx } from './lib/sfx.mjs';
import { createShake, createHitstop, createBurstPool, lerp } from './lib/juice.mjs';

// ---------- 定数 (brief B03: サイドビュー / 重力反転 / レトロワイヤーフレーム) ----------
const GAME_ID = 'gravity-flip';
const FLOOR_Y = -2.2;
const CEIL_Y = 2.2;
const SPAWN_X = 26;
const KILL_X = -12;
const GRAVITY = 42;

// ---------- 基盤セットアップ ----------
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x05070f);
scene.fog = new THREE.Fog(0x05070f, 18, 34);

const camera = new THREE.PerspectiveCamera(58, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 0, 13);
camera.lookAt(2, 0, 0);
const cameraBase = camera.position.clone();

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

scene.add(new THREE.AmbientLight(0x223355, 1.2));
const key = new THREE.PointLight(0x35d0ff, 60, 40);
key.position.set(-4, 0, 8);
scene.add(key);

// ---------- ワールド構築: ワイヤーフレームのトンネル ----------
const wireMat = new THREE.MeshBasicMaterial({ color: 0x123a52, wireframe: true });
const floor = new THREE.Mesh(new THREE.PlaneGeometry(70, 26, 46, 8), wireMat);
floor.rotation.x = -Math.PI / 2;
floor.position.y = FLOOR_Y - 0.4;
scene.add(floor);
const ceil = floor.clone();
ceil.rotation.x = Math.PI / 2;
ceil.position.y = CEIL_Y + 0.4;
scene.add(ceil);

const player = new THREE.Mesh(
  new THREE.OctahedronGeometry(0.45),
  new THREE.MeshStandardMaterial({ color: 0x35d0ff, emissive: 0x1180b0, roughness: 0.2 }),
);
player.position.set(-3, FLOOR_Y + 0.45, 0);
scene.add(player);

const PILLAR_COUNT = 24;
const pillarMesh = new THREE.InstancedMesh(
  new THREE.BoxGeometry(0.9, 2.4, 0.9),
  new THREE.MeshStandardMaterial({ color: 0xff3d81, emissive: 0x8a1040, roughness: 0.5 }),
  PILLAR_COUNT,
);
scene.add(pillarMesh);
const pillars = Array.from({ length: PILLAR_COUNT }, () => ({ active: false, x: 0, onCeiling: false }));
const dummy = new THREE.Object3D();

// ---------- 基盤モジュールの結線 ----------
const input = createInputBuffer();
bindKeyboard(input, { ' ': 'action', Enter: 'action', ArrowUp: 'action', w: 'action', Escape: 'pause' });
bindPointer(input, document.body);

const sfx = createSfx();
const shake = createShake();
const hitstop = createHitstop();
const burst = createBurstPool(scene, { color: 0xff7ab0 });
const scoreStore = createScoreStore(GAME_ID);

const speedRamp = createRamp({ base: 8, perSecond: 0.3, max: 19 });
const intervalRamp = createRamp({ base: 1.1, perSecond: -0.014, min: 0.42 });
const events = createEventSchedule([
  { at: 25, name: 'fog-closer' }, // トンネル狭窄(視界圧縮)
  { at: 45, name: 'double-pillar' },
]);

// ---------- ゲーム状態 ----------
const state = {
  score: 0, time: 0, spawnTimer: 1.2, doublePillar: false,
  playerY: FLOOR_Y + 0.45, velocityY: 0, gravityDir: -1, grounded: true,
};

const ui = {
  score: document.getElementById('score'),
  best: document.getElementById('best'),
  title: document.getElementById('titleOverlay'),
  over: document.getElementById('overOverlay'),
  overTitle: document.getElementById('overTitle'),
  overScore: document.getElementById('overScore'),
};
ui.best.textContent = `BEST ${scoreStore.best()}`;

function resetRun() {
  state.score = 0; state.time = 0; state.spawnTimer = 1.2; state.doublePillar = false;
  state.playerY = FLOOR_Y + 0.45; state.velocityY = 0; state.gravityDir = -1; state.grounded = true;
  scene.fog.near = 18;
  events.reset();
  for (const p of pillars) p.active = false;
  syncPillars();
  input.reset();
}

function spawnPillar(forceCeiling) {
  const slot = pillars.find((p) => !p.active);
  if (!slot) return;
  slot.active = true;
  slot.x = SPAWN_X;
  slot.onCeiling = forceCeiling ?? Math.random() < 0.5;
}

function syncPillars() {
  pillars.forEach((p, i) => {
    const y = p.onCeiling ? CEIL_Y - 0.8 : FLOOR_Y + 0.8;
    dummy.position.set(p.active ? p.x : 9999, y, 0);
    dummy.updateMatrix();
    pillarMesh.setMatrixAt(i, dummy.matrix);
  });
  pillarMesh.instanceMatrix.needsUpdate = true;
}

// ---------- FSM ----------
const fsm = createFSM({
  title: {
    enter: () => ui.title.classList.remove('hidden'),
    exit: () => { ui.title.classList.add('hidden'); sfx.unlock(); },
  },
  playing: {
    enter: (from) => { if (from !== 'paused') resetRun(); },
  },
  paused: {},
  gameover: {
    enter: () => {
      const isBest = scoreStore.submit(state.score);
      ui.overTitle.textContent = isBest ? 'NEW BEST!' : 'GAME OVER';
      ui.overScore.textContent = `SCORE ${state.score} / BEST ${scoreStore.best()}`;
      ui.best.textContent = `BEST ${scoreStore.best()}`;
      ui.over.classList.remove('hidden');
    },
    exit: () => ui.over.classList.add('hidden'),
  },
}, 'title');

document.getElementById('startBtn').addEventListener('click', () => fsm.transition('playing'));
document.getElementById('retryBtn').addEventListener('click', () => fsm.transition('playing'));
document.getElementById('muteBtn').addEventListener('click', (e) => {
  sfx.setMuted(!sfx.isMuted());
  e.target.textContent = sfx.isMuted() ? '🔇' : '🔊';
});

// ---------- 更新ロジック ----------
function updatePlaying(dt) {
  state.time += dt;
  state.score = Math.floor(state.time * 10);

  for (const fired of events.fire(state.time)) {
    if (fired.name === 'fog-closer') scene.fog.near = 12;
    if (fired.name === 'double-pillar') state.doublePillar = true;
    sfx.rise();
  }

  const pressed = input.consumePressed();
  if (pressed.has('pause')) { fsm.transition('paused'); return; }
  if ((pressed.has('action') || pressed.has('up') || pressed.has('down')) && state.grounded) {
    state.gravityDir *= -1; // 反転は接地中のみ(連打での空中浮遊を防ぐ)
    state.grounded = false;
    sfx.rise(0.12);
  }

  // 縦方向の物理
  state.velocityY += GRAVITY * state.gravityDir * dt;
  state.playerY += state.velocityY * dt;
  const floorLimit = FLOOR_Y + 0.45;
  const ceilLimit = CEIL_Y - 0.45;
  if (state.playerY <= floorLimit) {
    if (!state.grounded && state.gravityDir === -1) { sfx.click(); shake.add(0.15); }
    state.playerY = floorLimit; state.velocityY = 0;
    if (state.gravityDir === -1) state.grounded = true;
  }
  if (state.playerY >= ceilLimit) {
    if (!state.grounded && state.gravityDir === 1) { sfx.click(); shake.add(0.15); }
    state.playerY = ceilLimit; state.velocityY = 0;
    if (state.gravityDir === 1) state.grounded = true;
  }

  // 柱のスクロールと衝突
  state.spawnTimer -= dt;
  if (state.spawnTimer <= 0) {
    spawnPillar();
    if (state.doublePillar && Math.random() < 0.45) spawnPillar(state.gravityDir === -1);
    state.spawnTimer = intervalRamp.at(state.time);
  }
  const speed = speedRamp.at(state.time);
  for (const p of pillars) {
    if (!p.active) continue;
    p.x -= speed * dt;
    if (p.x < KILL_X) { p.active = false; sfx.ping(0.02); }
    const py = p.onCeiling ? CEIL_Y - 0.8 : FLOOR_Y + 0.8;
    if (Math.abs(p.x - player.position.x) < 0.75 && Math.abs(state.playerY - py) < 1.5) {
      burst.burst(player.position, 36, 6);
      shake.add(0.7);
      hitstop.trigger(0.12);
      sfx.crash();
      fsm.transition('gameover');
      return;
    }
  }
}

const loop = createLoop({
  fixedStep: 1 / 60,
  update: (dt) => {
    const scaled = hitstop.scale(dt);
    if (fsm.is('playing')) updatePlaying(scaled);
    if (fsm.is('paused') && input.consumePressed().has('pause')) fsm.transition('playing');
    shake.update(dt);
    burst.update(scaled);
  },
  render: () => {
    // 離散状態と描画の分離: 物理は state.playerY、描画は lerp 追従
    player.position.y = lerp(player.position.y, state.playerY, 0.5);
    player.rotation.z += 0.06 * -state.gravityDir;
    player.rotation.x += 0.02;
    floor.position.x = (floor.position.x - 0.08) % 1.52; // スクロール感
    ceil.position.x = floor.position.x;
    const offset = shake.offset();
    camera.position.set(cameraBase.x + offset.x, cameraBase.y + offset.y, cameraBase.z);
    syncPillars();
    ui.score.textContent = `SCORE ${state.score}`;
    renderer.render(scene, camera);
  },
});

const clock = new THREE.Clock();
renderer.setAnimationLoop(() => loop.tick(clock.getDelta()));

// 検証パイプライン用フック(scripts/verify-game.mjs が参照)
window.__GAME__ = { fsm, state, rendererInfo: () => renderer.info.render };
</script>
</body>
</html>
