<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Lantern Run — 宵闇の参道</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🏮</text></svg>">

</script>

<style>
  :root {
    /* [THEME-TOKEN] brief.json の palette と一致させること(verify THEME 検査対象) */
    --tk-primary: #c22a18;
    --tk-accent: #ff9a4d;
    --tk-background: #0a0716;
    --tk-danger: #e0432d;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; font-family: 'Hiragino Mincho ProN', serif; }
  body { background: var(--tk-background); touch-action: none; }
  canvas { display: block; }
  .hud {
    position: fixed; top: 3vh; left: 0; right: 0; text-align: center;
    color: #f3ead8; pointer-events: none; z-index: 10;
  }
  .score { font-size: clamp(2.2rem, 7vw, 3.6rem); font-weight: 700; text-shadow: 0 0 18px rgba(224,67,45,0.6); }
  .best { font-size: 0.8rem; letter-spacing: 0.25em; opacity: 0.6; }
  .overlay {
    position: fixed; inset: 0; display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 1.1rem;
    color: #f3ead8; z-index: 20; background: rgba(8, 5, 18, 0.6);
    -webkit-backdrop-filter: blur(6px); backdrop-filter: blur(6px); transition: opacity 0.3s ease, visibility 0.3s; text-align: center;
  }
  .overlay.hidden { opacity: 0; pointer-events: none; visibility: hidden; }
  .overlay h1 { font-size: clamp(2rem, 7vw, 3.2rem); letter-spacing: 0.28em; text-shadow: 0 0 24px rgba(224,67,45,0.7); }
  .overlay p { opacity: 0.85; font-size: 0.9rem; letter-spacing: 0.12em; line-height: 2; padding: 0 1.5rem; }
  .overlay .result { font-size: clamp(3rem, 11vw, 5rem); font-weight: 700; line-height: 1; color: #e8b04b; }
  .btn {
    pointer-events: auto; cursor: pointer; font-family: inherit;
    background: #c22a18; color: #f3ead8; border: 1px solid rgba(243,234,216,0.4);
    border-radius: 999px; padding: 0.85rem 2.6rem; font-size: 1rem; letter-spacing: 0.3em;
    transition: transform 0.15s cubic-bezier(0.16,1,0.3,1), background 0.15s ease-out;
  }
  .btn:hover { transform: scale(1.05); background: #e0432d; }

<body>
<div class="hud">
  <div class="score" id="score">0</div>
  <div class="best" id="best"></div>
</div>

<div class="overlay" id="titleOverlay">
  <h1>宵闇参道</h1>
  <p>ポインタで火の玉を導き、鳥居の窓をくぐり抜けよ。<br>ぶつかれば火は消える。参道は次第に速くなる。</p>
  <button class="btn" id="startBtn">点　火</button>
</div>

<div class="overlay hidden" id="overOverlay">
  <p>くぐった距離</p>
  <div class="result" id="result">0</div>
  <p id="newBest" style="color:#e8b04b"></p>
  <button class="btn" id="retryBtn">再　点　火</button>
</div>

<script type="module">
import * as THREE from 'three';
import { initRenderPreset } from './lib/render-preset.mjs';
import { createRng } from './lib/rng.mjs';
import { createNoiseField } from './lib/procedural-texture.mjs';

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.fog = new THREE.Fog(0x0d0820, 18, 70);

// ---------- Wave2 StageB: 夜空グラデ+月+星(scene.background、fog の影響を受けない) ----------
// 演出専用の乱数(seed 固定)。gameplay の rng とは分離(principles.md #10 対象外)。
function skyTexture(seed) {
  const w = 512, h = 512;
  const c = document.createElement('canvas');
  c.width = w; c.height = h;
  const ctx = c.getContext('2d');
  const grad = ctx.createLinearGradient(0, 0, 0, h);
  grad.addColorStop(0, '#04030a');      // 天頂: background(#0a0716)よりさらに深い闇
  grad.addColorStop(0.55, '#0a0716');   // --tk-background と一致
  grad.addColorStop(1, '#241221');      // 地平線際は primary 寄りにわずかに紫赤みを帯びさせる
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, w, h);

  // 月: accent(#ff9a4d)の光暈(寒色ネオン禁忌のため橙で統一)
  const moonX = w * 0.7, moonY = h * 0.16, moonR = w * 0.04;
  const halo = ctx.createRadialGradient(moonX, moonY, 0, moonX, moonY, moonR * 6);
  halo.addColorStop(0, 'rgba(255, 154, 77, 0.8)');
  halo.addColorStop(0.15, 'rgba(255, 154, 77, 0.3)');
  halo.addColorStop(1, 'rgba(255, 154, 77, 0)');
  ctx.fillStyle = halo;
  ctx.fillRect(0, 0, w, h);
  ctx.fillStyle = '#fff2d8';
  ctx.beginPath();
  ctx.arc(moonX, moonY, moonR, 0, Math.PI * 2);
  ctx.fill();

  // 星: createRng で決定論化(seed 固定、演出専用インスタンス)
  const starRng = createRng(seed);
  for (let i = 0; i < 180; i += 1) {
    const x = starRng.next() * w;
    const y = starRng.next() * h * 0.6;
    const r = starRng.range(0.4, 1.3);
    const a = starRng.range(0.2, 0.9);
    ctx.fillStyle = `rgba(255, 245, 230, ${a})`;
    ctx.beginPath();
    ctx.arc(x, y, r, 0, Math.PI * 2);
    ctx.fill();
  }
  const tex = new THREE.CanvasTexture(c);
  tex.colorSpace = THREE.SRGBColorSpace;
  return tex;
}
scene.background = skyTexture(9101);

// 遠景山影 2 層(fbm 稜線、fog:false — scene.background 同様に霧の影響を受けさせない)
function silhouetteTexture(seed, colorHex, { baseCell = 48, ridgeMin = 0.28, ridgeSpread = 0.34 } = {}) {
  const w = 512, h = 256;
  const field = createNoiseField(seed, w, 1, { octaves: 4, baseCell });
  const c = document.createElement('canvas');
  c.width = w; c.height = h;
  const ctx = c.getContext('2d');
  ctx.clearRect(0, 0, w, h);
  ctx.beginPath();
  ctx.moveTo(0, h);
  for (let x = 0; x < w; x += 1) {
    const ridge = h * (ridgeMin + ridgeSpread * field[x]);
    ctx.lineTo(x, ridge);
  }
  ctx.lineTo(w, h);
  ctx.closePath();
  ctx.fillStyle = colorHex;
  ctx.fill();
  const tex = new THREE.CanvasTexture(c);
  tex.colorSpace = THREE.SRGBColorSpace;
  return tex;
}
const farHills = new THREE.Mesh(
  new THREE.PlaneGeometry(240, 80),
  new THREE.MeshBasicMaterial({
    map: silhouetteTexture(5201, '#170b1c', { baseCell: 64, ridgeMin: 0.28, ridgeSpread: 0.24 }), // 遠層: background に近い暗紫で霞ませる
    transparent: true, fog: false, depthWrite: false,
  }),
);
farHills.position.set(0, 6, -85);
scene.add(farHills);

const nearHills = new THREE.Mesh(
  new THREE.PlaneGeometry(200, 70),
  new THREE.MeshBasicMaterial({
    map: silhouetteTexture(5202, '#0a0510', { baseCell: 30, ridgeMin: 0.2, ridgeSpread: 0.3 }), // 近層: background よりさらに暗い黒に近い紫
    transparent: true, fog: false, depthWrite: false,
  }),
);
nearHills.position.set(0, 4, -65);
scene.add(nearHills);

// 火の粉 Points(THREE.Points 1 本、draw call +1)。accent 色(#ff9a4d)でゆっくり立ち上る。
function emberSprite() {
  const size = 64;
  const c = document.createElement('canvas');
  c.width = c.height = size;
  const ctx = c.getContext('2d');
  const grad = ctx.createRadialGradient(size / 2, size / 2, 0, size / 2, size / 2, size / 2);
  grad.addColorStop(0, 'rgba(255, 242, 216, 1)');
  grad.addColorStop(0.4, 'rgba(255, 154, 77, 0.8)');
  grad.addColorStop(1, 'rgba(255, 154, 77, 0)');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, size, size);
  const tex = new THREE.CanvasTexture(c);
  tex.colorSpace = THREE.SRGBColorSpace;
  return tex;
}
const EMBER_N = 200;
const EMBER_X = 8, EMBER_Y_MIN = 0.1, EMBER_Y_MAX = 6, EMBER_Z_MIN = -80, EMBER_Z_MAX = 5;
const emberRng = createRng(6402); // 演出専用 rng(gameplay の Math.random とは分離)
const emberPos = new Float32Array(EMBER_N * 3);
const emberSpeed = new Float32Array(EMBER_N);
const emberPhase = new Float32Array(EMBER_N);
for (let i = 0; i < EMBER_N; i += 1) {
  emberPos[i * 3] = emberRng.range(-EMBER_X, EMBER_X);
  emberPos[i * 3 + 1] = emberRng.range(EMBER_Y_MIN, EMBER_Y_MAX);
  emberPos[i * 3 + 2] = emberRng.range(EMBER_Z_MIN, EMBER_Z_MAX);
  emberSpeed[i] = emberRng.range(0.2, 0.55);
  emberPhase[i] = emberRng.range(0, Math.PI * 2);
}
const emberGeo = new THREE.BufferGeometry();
emberGeo.setAttribute('position', new THREE.BufferAttribute(emberPos, 3));
const embers = new THREE.Points(emberGeo, new THREE.PointsMaterial({
  map: emberSprite(), size: 0.14, color: 0xff9a4d, transparent: true, opacity: 0.85,
  blending: THREE.AdditiveBlending, depthWrite: false, sizeAttenuation: true,
}));
embers.frustumCulled = false;
scene.add(embers);
function updateEmbers(dt, elapsed) {
  const pos = emberGeo.attributes.position.array;
  for (let i = 0; i < EMBER_N; i += 1) {
    const idx = i * 3;
    pos[idx + 1] += emberSpeed[i] * dt;
    pos[idx] += Math.sin(elapsed * 0.6 + emberPhase[i]) * 0.12 * dt;
    if (pos[idx + 1] > EMBER_Y_MAX) {
      pos[idx + 1] = EMBER_Y_MIN;
      pos[idx] = emberRng.range(-EMBER_X, EMBER_X);
      pos[idx + 2] = emberRng.range(EMBER_Z_MIN, EMBER_Z_MAX);
    }
  }
  emberGeo.attributes.position.needsUpdate = true;
}

// T0: tone mapping / IBL / 影は lib/render-preset.mjs に委譲。brief.json の renderPreset が値の SoT。
// 重い処理(PMREM 焼き込み)は renderPreset.onPlaying() が playing 入場時に遅延実行する。
const renderPreset = await initRenderPreset(renderer, scene);

const camera = new THREE.PerspectiveCamera(70, innerWidth / innerHeight, 0.1, 120);
camera.position.set(0, 0, 6);

scene.add(new THREE.AmbientLight(0x352a50, 1.2));
const pl = new THREE.PointLight(0xff9a4d, 30, 30, 1.7);
scene.add(pl);

/* ---------- 効果音 ---------- */
let actx = null;
function beep(freq, dur = 0.08, type = 'sine', vol = 0.16) {
  if (!actx) return;
  const o = actx.createOscillator(), g = actx.createGain();
  o.type = type; o.frequency.value = freq;
  g.gain.setValueAtTime(vol, actx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, actx.currentTime + dur);
  o.connect(g).connect(actx.destination);
  o.start(); o.stop(actx.currentTime + dur);
}

/* ---------- グロー素材 ---------- */
function glowTexture(inner, outer) {
  const c = document.createElement('canvas');
  c.width = c.height = 128;
  const g = c.getContext('2d');
  const grad = g.createRadialGradient(64, 64, 2, 64, 64, 64);
  grad.addColorStop(0, inner);
  grad.addColorStop(0.4, outer);
  grad.addColorStop(1, 'rgba(0,0,0,0)');
  g.fillStyle = grad;
  g.fillRect(0, 0, 128, 128);
  const tex = new THREE.CanvasTexture(c);
  tex.colorSpace = THREE.SRGBColorSpace;
  return tex;
}
const flameGlow = glowTexture('rgba(255,220,150,1)', 'rgba(255,120,40,0.45)');

/* ---------- プレイヤー（火の玉） ---------- */
const player = new THREE.Group();
const core = new THREE.Mesh(
  new THREE.SphereGeometry(0.22, 16, 12),
  new THREE.MeshStandardMaterial({ color: 0xffe8b0, emissive: 0xff8a30, emissiveIntensity: 2.2 })
);
player.add(core);
const halo = new THREE.Sprite(new THREE.SpriteMaterial({
  map: flameGlow, transparent: true, opacity: 0.85,
  blending: THREE.AdditiveBlending, depthWrite: false,
}));
halo.scale.setScalar(1.6);
player.add(halo);
scene.add(player);

// 火の玉の尾（残像）
const TRAIL_N = 22;
const trailPos = new Float32Array(TRAIL_N * 3);
const trailGeo = new THREE.BufferGeometry();
trailGeo.setAttribute('position', new THREE.BufferAttribute(trailPos, 3));
const trail = new THREE.Points(trailGeo, new THREE.PointsMaterial({
  size: 0.35, map: flameGlow, color: 0xff9a4d, transparent: true, opacity: 0.5,
  blending: THREE.AdditiveBlending, depthWrite: false, sizeAttenuation: true,
}));
scene.add(trail);

/* ---------- 鳥居ゲート ---------- */
const FIELD_W = 7, FIELD_H = 4.4;   // プレイヤー可動域
const GATE_GAP_W = 2.6, GATE_GAP_H = 2.2;
const gates = [];   // { group, gx, gy, z, passed }
const gateMat = new THREE.MeshStandardMaterial({
  color: 0xc22a18, emissive: 0x6a1408, emissiveIntensity: 0.7, roughness: 0.6,
});
const barMat = new THREE.MeshStandardMaterial({
  color: 0xffc06a, emissive: 0xff9a4d, emissiveIntensity: 1.8,
});
const frameT = 0.5; // 枠の太さ

/* ゲートはプレイ中ずっと再生成されるので、ジオメトリを確実に解放する
   （マテリアルは共有なので破棄しない） */
function removeGate(g) {
  g.group.traverse((o) => { if (o.geometry) o.geometry.dispose(); });
  scene.remove(g.group);
}

let gateCount = 0;
function makeGate(z) {
  // 序盤は窓を中央寄りに（5 枚目までで通常難度へ）
  const ramp = Math.min(1, gateCount / 5);
  gateCount++;
  const gx = (Math.random() - 0.5) * (FIELD_W - GATE_GAP_W) * (0.25 + 0.75 * ramp);
  const gy = (Math.random() - 0.5) * (FIELD_H - GATE_GAP_H) * (0.25 + 0.75 * ramp);
  const g = new THREE.Group();
  const W = FIELD_W + 4, H = FIELD_H + 4;
  // 窓 (gx±GAP/2, gy±GAP/2) を残して 4 枚の板で塞ぐ
  const parts = [
    // 左
    { w: (gx - GATE_GAP_W/2) - (-W/2), h: H, x: ((-W/2) + (gx - GATE_GAP_W/2)) / 2, y: 0 },
    // 右
    { w: (W/2) - (gx + GATE_GAP_W/2), h: H, x: ((gx + GATE_GAP_W/2) + W/2) / 2, y: 0 },
    // 下
    { w: GATE_GAP_W, h: (gy - GATE_GAP_H/2) - (-H/2), x: gx, y: ((-H/2) + (gy - GATE_GAP_H/2)) / 2 },
    // 上
    { w: GATE_GAP_W, h: (H/2) - (gy + GATE_GAP_H/2), x: gx, y: ((gy + GATE_GAP_H/2) + H/2) / 2 },
  ];
  for (const p of parts) {
    if (p.w <= 0.01 || p.h <= 0.01) continue;
    const m = new THREE.Mesh(new THREE.BoxGeometry(p.w, p.h, frameT), gateMat);
    m.position.set(p.x, p.y, 0);
    g.add(m);
  }
  // 窓枠の縁光 — 上下左右の細棒 4 本
  const bar = (w, h, x, y) => {
    const b = new THREE.Mesh(new THREE.BoxGeometry(w, h, 0.12), barMat);
    b.position.set(x, y, 0.2);
    g.add(b);
  };
  bar(GATE_GAP_W + 0.2, 0.08, gx, gy + GATE_GAP_H/2 + 0.05);
  bar(GATE_GAP_W + 0.2, 0.08, gx, gy - GATE_GAP_H/2 - 0.05);
  bar(0.08, GATE_GAP_H + 0.2, gx - GATE_GAP_W/2 - 0.05, gy);
  bar(0.08, GATE_GAP_H + 0.2, gx + GATE_GAP_W/2 + 0.05, gy);

  g.position.z = z;
  scene.add(g);
  gates.push({ group: g, gx, gy, z, passed: false });
}

/* ---------- 道中の提灯（装飾） ---------- */
const sideLanterns = [];
{
  const lanMat = new THREE.MeshStandardMaterial({ color: 0xff5a2a, emissive: 0xff5a20, emissiveIntensity: 1.4 });
  const lanGeo = new THREE.SphereGeometry(0.28, 12, 10);
  lanGeo.scale(1, 0.85, 1);
  for (let i = 0; i < 40; i++) {
    const m = new THREE.Mesh(lanGeo, lanMat);
    const side = Math.random() < 0.5 ? -1 : 1;
    m.position.set(side * (FIELD_W / 2 + 1.2 + Math.random() * 2), (Math.random() - 0.5) * 5, -i * 3.2);
    scene.add(m);
    sideLanterns.push(m);
  }
}

/* ---------- 星 ---------- */
{
  const n = 250, pos = new Float32Array(n * 3);
  for (let i = 0; i < n; i++) {
    pos[i*3] = (Math.random() - 0.5) * 90;
    pos[i*3+1] = (Math.random() - 0.5) * 50;
    pos[i*3+2] = -30 - Math.random() * 60;
  }
  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
  scene.add(new THREE.Points(geo, new THREE.PointsMaterial({
    size: 0.1, color: 0xcdd8ff, transparent: true, opacity: 0.7, fog: false,
  })));
}

/* ---------- ゲーム状態 ---------- */
let playing = false;
let speed = 10, dist = 0, nextGateZ = -24;
let px = 0, py = 0, tx = 0, ty = 0;

const scoreEl = document.getElementById('score');
const bestEl = document.getElementById('best');
const BEST_KEY = 'lantern-run-best';
let best = +(localStorage.getItem(BEST_KEY) || 0);
bestEl.textContent = best ? `最長 ${best} 間` : '';

function reset() {
  for (const g of gates) removeGate(g);
  gates.length = 0;
  speed = 10; dist = 0; gateCount = 0;
  px = py = tx = ty = 0;
  for (let z = -24; z > -90; z -= 11) makeGate(z);
  for (let i = 0; i < TRAIL_N; i++) {
    trailPos[i*3] = 0; trailPos[i*3+1] = 0; trailPos[i*3+2] = 2 + i * 0.2;
  }
  scoreEl.textContent = '0';
}

function gameOver() {
  playing = false;
  beep(120, 0.5, 'sawtooth', 0.22);
  const score = Math.floor(dist);
  document.getElementById('result').textContent = score;
  const nb = document.getElementById('newBest');
  if (score > best) {
    best = score;
    localStorage.setItem(BEST_KEY, best);
    nb.textContent = '✦ 最長記録 ✦';
  } else nb.textContent = '';
  bestEl.textContent = `最長 ${best} 間`;
  setTimeout(() => document.getElementById('overOverlay').classList.remove('hidden'), 400);
}

/* ---------- 入力（ポインタ追従 0.16 = 機敏） ---------- */
addEventListener('pointermove', (e) => {
  tx = ((e.clientX / innerWidth) * 2 - 1) * (FIELD_W / 2);
  ty = -((e.clientY / innerHeight) * 2 - 1) * (FIELD_H / 2);
});

document.getElementById('startBtn').addEventListener('click', () => {
  if (!actx) actx = new (window.AudioContext || window.webkitAudioContext)();
  document.getElementById('titleOverlay').classList.add('hidden');
  reset();
  playing = true;
  renderPreset.onPlaying();
});
document.getElementById('retryBtn').addEventListener('click', () => {
  document.getElementById('overOverlay').classList.add('hidden');
  reset();
  playing = true;
  renderPreset.onPlaying();
});

/* ---------- メインループ ---------- */
const clock = new THREE.Clock();
let ready = false;
renderer.setAnimationLoop(() => {
  const dt = Math.min(clock.getDelta(), 0.05);
  const t = clock.elapsedTime;

  // 火の玉の追従と揺らぎ
  px += (tx - px) * 0.16;
  py += (ty - py) * 0.16;
  player.position.set(px, py + Math.sin(t * 6) * 0.03, 0);
  core.scale.setScalar(1 + Math.sin(t * 12) * 0.06);
  pl.position.copy(player.position);
  pl.position.z += 1;

  // 尾の更新
  for (let i = TRAIL_N - 1; i > 0; i--) {
    trailPos[i*3] = trailPos[(i-1)*3];
    trailPos[i*3+1] = trailPos[(i-1)*3+1];
    trailPos[i*3+2] = 0.25 + i * 0.22;
  }
  trailPos[0] = px; trailPos[1] = py; trailPos[2] = 0.25;
  trailGeo.attributes.position.needsUpdate = true;

  updateEmbers(dt, t);

  if (playing) {
    const dz = speed * dt;
    dist += dz * 0.4;
    speed = Math.min(30, 10 + dist * 0.06);
    scoreEl.textContent = Math.floor(dist);

    // ゲートを手前に流す
    for (const g of gates) {
      g.z += dz;
      g.group.position.z = g.z;
      if (!g.passed && g.z >= 0) {
        g.passed = true;
        // 通過判定
        const inX = Math.abs(px - g.gx) < GATE_GAP_W / 2 - 0.16;
        const inY = Math.abs(py - g.gy) < GATE_GAP_H / 2 - 0.16;
        if (inX && inY) {
          beep(740 + Math.random() * 120, 0.07, 'triangle', 0.14);
        } else {
          gameOver();
        }
      }
    }
    // 通り過ぎたゲートを、最奥のさらに先へ湧かせ直す
    for (let i = gates.length - 1; i >= 0; i--) {
      if (gates[i].z > 8) {
        removeGate(gates[i]);
        gates.splice(i, 1);
        const minZ = gates.reduce((m, g) => Math.min(m, g.z), 0);
        makeGate(minZ - 11);
      }
    }
    // 装飾提灯も流す
    for (const m of sideLanterns) {
      m.position.z += dz;
      if (m.position.z > 6) m.position.z -= 128;
    }
  }

  renderer.render(scene, camera);
  if (!ready) { console.log('[site] ready'); ready = true; }
});

addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});
</script>
</body>
</html>
