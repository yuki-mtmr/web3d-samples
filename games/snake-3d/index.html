<html lang="ja">

<script type="importmap">
{"imports":{"three":"https://unpkg.com/three@0.185.0/build/three.module.js","three/addons/":"https://unpkg.com/three@0.185.0/examples/jsm/"}}
</script>
<style>
  :root {
    /* [THEME-TOKEN] brief.json の palette と一致させること(verify THEME 検査対象) */
    --tk-primary: #4ade80;
    --tk-accent: #ff2d8a;
    --tk-background: #071410;
    --tk-danger: #ff4d4d;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; font-family: 'Avenir Next', 'Hiragino Sans', sans-serif; }
  body { background: var(--tk-background); touch-action: none; }
  canvas { display: block; }
  .hud {
    position: fixed; top: 3vh; left: 0; right: 0; text-align: center;
    color: #d8ffe8; pointer-events: none; z-index: 10;
  }
  .score { font-size: clamp(2rem, 6vw, 3rem); font-weight: 800; font-variant-numeric: tabular-nums; text-shadow: 0 0 18px rgba(74,222,128,0.5); }
  .best { font-size: 0.78rem; letter-spacing: 0.25em; opacity: 0.6; }
  .overlay {
    position: fixed; inset: 0; display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 1.1rem;
    color: #d8ffe8; z-index: 20; background: rgba(5, 14, 10, 0.66);
    -webkit-backdrop-filter: blur(6px); backdrop-filter: blur(6px);
    transition: opacity 0.3s ease, visibility 0.3s; text-align: center;
  }
  .overlay.hidden { opacity: 0; pointer-events: none; visibility: hidden; }
  .overlay h1 { font-size: clamp(2rem, 7vw, 3.2rem); font-weight: 800; letter-spacing: 0.18em; color: #4ade80; text-shadow: 0 0 24px rgba(74,222,128,0.6); }
  .overlay p { opacity: 0.85; font-size: 0.9rem; letter-spacing: 0.1em; line-height: 2; padding: 0 1.5rem; }
  .overlay .result { font-size: clamp(3rem, 11vw, 5rem); font-weight: 800; line-height: 1; color: #4ade80; }
  .btn {
    pointer-events: auto; cursor: pointer; font-family: inherit;
    background: #4ade80; color: #071410; border: none; border-radius: 999px;
    padding: 0.9rem 2.8rem; font-size: 1rem; font-weight: 800; letter-spacing: 0.2em;
    transition: transform 0.15s cubic-bezier(0.16,1,0.3,1), box-shadow 0.15s ease-out;
  }
  .btn:hover { transform: scale(1.05); box-shadow: 0 12px 32px rgba(74,222,128,0.35); }
  .btn:focus-visible { outline: 2px solid #d8ffe8; outline-offset: 3px; }
</style>

<body>
<div class="hud">
  <div class="score" id="score">0</div>
  <div class="best" id="best"></div>
</div>

<div class="overlay" id="titleOverlay">
  <h1>NEON SNAKE</h1>
  <p>矢印キー / WASD で方向転換。スマホは進みたい方向へスワイプ。<br>光る実を食べるほど長く、速くなる。壁と自分にぶつけないように。</p>
  <button class="btn" id="startBtn">START</button>
</div>

<div class="overlay hidden" id="overOverlay">
  <p>FRUITS EATEN</p>
  <div class="result" id="result">0</div>
  <p id="newBest" style="color:#ffd24a"></p>
  <button class="btn" id="retryBtn">RETRY</button>
</div>

<script type="module">
import * as THREE from 'three';
import { initRenderPreset } from './lib/render-preset.mjs';
import { createFSM } from './lib/fsm.mjs';
import { createGameHook } from './lib/game-hook.mjs';
import { createRendererInfo } from './lib/render-info.mjs';
import { createScoreStore } from './lib/score.mjs';
import { bindKeyboard } from './lib/input-bindings.mjs';
import { createInputBuffer } from './lib/input.mjs';
// bloom は emissive 多用テーマ(ネオン発光: ヘビ頭部/外周枠/実)で必須(verify N9)
import { createBloomComposer } from './lib/postfx.mjs';

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
// bloom(EffectComposer)使用時は info を手動リセットに切り替え、フレーム全パスの
// draw call / 三角形を累積して A8/A9 が実測できるようにする(render-preset.mjs 参照)
renderer.info.autoReset = false;
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.fog = new THREE.Fog(0x071410, 24, 50);

// ---------- Wave2 StageB: ネオン俯瞰の背景/VFX 強化(手続き生成、tori-gate-run の手法を翻案) ----------
// 背景: 深いグラデ空ではなく、盤面色を軸にした暗緑ネオンの放射ヴィネット + 走査線。
// scene.background は fog の影響を受けないため、fog の減衰演出をしても背景の沈み込みは崩れない。
function cyberBackgroundTexture() {
  const w = 512, h = 512;
  const c = document.createElement('canvas');
  c.width = w; c.height = h;
  const ctx = c.getContext('2d');
  const grad = ctx.createRadialGradient(w / 2, h * 0.62, 0, w / 2, h * 0.62, w * 0.75);
  grad.addColorStop(0, '#0d2b20');   // 中心: primary をわずかに滲ませた暗緑
  grad.addColorStop(0.55, '#071410'); // background(brief と一致)
  grad.addColorStop(1, '#030a07');    // 外周: さらに深い沈み込み
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, w, h);
  ctx.strokeStyle = 'rgba(74,222,128,0.05)';
  ctx.lineWidth = 1;
  for (let y = 0; y < h; y += 6) {
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(w, y); ctx.stroke();
  }
  const tex = new THREE.CanvasTexture(c);
  tex.colorSpace = THREE.SRGBColorSpace;
  return tex;
}
scene.background = cyberBackgroundTexture();

const renderPreset = await initRenderPreset(renderer, scene);

const camera = new THREE.PerspectiveCamera(46, innerWidth / innerHeight, 0.1, 100);
camera.position.set(0, 16.5, 10.5);
camera.lookAt(0, 0, -0.6);

// ネオンテーマの発光感は bloom で担保(threshold は高め: 盤面全体が薄く光って見えないよう
// emissive 強めの箇所のみに反応させる)
const bloom = createBloomComposer(renderer, scene, camera, { strength: 0.65, threshold: 0.82, radius: 0.35 });

scene.add(new THREE.AmbientLight(0x88ffcc, 0.55));
const key = new THREE.DirectionalLight(0xffffff, 1.1);
key.position.set(4, 10, 6);
scene.add(key);

/* ---------- 盤面 ---------- */
const N = 15, CELL = 1.0;
const toX = (c) => (c - N / 2 + 0.5) * CELL;
const toZ = (r) => (r - N / 2 + 0.5) * CELL;

{
  // 市松のグリッド床
  const c = document.createElement('canvas');
  c.width = c.height = N * 16;
  const g = c.getContext('2d');
  for (let i = 0; i < N; i++) for (let j = 0; j < N; j++) {
    g.fillStyle = (i + j) % 2 === 0 ? '#0d211a' : '#0a1b15';
    g.fillRect(j * 16, i * 16, 16, 16);
  }
  g.strokeStyle = 'rgba(74,222,128,0.14)';
  g.lineWidth = 1;
  for (let i = 0; i <= N; i++) {
    g.beginPath(); g.moveTo(i * 16, 0); g.lineTo(i * 16, N * 16); g.stroke();
    g.beginPath(); g.moveTo(0, i * 16); g.lineTo(N * 16, i * 16); g.stroke();
  }
  const tex = new THREE.CanvasTexture(c);
  tex.colorSpace = THREE.SRGBColorSpace;
  const floor = new THREE.Mesh(
    new THREE.PlaneGeometry(N * CELL, N * CELL),
    new THREE.MeshStandardMaterial({ map: tex, roughness: 0.9 })
  );
  floor.rotation.x = -Math.PI / 2;
  scene.add(floor);
  // 外周ネオン枠
  const frameMat = new THREE.MeshStandardMaterial({ color: 0x4ade80, emissive: 0x22c55e, emissiveIntensity: 1.1 });
  const mk = (w, d, x, z) => {
    const m = new THREE.Mesh(new THREE.BoxGeometry(w, 0.3, d), frameMat);
    m.position.set(x, 0.15, z);
    scene.add(m);
  };
  const L = N * CELL;
  mk(L + 0.5, 0.25, 0, -L/2 - 0.13);
  mk(L + 0.5, 0.25, 0, L/2 + 0.13);
  mk(0.25, L + 0.5, -L/2 - 0.13, 0);
  mk(0.25, L + 0.5, L/2 + 0.13, 0);
}

/* ---------- 外周グリッド地平線(draw call +1) ---------- */
// 盤面外周に広がる発光グリッド床の拡張。fog(24-50)の減衰に任せて遠くへ消えるため
// scene.background 同様に別テクスチャの水平線を描く必要がない(見下ろし構図の定石)。
function horizonGridTexture() {
  const size = 128;
  const c = document.createElement('canvas');
  c.width = c.height = size;
  const g = c.getContext('2d');
  g.fillStyle = '#050f0c';
  g.fillRect(0, 0, size, size);
  g.strokeStyle = 'rgba(74,222,128,0.10)';
  g.lineWidth = 1;
  g.strokeRect(0.5, 0.5, size - 1, size - 1);
  const tex = new THREE.CanvasTexture(c);
  tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
  tex.repeat.set(30, 30);
  tex.colorSpace = THREE.SRGBColorSpace;
  return tex;
}
const horizonFloor = new THREE.Mesh(
  new THREE.PlaneGeometry(220, 220),
  new THREE.MeshBasicMaterial({ map: horizonGridTexture() }),
);
horizonFloor.rotation.x = -Math.PI / 2;
horizonFloor.position.y = -0.04; // 盤面床の直下、z-fight 回避
scene.add(horizonFloor);

/* ---------- 盤面下の放射グロー(draw call +1) ---------- */
function boardGlowTexture() {
  const size = 256;
  const c = document.createElement('canvas');
  c.width = c.height = size;
  const ctx = c.getContext('2d');
  const grad = ctx.createRadialGradient(size / 2, size / 2, 0, size / 2, size / 2, size / 2);
  grad.addColorStop(0, 'rgba(74,222,128,0.35)');
  grad.addColorStop(0.5, 'rgba(74,222,128,0.12)');
  grad.addColorStop(1, 'rgba(74,222,128,0)');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, size, size);
  const tex = new THREE.CanvasTexture(c);
  tex.colorSpace = THREE.SRGBColorSpace;
  return tex;
}
const boardGlow = new THREE.Mesh(
  new THREE.PlaneGeometry(N * CELL * 2.2, N * CELL * 2.2),
  new THREE.MeshBasicMaterial({
    map: boardGlowTexture(), transparent: true, blending: THREE.AdditiveBlending,
    depthWrite: false, fog: false,
  }),
);
boardGlow.rotation.x = -Math.PI / 2;
boardGlow.position.y = -0.02;
scene.add(boardGlow);

/* ---------- 微小な発光塵(THREE.Points、draw call +1) ---------- */
// 演出専用の疑似乱数(seed 固定)。gameplay の Math.random とは分離し、bot 再現性に影響させない。
function createDecoRng(seed) {
  let a = seed >>> 0;
  return function () {
    a |= 0; a = (a + 0x6D2B79F5) | 0;
    let t = Math.imul(a ^ (a >>> 15), 1 | a);
    t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
  };
}
const decoRng = createDecoRng(280800);
function dustSprite() {
  const size = 64;
  const c = document.createElement('canvas');
  c.width = c.height = size;
  const ctx = c.getContext('2d');
  const grad = ctx.createRadialGradient(size / 2, size / 2, 0, size / 2, size / 2, size / 2);
  grad.addColorStop(0, 'rgba(216,255,232,1)');
  grad.addColorStop(0.4, 'rgba(74,222,128,0.7)');
  grad.addColorStop(1, 'rgba(74,222,128,0)');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, size, size);
  const tex = new THREE.CanvasTexture(c);
  tex.colorSpace = THREE.SRGBColorSpace;
  return tex;
}
const DUST_COUNT = 140;
const DUST_RANGE = N * CELL * 0.62;
const DUST_Y_MIN = 0.2, DUST_Y_MAX = 4.2;
const dustPositions = new Float32Array(DUST_COUNT * 3);
const dustSpeeds = new Float32Array(DUST_COUNT);
const dustPhase = new Float32Array(DUST_COUNT);
for (let i = 0; i < DUST_COUNT; i++) {
  dustPositions[i * 3] = (decoRng() * 2 - 1) * DUST_RANGE;
  dustPositions[i * 3 + 1] = decoRng() * (DUST_Y_MAX - DUST_Y_MIN) + DUST_Y_MIN;
  dustPositions[i * 3 + 2] = (decoRng() * 2 - 1) * DUST_RANGE;
  dustSpeeds[i] = 0.15 + decoRng() * 0.25;
  dustPhase[i] = decoRng() * Math.PI * 2;
}
const dustGeo = new THREE.BufferGeometry();
dustGeo.setAttribute('position', new THREE.BufferAttribute(dustPositions, 3));
const dustMat = new THREE.PointsMaterial({
  map: dustSprite(), size: 0.12, transparent: true, opacity: 0.75,
  blending: THREE.AdditiveBlending, depthWrite: false, color: 0x4ade80, sizeAttenuation: true,
});
const dust = new THREE.Points(dustGeo, dustMat);
dust.frustumCulled = false;
scene.add(dust);

function updateDust(dt, elapsed) {
  const pos = dustGeo.attributes.position.array;
  for (let i = 0; i < DUST_COUNT; i++) {
    const idx = i * 3;
    pos[idx + 1] += dustSpeeds[i] * dt;
    pos[idx] += Math.sin(elapsed * 0.5 + dustPhase[i]) * 0.08 * dt;
    if (pos[idx + 1] > DUST_Y_MAX) {
      pos[idx + 1] = DUST_Y_MIN;
      pos[idx] = (decoRng() * 2 - 1) * DUST_RANGE;
      pos[idx + 2] = (decoRng() * 2 - 1) * DUST_RANGE;
    }
  }
  dustGeo.attributes.position.needsUpdate = true;
}

/* ---------- ヘビ ---------- */
const segGeo = new THREE.BoxGeometry(0.82, 0.5, 0.82);
const headMat = new THREE.MeshStandardMaterial({ color: 0x8affda, emissive: 0x4ade80, emissiveIntensity: 0.8, roughness: 0.4 });
const bodyMat = new THREE.MeshStandardMaterial({ color: 0x34a86a, emissive: 0x1a7a44, emissiveIntensity: 0.4, roughness: 0.5 });
let segMeshes = [];   // 先頭 = 頭

function syncMeshes(body) {
  while (segMeshes.length < body.length) {
    const m = new THREE.Mesh(segGeo, segMeshes.length === 0 ? headMat : bodyMat);
    scene.add(m);
    segMeshes.push(m);
  }
  while (segMeshes.length > body.length) {
    const m = segMeshes.pop();
    scene.remove(m);
  }
  body.forEach((cell, k) => {
    segMeshes[k].position.set(toX(cell.c), 0.25, toZ(cell.r));
    segMeshes[k].material = k === 0 ? headMat : bodyMat;
    const s = k === 0 ? 1 : Math.max(0.72, 1 - k * 0.012);
    segMeshes[k].scale.setScalar(s);
  });
}

/* ---------- 実（フルーツ） ---------- */
const fruit = new THREE.Mesh(
  new THREE.SphereGeometry(0.34, 16, 12),
  new THREE.MeshStandardMaterial({ color: 0xff7ab8, emissive: 0xff2d8a, emissiveIntensity: 1.2 })
);
scene.add(fruit);
let fruitCell = { r: 3, c: 3 };

/* ---------- 効果音 ---------- */
let actx = null;
function eatSfx() {
  if (!actx) return;
  const o = actx.createOscillator(), g = actx.createGain();
  o.type = 'triangle';
  o.frequency.setValueAtTime(660, actx.currentTime);
  o.frequency.exponentialRampToValueAtTime(1320, actx.currentTime + 0.08);
  g.gain.setValueAtTime(0.15, actx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, actx.currentTime + 0.14);
  o.connect(g).connect(actx.destination);
  o.start(); o.stop(actx.currentTime + 0.15);
}
function crashSfx() {
  if (!actx) return;
  const o = actx.createOscillator(), g = actx.createGain();
  o.type = 'sawtooth';
  o.frequency.setValueAtTime(220, actx.currentTime);
  o.frequency.exponentialRampToValueAtTime(50, actx.currentTime + 0.4);
  g.gain.setValueAtTime(0.2, actx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, actx.currentTime + 0.45);
  o.connect(g).connect(actx.destination);
  o.start(); o.stop(actx.currentTime + 0.5);
}

/* ---------- ゲーム状態 ---------- */
// 検証フック契約 v2(docs/contracts/game-hook.d.ts): score は progressFields で公開する
// 進行フィールドのため state オブジェクトに保持する。盤面内部変数は従来どおりモジュール変数。
const state = { score: 0 };
let body = [];              // {r, c} 先頭 = 頭
let dir = { r: 0, c: 1 };   // 現在の進行方向
let nextDir = { r: 0, c: 1 };
let stepInterval = 0.22, stepT = 0;

const scoreEl = document.getElementById('score');
const bestEl = document.getElementById('best');
const scoreStore = createScoreStore('snake3d'); // key: snake3d-best(旧実装と同一キーを維持)
bestEl.textContent = scoreStore.best() ? `BEST ${scoreStore.best()}` : '';

function placeFruit() {
  const free = [];
  for (let r = 0; r < N; r++) for (let c = 0; c < N; c++) {
    if (!body.some(s => s.r === r && s.c === c)) free.push({ r, c });
  }
  fruitCell = free[Math.random() * free.length | 0];
  fruit.position.set(toX(fruitCell.c), 0.34, toZ(fruitCell.r));
}

function reset() {
  body = [{ r: 7, c: 7 }, { r: 7, c: 6 }, { r: 7, c: 5 }];
  dir = { r: 0, c: 1 };
  nextDir = { r: 0, c: 1 };
  stepInterval = 0.22; stepT = 0;
  state.score = 0;
  scoreEl.textContent = '0';
  placeFruit();
  syncMeshes(body);
}

function step() {
  dir = nextDir;
  const head = { r: body[0].r + dir.r, c: body[0].c + dir.c };
  // 壁
  if (head.r < 0 || head.r >= N || head.c < 0 || head.c >= N) { fsm.transition('gameover'); return; }
  // 自分（しっぽは次のステップで空くので、食べない場合のみ末尾を除外して判定）
  const willEat = head.r === fruitCell.r && head.c === fruitCell.c;
  const checkBody = willEat ? body : body.slice(0, -1);
  if (checkBody.some(s => s.r === head.r && s.c === head.c)) { fsm.transition('gameover'); return; }

  body.unshift(head);
  if (willEat) {
    state.score++;
    scoreEl.textContent = state.score;
    stepInterval = Math.max(0.09, 0.22 - state.score * 0.006);
    eatSfx();
    placeFruit();
  } else {
    body.pop();
  }
  syncMeshes(body);
}

/* ---------- 入力 ---------- */
function turn(r, c) {
  // 真後ろへの反転は無視（現在の dir 基準）
  if (r === -dir.r && c === -dir.c) return;
  nextDir = { r, c };
}
addEventListener('keydown', (e) => {
  const map = {
    ArrowUp: [-1, 0], KeyW: [-1, 0],
    ArrowDown: [1, 0], KeyS: [1, 0],
    ArrowLeft: [0, -1], KeyA: [0, -1],
    ArrowRight: [0, 1], KeyD: [0, 1],
  };
  const d = map[e.code];
  if (d) { e.preventDefault(); turn(d[0], d[1]); }
});
// スワイプ
let swipeStart = null;
addEventListener('pointerdown', (e) => {
  if (e.target && e.target.closest && e.target.closest('button')) return;
  swipeStart = { x: e.clientX, y: e.clientY };
});
addEventListener('pointerup', (e) => {
  if (!swipeStart) return;
  const dx = e.clientX - swipeStart.x, dy = e.clientY - swipeStart.y;
  swipeStart = null;
  if (Math.hypot(dx, dy) < 24) return;
  if (Math.abs(dx) > Math.abs(dy)) turn(0, dx > 0 ? 1 : -1);
  else turn(dy > 0 ? 1 : -1, 0);
});

// 実導線: Space/Enter でも開始/リスタートできる(verify N1)。入力バッファ経由で結線し、
// クリック専用の開始導線を恒久的に避ける(phase1 で全ゲーム共通欠陥と特定済み)。
const input = createInputBuffer();
bindKeyboard(input, { ' ': 'action', Enter: 'action' });

// ---------- FSM (docs/contracts/game-hook.d.ts 準拠) ----------
const fsm = createFSM({
  title: {
    exit: () => {
      if (!actx) actx = new (window.AudioContext || window.webkitAudioContext)();
      document.getElementById('titleOverlay').classList.add('hidden');
    },
  },
  playing: {
    enter: () => {
      document.getElementById('overOverlay').classList.add('hidden');
      reset();
      renderPreset.onPlaying();
    },
  },
  gameover: {
    enter: () => {
      crashSfx();
      document.getElementById('result').textContent = state.score;
      submitScore();
      setTimeout(() => document.getElementById('overOverlay').classList.remove('hidden'), 500);
    },
    exit: () => document.getElementById('overOverlay').classList.add('hidden'),
  },
}, 'title');

// gameover の間は毎フレーム best 永続化を試みる(idempotent)。verify A11 は fsm が既に
// gameover の状態で state.score を直接書き換えてから transition('gameover') を呼ぶことがあり、
// その場合 lib/fsm.mjs の transition は同一状態への遷移を no-op にするため enter() が再発火しない。
// ループ側でも submitScore() することで、その経路でも A12(best 永続化)を成立させる。
function submitScore() {
  const isBest = scoreStore.submit(state.score);
  if (isBest) document.getElementById('newBest').textContent = '✦ NEW BEST ✦';
  bestEl.textContent = `BEST ${scoreStore.best()}`;
}

document.getElementById('startBtn').addEventListener('click', () => fsm.transition('playing'));
document.getElementById('retryBtn').addEventListener('click', () => fsm.transition('playing'));

/* ---------- メインループ ---------- */
const clock = new THREE.Clock();
let ready = false;
renderer.setAnimationLoop(() => {
  const dt = Math.min(clock.getDelta(), 0.05);
  const t = clock.elapsedTime;

  // 毎フレーム consume してバッファの取りこぼし/持ち越しを防ぐ(playing 中の action 押下が
  // 後の title/gameover 復帰時に誤発火しないように)
  const acted = input.consumePressed().has('action');
  if (acted && (fsm.is('title') || fsm.is('gameover'))) {
    fsm.transition('playing');
  }

  if (fsm.is('playing')) {
    stepT += dt;
    while (stepT >= stepInterval) {
      stepT -= stepInterval;
      step();
      if (!fsm.is('playing')) break;
    }
  } else if (fsm.is('gameover')) {
    submitScore();
  }
  // 実の浮遊
  fruit.position.y = 0.34 + Math.sin(t * 3) * 0.08;
  fruit.rotation.y += dt * 2;
  updateDust(dt, t);

  renderer.info.reset();
  bloom.render();
  if (!ready) { console.log('[site] ready'); ready = true; }
});

addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
  bloom.resize(innerWidth, innerHeight); // N9: bloom パスの解像度追随
});

// 検証パイプライン用フック v2(docs/contracts/game-hook.d.ts、scripts/verify-game.mjs が参照)
window.__GAME__ = createGameHook({
  fsm,
  state,
  rendererInfo: createRendererInfo(renderer),
  progressFields: ['score'],
});
</script>
