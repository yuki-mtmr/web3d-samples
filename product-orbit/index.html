<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ORBIT ONE — 革新的なワイヤレスヘッドフォン</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎧</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Manrope:wght@700;800&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #f6f4f0 0%, #ece8e0 100%);
      overflow: hidden;
      color: #1d2230;
    }

    .container {
      display: flex;
      width: 100%;
      height: 100%;
    }

    #canvas {
      flex: 0 0 60%;
      /* canvas のバッファ幅が min-content になって 60% 指定を破るのを防ぐ */
      min-width: 0;
      max-width: 60%;
      height: 100%;
      display: block;
      background: transparent;
    }

    .product-panel {
      flex: 0 0 40%;
      padding: 3rem 2.5rem;
      display: flex;
      flex-direction: column;
      justify-content: center;
      overflow-y: auto;
      overflow-x: hidden;
    }

    .eyebrow {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 1.2px;
      color: #6a7d5f;
      font-weight: 600;
      margin-bottom: 0.75rem;
    }

    .product-name {
      font-family: 'Manrope', sans-serif;
      font-size: 2.5rem;
      font-weight: 800;
      line-height: 1.1;
      margin-bottom: 1rem;
    }

    .rating-row {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 1.5rem;
      font-size: 0.9rem;
    }

    .stars {
      display: inline-flex;
      gap: 0.15rem;
    }

    .star {
      color: #d8c39a;
      font-size: 1rem;
    }

    .rating-count {
      color: #8a8a8a;
      font-size: 0.85rem;
    }

    .price-section {
      margin-bottom: 1.5rem;
    }

    .price-label {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: #8a8a8a;
      margin-bottom: 0.3rem;
    }

    .price {
      font-family: 'Manrope', sans-serif;
      font-size: 2rem;
      font-weight: 700;
    }

    .price-accent {
      color: #d8c39a;
    }

    .description {
      font-size: 0.95rem;
      line-height: 1.6;
      color: #5a5a5a;
      margin-bottom: 2rem;
    }

    .color-variants {
      margin-bottom: 2.5rem;
    }

    .variant-label {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: #8a8a8a;
      margin-bottom: 1rem;
      display: block;
    }

    .swatch-row {
      display: flex;
      gap: 1rem;
      margin-bottom: 1.5rem;
    }

    .swatch {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      border: 2px solid transparent;
      cursor: pointer;
      transition: all 0.15s ease;
      position: relative;
      flex-shrink: 0;
    }

    .swatch:hover {
      transform: scale(1.08);
    }

    .swatch[aria-pressed="true"] {
      box-shadow: 0 0 0 3px rgba(29, 34, 48, 0.2);
      border-color: #1d2230;
    }

    .swatch:focus-visible {
      outline: 2px solid #d8c39a;
      outline-offset: 2px;
    }

    .specs {
      border-top: 1px solid rgba(29, 34, 48, 0.1);
      padding-top: 1.5rem;
      margin-bottom: 2rem;
    }

    .spec-item {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
      padding: 0.75rem 0;
      border-bottom: 1px solid rgba(29, 34, 48, 0.05);
    }

    .spec-item:last-child {
      border-bottom: none;
    }

    .spec-label {
      font-size: 0.85rem;
      color: #8a8a8a;
      font-weight: 500;
    }

    .spec-value {
      font-size: 0.85rem;
      color: #1d2230;
      font-weight: 600;
    }

    .cta-button {
      background: #1d2230;
      color: white;
      border: none;
      padding: 1rem;
      font-size: 1rem;
      font-weight: 600;
      border-radius: 0.5rem;
      cursor: pointer;
      transition: all 0.2s ease;
      box-shadow: 0 4px 12px rgba(29, 34, 48, 0.15);
      font-family: 'Inter', sans-serif;
    }

    .cta-button:hover {
      transform: scale(1.03);
      box-shadow: 0 6px 20px rgba(29, 34, 48, 0.25);
    }

    .cta-button:active {
      transform: scale(1.01);
    }

    .cta-button:focus-visible {
      outline: 2px solid #d8c39a;
      outline-offset: 2px;
    }

    @media (max-width: 819px) {
      .container {
        flex-direction: column-reverse;
      }

      #canvas {
        flex: 0 0 55vh;
        width: 100%;
      }

      .product-panel {
        flex: 1 1 auto;
        padding: 2rem 1.5rem;
        max-height: 45vh;
      }

      .product-name {
        font-size: 1.75rem;
      }

      .price {
        font-size: 1.5rem;
      }
    }
  </style>
  <script type="importmap">
  {"imports":{"three":"https://unpkg.com/three@0.160.0/build/three.module.js","three/addons/":"https://unpkg.com/three@0.160.0/examples/jsm/"}}
  </script>
</head>
<body>
  <div class="container">
    <canvas id="canvas"></canvas>
    <div class="product-panel">
      <div class="eyebrow">プレミアム・オーディオ</div>
      <h1 class="product-name">ORBIT ONE</h1>

      <div class="rating-row">
        <span class="stars">
          <span class="star">★</span>
          <span class="star">★</span>
          <span class="star">★</span>
          <span class="star">★</span>
          <span class="star">★</span>
        </span>
        <span class="rating-count">4.8/5 (342件)</span>
      </div>

      <div class="price-section">
        <div class="price-label">価格</div>
        <div class="price">¥<span class="price-accent">42,900</span></div>
      </div>

      <p class="description">
        ORBIT ONEは、プレミアム素材と革新的なデザインが融合した次世代型ワイヤレスヘッドフォン。50時間の連続再生、3D空間音声、そして洗練されたシルエットであなたの日常をアップグレードします。
      </p>

      <div class="color-variants">
        <span class="variant-label">カラー選択</span>
        <div class="swatch-row">
          <button class="swatch" style="background: #1d2230;" data-color-hex="#1d2230" data-color-name="Midnight" aria-pressed="true" title="Midnight"></button>
          <button class="swatch" style="background: #d8c39a;" data-color-hex="#d8c39a" data-color-name="Champagne" aria-pressed="false" title="Champagne"></button>
          <button class="swatch" style="background: #6a7d5f;" data-color-hex="#6a7d5f" data-color-name="Moss" aria-pressed="false" title="Moss"></button>
        </div>
      </div>

      <div class="specs">
        <div class="spec-item">
          <span class="spec-label">バッテリー駆動時間</span>
          <span class="spec-value">50時間</span>
        </div>
        <div class="spec-item">
          <span class="spec-label">接続方式</span>
          <span class="spec-value">Bluetooth 5.3</span>
        </div>
        <div class="spec-item">
          <span class="spec-label">重量</span>
          <span class="spec-value">240g</span>
        </div>
        <div class="spec-item">
          <span class="spec-label">保証期間</span>
          <span class="spec-value">2年間</span>
        </div>
      </div>

      <button class="cta-button">カートに入れる</button>
    </div>
  </div>

  <script type="module">
    import * as THREE from 'three';
    import { RoomEnvironment } from 'three/addons/environments/RoomEnvironment.js';

    // =====================
    // SCENE SETUP
    // =====================
    const canvas = document.getElementById('canvas');
    const renderer = new THREE.WebGLRenderer({
      canvas,
      antialias: true,
      alpha: true,
      powerPreference: 'high-performance'
    });

    // Clamp pixel ratio to 2
    const dpr = Math.min(window.devicePixelRatio, 2);
    renderer.setPixelRatio(dpr);

    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(50, 1, 0.1, 1000);
    camera.position.set(0, 0.3, 4.2);

    // Environment map for metallic materials
    const pmremGenerator = new THREE.PMREMGenerator(renderer);
    const roomEnv = new RoomEnvironment();
    scene.environment = pmremGenerator.fromScene(roomEnv, 0.04).texture;

    // =====================
    // LIGHTING
    // =====================
    const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
    scene.add(ambientLight);

    const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
    directionalLight.position.set(5, 8, 7);
    scene.add(directionalLight);

    // =====================
    // BUILD HEADPHONES
    // =====================
    const headphonesGroup = new THREE.Group();
    scene.add(headphonesGroup);

    // Main color (starts as Midnight)
    let targetColor = new THREE.Color('#1d2230');
    let currentColor = new THREE.Color('#1d2230');

    // Headband (arc opening downward)
    const headbandGeometry = new THREE.TorusGeometry(1.1, 0.09, 12, 40, Math.PI);
    const mainMaterial = new THREE.MeshStandardMaterial({
      color: currentColor,
      metalness: 0.85,
      roughness: 0.3
    });
    // 半円トーラスは xy 平面のまま = 頭上に架かる縦アーチ（回転させると水平に寝てしまう）
    const headband = new THREE.Mesh(headbandGeometry, mainMaterial);
    headphonesGroup.add(headband);

    // Ear cup pads material
    const padMaterial = new THREE.MeshStandardMaterial({
      color: 0x2a2a2a,
      metalness: 0,
      roughness: 0.9
    });

    // Left ear cup
    const leftCupGeometry = new THREE.CylinderGeometry(0.42, 0.42, 0.22, 32);
    const leftCup = new THREE.Mesh(leftCupGeometry, mainMaterial);
    leftCup.rotation.z = Math.PI / 2;
    leftCup.position.set(-1.02, 0, 0);
    headphonesGroup.add(leftCup);

    // Left cup pad
    const leftPadGeometry = new THREE.TorusGeometry(0.34, 0.09);
    const leftPad = new THREE.Mesh(leftPadGeometry, padMaterial);
    leftPad.rotation.y = Math.PI / 2;
    leftPad.position.set(-1.02, 0, -0.15);
    headphonesGroup.add(leftPad);

    // Right ear cup
    const rightCupGeometry = new THREE.CylinderGeometry(0.42, 0.42, 0.22, 32);
    const rightCup = new THREE.Mesh(rightCupGeometry, mainMaterial);
    rightCup.rotation.z = Math.PI / 2;
    rightCup.position.set(1.02, 0, 0);
    headphonesGroup.add(rightCup);

    // Right cup pad
    const rightPadGeometry = new THREE.TorusGeometry(0.34, 0.09);
    const rightPad = new THREE.Mesh(rightPadGeometry, padMaterial);
    rightPad.rotation.y = Math.PI / 2;
    rightPad.position.set(1.02, 0, -0.15);
    headphonesGroup.add(rightPad);

    // Left slider
    const leftSliderGeometry = new THREE.BoxGeometry(0.08, 0.5, 0.08);
    const leftSlider = new THREE.Mesh(leftSliderGeometry, mainMaterial);
    leftSlider.position.set(-0.8, 0.3, 0);
    headphonesGroup.add(leftSlider);

    // Right slider
    const rightSliderGeometry = new THREE.BoxGeometry(0.08, 0.5, 0.08);
    const rightSlider = new THREE.Mesh(rightSliderGeometry, mainMaterial);
    rightSlider.position.set(0.8, 0.3, 0);
    headphonesGroup.add(rightSlider);

    // =====================
    // INTERACTION STATE
    // =====================
    let targetRotationY = 0;
    let targetRotationX = 0;
    let isDragging = false;
    let dragResumeTimeout = null;
    let lastInteractionTime = Date.now();

    const maxRotationX = 0.5;

    // =====================
    // POINTER INTERACTION
    // =====================
    canvas.addEventListener('pointerdown', () => {
      isDragging = true;
      clearTimeout(dragResumeTimeout);
    });

    canvas.addEventListener('pointermove', (e) => {
      if (!isDragging) return;

      const rect = canvas.getBoundingClientRect();
      const x = e.clientX - rect.left;
      const y = e.clientY - rect.top;

      const centerX = rect.width / 2;
      const centerY = rect.height / 2;

      const deltaX = (y - centerY) / rect.height;
      const deltaY = (x - centerX) / rect.width;

      targetRotationX = Math.max(-maxRotationX, Math.min(maxRotationX, deltaX * 0.5));
      targetRotationY += deltaY * 0.02;

      lastInteractionTime = Date.now();
    });

    canvas.addEventListener('pointerup', () => {
      isDragging = false;
      clearTimeout(dragResumeTimeout);
      dragResumeTimeout = setTimeout(() => {
        targetRotationX = 0;
      }, 2000);
    });

    // =====================
    // COLOR VARIANT SWATCHES
    // =====================
    const swatches = document.querySelectorAll('.swatch');
    swatches.forEach((swatch) => {
      swatch.addEventListener('click', () => {
        swatches.forEach((s) => s.setAttribute('aria-pressed', 'false'));
        swatch.setAttribute('aria-pressed', 'true');

        const hexColor = swatch.dataset.colorHex;
        targetColor.setStyle(hexColor);

        // Update price accent
        document.querySelector('.price-accent').style.color = hexColor;
      });
    });

    // =====================
    // RESIZE HANDLER
    // =====================
    function onWindowResize() {
      const width = canvas.clientWidth;
      const height = canvas.clientHeight;
      camera.aspect = width / height;
      camera.updateProjectionMatrix();
      renderer.setSize(width, height, false);
    }
    window.addEventListener('resize', onWindowResize);
    onWindowResize();

    // =====================
    // ANIMATION LOOP
    // =====================
    let frameCount = 0;
    const respectReducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

    function animate() {
      requestAnimationFrame(animate);
      frameCount++;

      // Color lerp
      currentColor.lerp(targetColor, 0.1);
      mainMaterial.color.copy(currentColor);

      // Auto-rotate (unless dragging or reduced motion)
      if (!isDragging && !respectReducedMotion) {
        headphonesGroup.rotation.y += 0.004;
      }

      // Drag rotation with lerp
      headphonesGroup.rotation.x += (targetRotationX - headphonesGroup.rotation.x) * 0.15;
      headphonesGroup.rotation.y += (targetRotationY - headphonesGroup.rotation.y) * 0.15;

      renderer.render(scene, camera);

      // Log ready on first frame
      if (frameCount === 1) {
        console.log('[site] ready');
      }
    }

    animate();
  </script>
</body>
</html>
